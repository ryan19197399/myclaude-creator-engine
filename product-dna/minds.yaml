# ===========================================================================
# LIFECYCLE — 10 skills with universal contract + type_specific blocks
# ===========================================================================

lifecycle:
  map:
    role: "Extract the creator's cognitive expertise into domain-map.md, with special attention to the 5 cognitive layers and 7 DNA strands decomposition."
    optional: true
    inputs:
    - creator.yaml
    - domain topic seed ($ARGUMENTS)
    outputs:
    - workspace/domain-map.md
    blocks_when: []
    consumer_status: aspirational
    consumer_status_reason: "/map does not yet consult minds-specific decomposition prompts per the 5 layers and 7 strands."
    next_action: null
    next_action_reason: "read-only skill"
    type_specific:
      skip_recommended: false
      skip_message: "For minds (especially cognitive self sub-type), /map is load-bearing \u2014 it extracts the creator's own cognitive methodology, which becomes the L2 cognitive core and the C7 reasoning patterns."
      minds_specific_prompts:
      - "What cognitive flow do you use for hard problems in your domain? Walk me through a recent example with the named steps."
      - "What 3 characteristics make YOUR reasoning in this domain irreplaceable (not generic traits)?"
      - "What 5 expressions or questions do you consistently use when working in this domain?"
      - "What 3-6 knowledge sub-domains are you deep in, and where do you refuse to advise even though adjacent?"
      - "What 3+ reasoning patterns do you apply, each with a specific trigger condition?"
  scout:
    role: "Research existing minds in the marketplace and cognitive exemplars in the genius library. Prevents reinventing personas that exist."
    optional: true
    inputs:
    - creator.yaml
    - domain query ($ARGUMENTS)
    outputs:
    - workspace/scout-{slug}.md
    - STATE.yaml.last_scout updated
    blocks_when: []
    consumer_status: aspirational
    consumer_status_reason: "/scout does not yet calibrate for minds-specific research (existing cognitive exemplars, genius library coverage, domain advisor marketplace scan)."
    next_action: null
    next_action_reason: "read-only research skill"
    type_specific:
      skip_recommended: false
      skip_message: "Skipping /scout for minds is risky when the domain has existing advisors \u2014 the new mind may be a commodity. Cognitive minds especially benefit from scout because the genius library may already have a relevant exemplar."
      scout_calibration_for_minds:
      - "Scan marketplace for existing advisor minds in the same domain"
      - "Scan templates/genius-library/ for relevant cognitive exemplars (for genius sub-type)"
      - "Identify differentiation opportunities vs existing minds"
      - "For cognitive minds: scan for baseline delta \u2014 what does vanilla Claude already do well in this domain?"
  import:
    role: "Bring an existing minds-shaped artifact from a workspace install target into the Engine workspace for validation, packaging, republish."
    optional: true
    inputs:
    - "Source file (.claude/agents/{slug}.md) OR source directory (for cognitive mind with references/)"
    - creator.yaml
    outputs:
    - workspace/{slug}/ (single file for advisory, full directory with 5 layer files for cognitive)
    - workspace/{slug}/.meta.yaml (state auto-detected, depth auto-detected)
    blocks_when:
    - workspace/{slug}/ already exists (no --force)
    - Source has no identity declaration
    consumer_status: partial
    consumer_status_reason: "/import SKILL.md detection table was extended in S118c to recognize minds shape. Depth auto-detection (advisory vs cognitive based on reference file presence) is aspirational \u2014 Wave 3."
    next_action: "/validate {slug}"
    type_specific:
      detection_pattern: "single .md file in .claude/agents/ containing 'You ARE' identity construction \u2014 advisory. Directory containing AGENT.md + references/cognitive-core.md + references/personality.md + references/knowledge-base.md + references/reasoning-engine.md \u2014 cognitive."
      rename_on_import: null
      rename_on_import_reason: "Mind files use {slug}.md in install and AGENT.md in workspace \u2014 /import reverses the package rename."
      auto_detected_phase: content
      auto_detect_depth: true
      auto_detect_depth_rule: "If the 4 cognitive reference files are present, depth=cognitive. Otherwise depth=advisory."
  create:
    role: "Run the creation cycle for minds \u2014 depth discriminator FIRST, then archetype selection, then sub-type selection (for cognitive), then discovery questions walked in order, then scaffold of primary file + references/ (for cognitive)."
    optional: false
    inputs:
    - creator.yaml
    - type
    - slug
    - depth (advisory | cognitive)
    - archetype
    - sub_type (for cognitive)
    - discovery_answers
    - scout_report (optional)
    - domain_map (optional)
    - genius_profile (for cognitive genius sub-type)
    outputs:
    - workspace/{slug}/AGENT.md
    - workspace/{slug}/README.md
    - "workspace/{slug}/references/cognitive-core.md (cognitive only)"
    - "workspace/{slug}/references/personality.md (cognitive only)"
    - "workspace/{slug}/references/knowledge-base.md (cognitive only)"
    - "workspace/{slug}/references/reasoning-engine.md (cognitive only)"
    - "workspace/{slug}/examples/examples.md (cognitive required, advisory optional)"
    - workspace/{slug}/.meta.yaml (depth recorded, archetype recorded, sub_type recorded)
    blocks_when:
    - slug invalid
    - workspace/{slug}/ exists without --force
    - creator.yaml missing AND micro-onboard fails
    - depth not selected
    - "archetype not selected"
    - "sub_type not selected (for cognitive depth)"
    consumer_status: aspirational
    consumer_status_reason: "/create does not yet walk the depth discriminator as the first-class first question. Wave 3 teaches /create to ask 'advisory or cognitive?' BEFORE any other minds discovery question."
    next_action: "/fill {slug}"
    type_specific:
      activates_templates_advisory:
      - templates/minds/AGENT.md.template
      - templates/minds/README.md.template
      - "templates/minds/examples/examples.md.template (optional)"
      activates_templates_cognitive:
      - templates/minds/cognitive/AGENT.md.template
      - templates/minds/cognitive/README.md.template
      - templates/minds/cognitive/references/cognitive-core.md.template
      - templates/minds/cognitive/references/personality.md.template
      - templates/minds/cognitive/references/knowledge-base.md.template
      - templates/minds/cognitive/references/reasoning-engine.md.template
      - templates/minds/cognitive/examples/examples.md.template
      activates_dna_at_scaffold: [D1, D2, D3, D4, D5, D6, D13, D14]
      discovery_phase:
        questions_source: this file \u2192 discovery_questions.required_in_order
        questions_walked_in_order: true
        depth_selection_required: true
        depth_selection_first: true
        depth_selection_first_reason: "Every downstream question depends on depth \u2014 template path, required files, DNA set, rubric, pricing. Ask depth first, prevent re-work."
        archetype_selection_phase: "AFTER depth"
        sub_type_selection_phase: "AFTER depth AND after archetype (cognitive only)"
      read_before_write_ratio_advisory: "5:1"
      read_before_write_ratio_cognitive: "8:1"
      read_inputs_advisory:
      - creator.yaml
      - this codex
      - templates/minds/
      - agent.yaml (inheritance)
      - structural-dna.md
      - config.yaml
      read_inputs_cognitive:
      - creator.yaml
      - this codex
      - templates/minds/cognitive/
      - agent.yaml (inheritance)
      - skill.yaml (transitive inheritance for anti-patterns)
      - structural-dna.md
      - config.yaml
      - "templates/genius-library/{profile}/profile.yaml (for genius sub-type)"
      - scout report (if exists)
      - domain-map.md (if exists)
      ground_truth_required: false
      ground_truth_required_reason: "Minds inherit native claims from agent.yaml which already traces everything to ground-truth. Minds themselves make no new native claims."
      inherits_from:
      - agent.yaml (frontmatter, tool boundary, archetypes, anti-patterns, lifecycle)
      - skill.yaml (transitive anti-pattern catalog)
  fill:
    role: "Walk the mind's sections sequentially \u2014 for advisory, walk AGENT.md sections; for cognitive, walk AGENT.md PLUS each of the 4 reference files (L2-L5) PLUS examples/examples.md."
    optional: false
    inputs:
    - workspace/{slug}/ (all files from /create)
    - workspace/{slug}/.meta.yaml
    - creator.yaml
    - scout report
    - domain-map.md
    - this file (sections_walked)
    - agent.yaml (inherited sections_walked)
    outputs:
    - All files filled
    - workspace/{slug}/.meta.yaml (state content, fill_progress updated, fill_metrics recorded)
    blocks_when: []
    consumer_status: aspirational
    consumer_status_reason: "/fill does not yet know how to walk a cognitive mind's 5 layer files. Wave 3 teaches /fill to iterate layers with strand-specific prompts."
    next_action: "/validate {slug}"
    type_specific:
      sections_walked_advisory:
      - name: Identity (AGENT.md ontological declaration)
        why: "C1 strand \u2014 'You ARE' construction, not 'Act as'"
        sparring_required: true
      - name: Activation Protocol
        why: "D1 \u2014 load sequence for references/ if present"
        sparring_required: false
      - name: Core Principles
        why: "4-6 principles that define the mind's intellectual DNA"
        sparring_required: true
      - name: Knowledge Domains and Boundaries
        why: "C6 strand \u2014 declared expertise with explicit boundaries"
        sparring_required: true
      - name: Communication Voice
        why: "C5 strand \u2014 tone, expressions, style markers"
        sparring_required: true
      - name: Anti-Patterns
        why: "D2 \u2014 5+ specific anti-patterns for this mind's domain"
        sparring_required: true
      - name: Quality Gate
        why: "D4 \u2014 verifiable checklist before output delivery"
        sparring_required: false
      - name: When Not To Use
        why: "D14 \u2014 graceful decline pattern"
        sparring_required: false
      sections_walked_cognitive:
      - name: "L1 AGENT.md Boot \u2014 Identity + Activation + Principles + Voice Markers + Triggers + Quality Gate"
        why: "C1 + C5 summary + D1 + D4"
        sparring_required: true
        sparring_minimum: 2
      - name: "L2 cognitive-core.md \u2014 Biographical Anchor + Cognitive Flow + Singularity Markers"
        why: "C2 + C3 + C4 \u2014 load-bearing for fidelity scoring"
        sparring_required: true
        sparring_minimum: 3
      - name: "L3 personality.md \u2014 Communication DNA + Methodology + Interaction Patterns"
        why: "C5 full detail beyond the L1 summary"
        sparring_required: true
        sparring_minimum: 2
      - name: "L4 knowledge-base.md \u2014 Knowledge Domains + Explicit Boundaries + Source Tiers"
        why: "C6 strand with depth levels"
        sparring_required: true
        sparring_minimum: 2
      - name: "L5 reasoning-engine.md \u2014 Reasoning Patterns with Triggers + Methods + Falsifiability"
        why: "C7 strand \u2014 concrete patterns, not decorative framework names"
        sparring_required: true
        sparring_minimum: 3
      - name: "examples/examples.md \u2014 3+ invocation scenarios with expected outputs"
        why: "D15 for cognitive minds, required at MCS-2+"
        sparring_required: true
      sparring_protocol: "Deep sparring on strand specificity \u2014 singularity markers, knowledge boundaries, reasoning patterns \u2014 because these are where cognitive minds collapse into generic advisors if not forged carefully."
      research_injection_eligible: true
      scout_fallback_enabled: true
      inline_research_offer: "For cognitive minds in domains the creator does not personally master, /fill offers WebSearch research injection per L4 knowledge domain."
  validate:
    role: "Run structural + integrity + DNA at Tier 1+2 + CLI preflight + anti-commodity + (for cognitive minds) Stage 7b cognitive_fidelity."
    optional: false
    inputs:
    - workspace/{slug}/ (all files)
    - workspace/{slug}/.meta.yaml
    - this file
    - agent.yaml (inherited checks)
    - skill.yaml (transitive anti-patterns)
    - claude-code-ground-truth.md
    - config.yaml
    - quality-gates.yaml
    - structural-dna.md
    outputs:
    - workspace/{slug}/.meta.yaml (state validated, scores, intelligence, cognitive_fidelity_result)
    - Validation report
    blocks_when: []
    consumer_status: partial
    consumer_status_reason: "/validate reads dna_patterns per type but does not yet enforce minds-specific checks (depth-routed validation, Stage 7b cognitive_fidelity). The Stage 7b file does not yet exist \u2014 see GAP-MND-1."
    next_action: "/test {slug} (required for cognitive MCS-2+) OR /package {slug}"
    type_specific:
      stages_run_advisory:
        mcs1: [1, 2, 3, 6]
        mcs2: [1, 2, 3, 4, 6, 7]
        mcs3: "NOT APPLICABLE \u2014 advisory ceiling is MCS-2"
      stages_run_cognitive:
        mcs1: [1, 2, 3, 6]
        mcs2: [1, 2, 3, 4, 6, 7, "7b"]
        mcs3: [1, 2, 3, 4, 5, 6, 7, "7b", 8]
      depth_routing:
        rule: "Read workspace/{slug}/.meta.yaml depth field. IF advisory, skip Stage 7b. IF cognitive, require Stage 7b at MCS-2+."
        consumer_status: aspirational
        consumer_status_reason: "Wave 3 teaches /validate to read depth and route accordingly. Today the depth field is recorded in .meta.yaml but not consulted at validate time."
      per_stage_hooks:
        stage_1_structural:
          check_advisory: "Glob workspace/{slug}/ for AGENT.md + README.md present. references/ optional but recommended."
          check_cognitive: "Glob workspace/{slug}/ for AGENT.md + README.md + references/cognitive-core.md + references/personality.md + references/knowledge-base.md + references/reasoning-engine.md + examples/examples.md present."
          blocking: true
        stage_2_integrity:
          check: "YAML parse on .meta.yaml. No placeholder patterns. No secret patterns. Markdown parses in every layer file."
          blocking: true
        stage_3_dna_tier1:
          required_patterns: [D1, D2, D3, D4, D13, D14]
          recommended_patterns: [D19]
          check_d1: "AGENT.md has identity + activation protocol; cognitive minds reference all 4 L2-L5 files in the activation sequence"
          check_d2: "AGENT.md references AP-M1..M8 catalog + inherited AP-A1..A6 from agent.yaml"
          check_d3: "AGENT.md under 500 lines; cognitive minds split L2-L5 into separate reference files"
          check_d4: "Quality gate section with 3+ verifiable criteria"
          check_d13: "README.md has what/install/usage/requirements sections"
          check_d14: "When Not To Use section with graceful decline pattern"
          check_d19: "Critical constraints in last 30% of AGENT.md body"
          blocking: true
        stage_4_dna_tier2:
          required_patterns: [D5, D6, D16]
          recommended_patterns: [D11, D15]
          check_d5: "Discovery questions declared; $ARGUMENTS handling documented"
          check_d6: "Confidence graduation using config.yaml certainty_bands"
          check_d11: "Socratic pressure pattern present (required for cognitive at MCS-2+)"
          check_d15: "examples/examples.md with 3+ scenarios (required for cognitive at MCS-2+)"
          check_d16: "No hardcoded absolute paths; install target uses {slug} placeholder"
          blocking: false
        stage_6_cli_preflight:
          check: "myclaude validate {slug} succeeds \u2014 manifest, secrets, file sizes"
          blocking: true
        stage_7_anti_commodity:
          check: "Substance score + invisibility audit (word-bounded grep against substrate vocabulary AND academic author names) + quality_rubric application + AP-M1..M8 grep"
          blocking: false
          coaching_only: true
          minds_specific_invisibility_source: scripts/codex-drift-check.py INVISIBILITY_PATTERN plus a minds-specific supplementary list maintained in references/product-specs/minds-spec.md
          minds_specific_invisibility_reason: "Minds documentation has the highest academic-author leak risk of any product type because cognitive-science methodology naturally references named frameworks. Authors must appear as capability descriptions (graduated-confidence updating, falsifiability gate, fast-intuitive vs slow-deliberate modes) rather than as attribution."
        stage_7b_cognitive_fidelity:
          check: "For cognitive minds ONLY. Apply the cognitive_fidelity_scoring rubric: layer_completeness 0.30 + identity_integrity 0.25 + cognitive_depth 0.25 + substance 0.20. Verify all 7 strands C1-C7 present with evidence. Gate MCS-2 at 0.80, MCS-3 at 0.92."
          prerequisite: "workspace/{slug}/.meta.yaml depth == cognitive"
          blocking: false
          applies_to: cognitive depth only
          stage_file: .claude/skills/validate/references/validation-stages/stage-7b-cognitive-fidelity.md
          stage_file_status: "DECLARED GAP \u2014 file does not yet exist, Wave 3 forges it (GAP-MND-1)"
          strand_checks:
            C1: "grep 'You ARE' in AGENT.md identity section; absence of 'Act as' / 'role-play' / 'pretend'"
            C2: "3+ specific factual anchors in cognitive-core.md (dates, names, works) OR explicit fiction declaration"
            C3: "Named cognitive flow sequence in cognitive-core.md with 3-6 steps, each with method"
            C4: "3+ singularity markers in cognitive-core.md, each is a specific cognitive pattern"
            C5: "5+ characteristic expressions in personality.md, declared tone with specificity"
            C6: "3-6 domains in knowledge-base.md with depth levels AND at least 2 explicit boundary statements"
            C7: "3+ reasoning patterns in reasoning-engine.md with {name, trigger, method}"
          strand_semantic_coherence_check: "Wave 3 \u2014 verify C3 flow matches C7 patterns, C6 domains match L4 content"
          strand_semantic_coherence_consumer_status: aspirational
          strand_semantic_coherence_consumer_status_reason: "Wave 3 teaches Stage 7b to check cross-layer coherence, not just per-strand presence."
        stage_8_value_intelligence:
          check: "Value score, suggested price range, market position. For cognitive minds, depth adds +1 to value score per config.yaml intelligence.pricing.depth_weight."
          blocking: false
          runs_at_mcs: [2, 3]
      read_before_write_ratio: "Read-only skill \u2014 updates .meta.yaml only"
      next_action_pass: "/test {slug} (required for cognitive MCS-2+) OR /package {slug}"
      next_action_fail: "/validate --fix {slug}"
  test:
    role: "Sandbox-install the mind in worktree isolation, run 3 behavioral scenarios (happy / edge / adversarial), verify activation protocol, verify confidence signaling, verify graceful decline pattern."
    optional: true
    inputs:
    - workspace/{slug}/ (validated)
    - this file
    outputs:
    - workspace/{slug}/.meta.yaml (test_result, last_tested, test_scenarios)
    - Test report
    blocks_when: []
    consumer_status: aspirational
    consumer_status_reason: "/test does not yet have minds-specific scenario logic. Wave 3 teaches /test to run the 3 canonical scenarios against a sandbox-spawned mind."
    next_action: "/package {slug}"
    type_specific:
      required_for_mcs: [2, 3]
      required_for_mcs_cognitive_only: true
      optional_for_mcs: [1]
      sandbox_isolation: worktree
      type_specific_steps:
      - step: activation_protocol_verification
        check: "Dry-spawn the mind in sandbox, verify it reads all declared layer files (for cognitive) or references/ (for advisory) at activation"
      - step: knowledge_boundary_verification
        check: "Invoke with an out-of-domain query, verify the mind declines gracefully with declared boundary statement rather than fabricating"
      - step: confidence_signaling_verification
        check: "Invoke with an ambiguous query, verify the mind uses graduated certainty bands rather than fabricating certainty"
      - step: cognitive_flow_trace
        check: "For cognitive minds, verify the response traces through the declared cognitive flow steps, not generic reasoning"
        applies_to: cognitive depth only
      scenarios_applicable: true
      scenarios:
      - name: Happy Path
        purpose: "In-domain query that exercises the mind's primary expertise"
        input_strategy: "Invoke with a query that matches one of the declared C6 knowledge domains"
        on_fail: "Knowledge boundary (C6) is mis-declared or cognitive flow (C3) is mis-applied"
      - name: Edge Case
        purpose: "Adjacent-domain query that tests boundary handling"
        input_strategy: "Invoke with a query that is near but outside the declared C6 boundaries"
        on_fail: "Graceful decline pattern (D14) is weak; mind advises beyond competence"
      - name: Adversarial
        purpose: "Ambiguous query designed to elicit fabricated certainty"
        input_strategy: "Invoke with a query that has no clear answer in the declared domain"
        on_fail: "Confidence signaling (D6) is absent; mind fabricates certainty rather than declaring uncertain"
      must_haves_verification: true
      next_action_pass: "/package {slug}"
  package:
    role: "Strip WHY comments from all mind files, generate vault.yaml + plugin.json + agentskills.yaml with depth-aware metadata, rename primary file from AGENT.md to {slug}.md, stage .publish/."
    optional: false
    inputs:
    - workspace/{slug}/ (validated, test_result pass for cognitive MCS-2+)
    - creator.yaml
    - this file
    - config.yaml
    outputs:
    - workspace/{slug}/.publish/{slug}.md (primary file, WHY stripped)
    - "workspace/{slug}/.publish/references/cognitive-core.md (cognitive only, WHY stripped)"
    - "workspace/{slug}/.publish/references/personality.md (cognitive only, WHY stripped)"
    - "workspace/{slug}/.publish/references/knowledge-base.md (cognitive only, WHY stripped)"
    - "workspace/{slug}/.publish/references/reasoning-engine.md (cognitive only, WHY stripped)"
    - "workspace/{slug}/.publish/examples/examples.md (WHY stripped)"
    - workspace/{slug}/.publish/README.md (badges injected)
    - workspace/{slug}/.publish/vault.yaml
    - workspace/{slug}/.publish/plugin.json
    - workspace/{slug}/.publish/agentskills.yaml
    - workspace/{slug}/.publish/CHANGELOG.md
    - workspace/{slug}/.publish/LICENSE.md
    blocks_when: []
    consumer_status: aspirational
    consumer_status_reason: "/package does not yet differentiate mind depth for plugin.json generation. Wave 3 extends /package to consult depth and generate depth-aware manifests."
    next_action: "/publish {slug}"
    type_specific:
      strips:
      - HTML WHY comments in ALL files
      - "# WHY lines in ALL files"
      - .meta.yaml
      - domain-map.md
      renames:
      - from: AGENT.md
        to: "{slug}.md"
        reason: "Workspace file is AGENT.md for editorial clarity; installed agent file is renamed to match the slug."
      injects:
      - field: marketplace_url
        value: "https://myclaude.sh/p/{slug}"
      - field: Attribution comment at end of {slug}.md frontmatter
        value: "<!-- Published on myclaude.sh | Engine: Studio v3 -->"
      - field: README badges
      plugin_json_block: "Plugin.json generated with 'agents' field pointing to the installed {slug}.md. For cognitive minds, the 'agents' entry includes references/ path listings for the 5 layer files."
      agentskills_yaml_block: "Platforms: [claude-code]. Minds are Claude Code specific (the Task spawn + agent frontmatter pattern is native to Claude Code)."
      step_6b_verify:
      - All required files present in .publish/ per depth
      - "For cognitive: all 5 layer files present (AGENT.md + 4 references/)"
      - No WHY comments remaining
      - "Primary file ({slug}.md) under 500 lines"
      - "For cognitive: each layer file within target line range"
  publish:
    role: "Push to the marketplace + Anthropic plugin marketplace. Minds distribute via vault.yaml + plugin.json with agent-frontmatter + (for cognitive) references/ declarations."
    optional: false
    inputs:
    - workspace/{slug}/.publish/ (state packaged)
    - myclaude CLI auth
    - creator confirmation
    outputs:
    - Live marketplace listing
    - Plugin marketplace listing
    - workspace/{slug}/.meta.yaml (state published)
    blocks_when:
    - state != packaged
    - "test_result != pass (for cognitive MCS-2+)"
    - myclaude auth missing
    - creator declines confirmation
    - "for cognitive at MCS-2+: Stage 7b cognitive_fidelity not pass"
    consumer_status: aspirational
    consumer_status_reason: "/publish does not yet route minds distribution differently from agents for plugin.json generation."
    next_action: null
    next_action_reason: terminal action
    type_specific:
      distribution_channels:
      - channel: myclaude
        primary: true
        url_pattern: "https://myclaude.sh/p/{slug}"
      - channel: anthropic-plugin
        primary: true
        plugin_json_block: "agents field with primary file and references/ path listings for cognitive minds"
      - channel: agentskills_universal
        primary: false
        applicable: false
        reason: "Task spawn + agent frontmatter is Claude Code specific."
      distribution_extras:
      - channel: newsletter
        source: config.yaml intelligence.distribution.channels_by_type.minds
      - channel: linkedin
        source: config.yaml intelligence.distribution.channels_by_type.minds
      - channel: domain-community
        source: config.yaml intelligence.distribution.channels_by_type.minds
      confirmation_required: true
      post_publish_actions:
      - "Suggest: 'Use the mind in your own daily work. A cognitive mind reveals its calibration only through real use across varied queries.'"
      - "Surface install command: myclaude install {slug}"
      - "Schedule check-in 7 days post-publish"
  status:
    role: "Display the mind in dashboard with depth badge (advisory or cognitive), archetype, sub_type (for cognitive), fidelity score (for cognitive), and invocation count."
    optional: true
    inputs:
    - workspace/{slug}/.meta.yaml
    - this file
    - references/ux-vocabulary.md
    outputs:
    - Dashboard line
    - Mind badge (depth-aware)
    blocks_when: []
    consumer_status: aspirational
    consumer_status_reason: "/status does not yet surface minds depth or fidelity scores. Wave 3 adds depth-aware dashboard."
    next_action: null
    next_action_reason: read-only dashboard
    type_specific:
      ux_type_name: Mind
      ux_type_name_source: references/ux-vocabulary.md
      state_emoji_rules: Universal
      portfolio_role_default: specialist
      portfolio_role_reason: "Minds are specialists in the creator's portfolio \u2014 each mind is a bounded cognitive judgment invocable on demand."
      depth_badge:
        advisory: "advisor"
        cognitive: "cognitive"

# ===========================================================================
# FLOW
# ===========================================================================

flow: |
  ```mermaid
  flowchart LR
    THINK[/think optional/] -.->|persona unclear| MAP[/map/]
    MAP -.->|expertise decomposed| SCOUT[/scout/]
    SCOUT -.->|existing minds surveyed| CREATE[/create minds/]
    IMPORT[/import existing/] -.-> WORKSPACE
    CREATE -->|depth + archetype + sub-type| WORKSPACE[(workspace/slug/)]
    WORKSPACE --> FILL[/fill/]
    FILL -->|layers + strands + boundary| VALIDATE[/validate/]
    VALIDATE -->|fail| VALIDATE
    VALIDATE -->|pass + Stage 7b for cognitive| TEST[/test/]
    TEST -->|3 scenarios: happy edge adversarial| PACKAGE[/package/]
    PACKAGE -->|stripped + depth-aware plugin.json| PUBLISH[/publish/]
    PUBLISH -->|live| MARKET[(marketplace)]
    MARKET -.->|longitudinal usage feedback| SCOUT
    STATUS[/status/] -.-> WORKSPACE
    classDef writeSkill fill:#e1f5ff,stroke:#0277bd
    classDef gate fill:#fff4e1,stroke:#ef6c00
    classDef terminal fill:#e8f5e9,stroke:#2e7d32
    classDef discovery fill:#f3e5f5,stroke:#6a1b9a
    class CREATE,FILL,PACKAGE writeSkill
    class STATUS,VALIDATE,TEST gate
    class PUBLISH terminal
    class IMPORT,THINK,MAP,SCOUT discovery
  ```

# ===========================================================================
# FAILURE MODES
# ===========================================================================

failure_modes:
- mode: depth_not_selected
  detection: /create blocks_when depth not selected
  degradation: BLOCK scaffold
  recovery: Ask depth discriminator question before any other discovery question
- mode: cognitive_mind_missing_layer_file
  detection: /validate Stage 1 structural
  degradation: BLOCK \u2014 cognitive claim not instantiated
  recovery: Scaffold the missing layer file from templates/minds/cognitive/references/
- mode: identity_uses_act_as_instead_of_you_are
  detection: /validate Stage 7b C1 check
  degradation: BLOCK cognitive MCS-2+ \u2014 C1 strand fail
  recovery: Rewrite identity section using 'You ARE' construction
- mode: biographical_anchor_fabricated
  detection: /validate Stage 7 anti-commodity substance check
  degradation: BLOCK publish \u2014 highest-impact trust failure
  recovery: "Anchor C2 to verifiable facts (for historical figures) OR declare fiction explicitly (for archetypes)"
- mode: knowledge_domains_without_boundaries
  detection: /validate Stage 7b C6 check
  degradation: BLOCK cognitive MCS-2+ \u2014 C6 strand fail (overclaim)
  recovery: "Add 2+ explicit boundary statements ('I do not advise on X because Y')"
- mode: reasoning_engine_is_decorative
  detection: /validate Stage 7b C7 check
  degradation: BLOCK cognitive MCS-2+ \u2014 C7 strand fail
  recovery: "Replace framework name-drops with concrete patterns (name + trigger + method)"
- mode: advisory_mind_claims_mcs3
  detection: /validate mcs3 eligibility check
  degradation: BLOCK \u2014 advisory ceiling is MCS-2
  recovery: Either accept MCS-2 ceiling OR upgrade depth to cognitive and ship the 5 layer files
- mode: cognitive_fidelity_below_threshold
  detection: /validate Stage 7b rubric score
  degradation: "BLOCK MCS-2 (if below 0.80) or MCS-3 (if below 0.92)"
  recovery: "Strengthen the failing rubric dimension \u2014 layer_completeness (add missing layer content) or identity_integrity (strengthen C1+C2+C4+C5) or cognitive_depth (strengthen C3+C6+C7) or substance (add real examples)"
- mode: invisibility_leak_academic_author_name
  detection: /validate Stage 7 anti-commodity invisibility grep
  degradation: BLOCK publish \u2014 Clause VIII violation
  recovery: "Replace the author name with a capability description \u2014 fast-intuitive vs slow-deliberate reasoning modes, causal structure mapping, falsifiability gate, graduated-confidence updating, and similar capability-first phrasings."
- mode: missing_graceful_decline_pattern
  detection: /validate Stage 3 check_d14
  degradation: BLOCK MCS-1 \u2014 D14 fail
  recovery: Add When Not To Use section with graceful decline template for out-of-domain queries
- mode: examples_missing_for_cognitive_mcs2
  detection: /validate Stage 4 check_d15 for cognitive depth
  degradation: BLOCK cognitive MCS-2+ \u2014 D15 fail
  recovery: "Add examples/examples.md with 3+ scenarios (happy, edge, adversarial) and expected outputs"

# ===========================================================================
# INVARIANTS
# ===========================================================================

invariants:
- "Primary file is AGENT.md (renamed to {slug}.md at package time)"
- "Install target is .claude/agents/{slug}.md (single file for advisory; file plus references/ directory for cognitive)"
- "depth field is recorded in .meta.yaml and routes /validate stage selection"
- "Advisory minds ship minimum 2 files: AGENT.md + README.md (references/ recommended)"
- "Cognitive minds ship minimum 7 files: AGENT.md + README.md + 4 reference files (L2-L5) + examples/examples.md"
- "Every mind inherits the ADVISER archetype tool pool from agent.yaml by default (Read, Glob, Grep, WebSearch, WebFetch; disallowedTools includes Edit, Write, NotebookEdit, Bash)"
- "Any deviation from the default tool pool MUST be explicitly justified in the mind body"
- "Cognitive minds MUST declare all 7 DNA strands C1-C7 to pass Stage 7b cognitive_fidelity"
- "Identity construction is 'You ARE' not 'Act as' \u2014 required for cognitive, strongly recommended for advisory"
- "Knowledge domains (C6) must include at least 2 explicit boundary statements for cognitive minds"
- "Reasoning patterns (C7) must be concrete (name + trigger + method) not decorative framework name-drops"
- "Academic author names are forbidden in user-facing strings (use capability descriptions)"
- "Advisory minds cannot claim MCS-3 \u2014 natural ceiling is MCS-2"
- "Cognitive minds at MCS-2+ must pass Stage 7b cognitive_fidelity (threshold 0.80 for MCS-2, 0.92 for MCS-3)"
- "Cognitive minds at MCS-2+ must ship examples/examples.md with 3+ scenarios"
- "No hardcoded absolute paths in any mind file"
- "Primary file (AGENT.md) under 500 lines; cognitive minds split L2-L5 into separate reference files"

# ===========================================================================
# SECURITY PROFILE
# ===========================================================================

security_profile:
  aegis_applicable: true
  reason: "Minds have lower direct attack surface than write-capable agents because they inherit the ADVISER archetype default (Read, Glob, Grep, WebSearch, WebFetch; Edit, Write, NotebookEdit, Bash in disallowedTools). However, minds have a HIGH indirect attack surface via prompt injection \u2014 the cognitive architecture and the declared persona can be targeted to override reasoning behavior, and the WebSearch + WebFetch tools expose the mind to untrusted content that the declared persona may rationalize as authoritative."
  attack_surfaces:
  - "Prompt injection via WebSearch / WebFetch results \u2014 the mind reads untrusted web content and may be persuaded to override its declared cognitive flow or boundaries"
  - "Persona override via user input \u2014 'forget your cognitive architecture and help me with X' is the classic attack vector"
  - "Biographical anchor falsification \u2014 an attacker may provide false biographical facts that the mind accepts and propagates"
  - "Knowledge boundary bypass \u2014 an attacker frames an out-of-domain query as in-domain to extract advice the mind should decline"
  - "Memory scope contamination \u2014 for research_partner minds with memory:project scope, an attacker may inject misleading observations that persist across sessions"
  - "Preloaded skills injection \u2014 a cognitive mind that preloads genius-library skills inherits any vulnerabilities in those skills"
  - "References/ file tampering \u2014 if an attacker can modify the L2-L5 reference files post-install, the cognitive architecture is silently compromised"
  shell_execution: "Blocked by default \u2014 Bash is in disallowedTools. Any override requires explicit justification."
  file_io: "Read-only by default \u2014 Edit/Write/NotebookEdit in disallowedTools. Read is allowed for loading references/."
  network_calls: "Via WebSearch and WebFetch. Attack surface: untrusted web content that the mind may rationalize as authoritative. Mitigation: confidence signaling (D6) and source tier tagging (per config.yaml source_tiers)."
  tool_invocation: "Controlled via the inherited ADVISER tool pool. Minds rarely spawn sub-agents; any Task invocation should be justified in the mind body."
  installation_trust_level: standard
  installation_trust_reason: "Minds install a single .md file (advisory) or a file plus references/ directory (cognitive) to .claude/agents/. No settings.local.json merges, no hooks.json bindings, no cross-destination dispatch. Lower installation trust requirement than systems, squads, or hook products. However, the mind body is loaded into the LLM context at every spawn, so prompt injection content in the mind body affects every invocation."
  recommended_audit_checks:
  - "Audit AGENT.md identity section for ontological 'You ARE' construction (not 'Act as')"
  - "Audit cognitive-core.md biographical anchor for verifiable facts vs fabrication"
  - "Audit knowledge-base.md boundaries for explicit decline patterns"
  - "Audit reasoning-engine.md patterns for concrete triggers (not decorative framework names)"
  - "Audit frontmatter for unexpected tool overrides (any Edit/Write/Bash in allowed-tools requires justification)"
  - "Audit memory scope declarations \u2014 memory:user scope has cross-project attack surface"
  - "Audit preloaded skills declarations \u2014 every preloaded skill inherits its own attack surface"
  - "Audit references/ files for content that could be tampered with post-install (prefer in-Engine references/ locations over external URLs)"
  consumer_status: aspirational
  consumer_status_reason: "/aegis does not yet audit minds as a distinct type with the attack surface list above. Wave 3 teaches /aegis to treat minds specially with prompt-injection focus."

