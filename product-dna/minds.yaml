# ===========================================================================
# TOKEN ECONOMICS
# ===========================================================================

token_economics:
  catalog_cost_tokens: 60
  catalog_cost_reason: "Minds appear in the agent catalog like any agent \u2014 name plus description roughly 50-70 tokens per mind. Cognitive minds with longer descriptions may hit 80-100 tokens in the catalog."
  catalog_cost_source: loadSkillsDir.ts:100-105
  invocation_cost_advisory: "Full AGENT.md (150-300 lines) loaded when mind is spawned via Task. Roughly 2-4K tokens for the body plus references/ loaded on demand."
  invocation_cost_cognitive: "AGENT.md L1 (150-250 lines) loaded at spawn; L2-L5 reference files loaded progressively on demand (total 800-1200 lines across all 5 layers). Roughly 6-10K tokens when all layers are loaded."
  invocation_cost_source: "runAgent.ts:577-646 (skills preload) + agent context fork"
  ambient_cost: "Zero \u2014 minds are loaded on demand via Task spawn, not auto-loaded into the parent context"
  ambient_cost_reason: "Unlike claude-md products which are always in ambient context, minds are spawn-on-demand. Their cost materializes only when the parent invokes Task(subagent_type='{slug}')."
  optimization_notes: |
    Advisory minds stay cheap by keeping AGENT.md under 300 lines and using references/ only
    for rarely-loaded deep domain notes. Cognitive minds must split the 5 layers into separate
    reference files to avoid loading the full 1200 lines at spawn \u2014 L1 stays in AGENT.md (loaded
    at spawn), L2-L5 load on demand when the cognitive flow reaches them. Memory scopes should
    be declared only for research_partner archetype \u2014 memory has per-turn cost even when dormant.
  budget_example: "An advisory domain-advisor mind: catalog ~60 tokens, invocation ~3K tokens. A cognitive research_partner mind with memory project scope: catalog ~80 tokens, invocation ~8K at first spawn, 2K per subsequent spawn when memory is loaded."

