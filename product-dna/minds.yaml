# SCHEMA CONSUMER STATUS
# ===========================================================================

schema_consumer_status:
  fully_wired_sections:
  - "type, primary_file, install_target, template"
  - dna_patterns (per config.yaml routing.minds consumed by /validate)
  - mcs_expectations.mcs1 (blocks_publish enforced)
  - frontmatter (inherited from agent.yaml which is fully-wired)
  - "template_files (templates/minds/ and templates/minds/cognitive/ exist with all 7 files)"
  - depth_discriminator (consumed by config.yaml routing.minds.depth for install file lists)
  - "cognitive_architecture.layers (the 5 template files exist and are consumed by /create when depth=cognitive)"
  partially_wired_sections:
  - "lifecycle.import (detection pattern extended in S118c to recognize minds; depth auto-detection is aspirational)"
  - "lifecycle.validate (reads dna_patterns but does not yet route depth-specific stages including Stage 7b)"
  - "cognitive_dna_strands (enumeration consumed by config.yaml; Stage 7b rubric application is aspirational per GAP-MND-1)"
  - "lifecycle_shared_refs.genius_library (library exists with 2 profiles; catalog expansion is Wave 3)"
  aspirational_sections:
  - essence
  - architectural_principles
  - operational_modes
  - freedom_levels
  - cognitive_sub_types
  - cognitive_fidelity_scoring
  - archetypes
  - anti_patterns_catalog
  - failure_modes
  - invariants
  - security_profile
  - marketplace_taxonomy
  - discovery_questions
  - "lifecycle.create (depth-first discovery walker not yet wired)"
  - "lifecycle.fill (layer-specific walker not yet wired)"
  - "lifecycle.test (scenario runner not yet wired)"
  - "lifecycle.package (depth-aware manifest generation not yet wired)"
  - "lifecycle.publish (depth-aware distribution routing not yet wired)"
  blocking_gaps_for_this_type:
  - id: GAP-MND-1
    where: .claude/skills/validate/references/validation-stages/stage-7b-cognitive-fidelity.md
    issue: "The Stage 7b cognitive_fidelity check is declared in config.yaml validation_pipeline but the stage reference file does not yet exist. Wave 3 forges the file with the cognitive_fidelity_scoring rubric application methodology."
    wave_to_fix: 3
    severity: MAJOR \u2014 cognitive minds cannot be fidelity-scored until the stage file exists
  - id: GAP-MND-2
    where: .claude/skills/validate/SKILL.md
    issue: "/validate does not yet auto-route type=minds AND depth=cognitive through Stage 7b. Even after the stage file is forged, the depth-aware routing in /validate is Wave 3 work."
    wave_to_fix: 3
    severity: MAJOR \u2014 Stage 7b will not fire automatically without depth routing
  - id: GAP-MND-3
    where: myclaude CLI (external)
    issue: "The CLI does not differentiate cognitive mind install (5 reference files + examples/ dispatched) from advisory mind install (single file). Cognitive minds currently install only the primary AGENT.md unless the creator manually places reference files in .claude/agents/ which is not the native layout."
    wave_to_fix: 3
    severity: MAJOR \u2014 cognitive mind distribution relies on manual file placement until CLI ships multi-file dispatch for minds
  - id: GAP-MND-4
    where: .claude/skills/create/SKILL.md
    issue: "/create does not yet walk the depth discriminator as the first-class first question. Currently depth is inferred or defaulted. Wave 3 teaches /create to ask 'advisory or cognitive?' BEFORE any other minds discovery question."
    wave_to_fix: 3
    severity: MAJOR \u2014 depth is discovered implicitly rather than explicitly, producing half-built cognitive minds that were actually intended as advisory
  - id: GAP-MND-5
    where: cognitive_dna_strands.composition_rules.strand_semantic_coherence
    issue: "Stage 7b verifies structural presence of each strand but does not verify semantic coherence across layers (e.g., C3 cognitive flow steps matching C7 reasoning patterns, C6 knowledge domains matching L4 content depth). Wave 3 adds cross-layer coherence checks."
    wave_to_fix: 3
    severity: MINOR \u2014 structural presence is a good first gate; semantic coherence relies on creator discipline until Wave 3
  - id: GAP-MND-6
    where: templates/genius-library/
    issue: "The genius library has only 2 profiles today (_template and one exemplar). Catalog expansion to 10-15 curated profiles is Wave 3 content work."
    wave_to_fix: 3
    severity: MINOR \u2014 GENIUS sub-type is available but the catalog is small; SELF and DOMAIN sub-types are not affected
  - id: GAP-MND-7
    where: references/genius-library-licensing.md
    issue: "Attribution and licensing policy for historical-figure genius profiles is undeclared. Public domain status for long-deceased figures is generally clear, but commercial use, derivative works, and persona likeness rights may have jurisdictional complications. Creators must resolve licensing before publishing genius-sub-type cognitive minds."
    wave_to_fix: 3
    severity: MINOR \u2014 legal hygiene before broader catalog expansion; does not block individual cognitive mind publish with creator's own legal discipline
