marketplace_taxonomy:
  default_category: minds
  default_price: 12
  default_license: MIT
  pricing_rationale: "Minds pricing depends heavily on depth. Advisory minds are solid tier ($5-15) \u2014 domain expertise packaged as declared persona, low forge cost, broad market. Cognitive minds are premium to rare ($15-50) \u2014 the 5-layer architecture, 7 strands, Stage 7b fidelity rubric, and substance check justify premium pricing. Rare-tier cognitive minds (with apex singularity markers and deep domain boundaries) can reach $50-100."
  bundle_eligible: true
  bundle_eligible_reason: "Minds compose with other minds (cognitive councils), with skills (a mind preloading specialist skills), with agents (a mind invoked by an orchestrating agent), with claude-md products (a mind declared as project-level cognitive contributor)."
  composition_eligible_with:
  - agent
  - skill
  - squad
  - system
  - bundle
  - claude-md
  - workflow
  composition_eligible_reason: "Minds compose with most types because they are leaf specialists that can be invoked by any orchestrator. They do NOT compose with design-system (wrong domain), statusline (voice-only), or hooks (event-handler product)."
  consumer_status: aspirational
  consumer_status_reason: "/package today reads vault_defaults from config.yaml. Wave 3 teaches /package to consult this block first for minds with depth-aware pricing."
  natural_tags:
