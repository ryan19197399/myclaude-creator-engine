# ===========================================================================
# DISCOVERY QUESTIONS
# ===========================================================================

discovery_questions:
  rationale: "Minds discovery walks depth FIRST (advisory vs cognitive), then archetype, then sub-type (for cognitive), then the layer-specific questions. The order matters because depth determines which downstream questions apply."
  required_in_order: true
  ordered_questions:
  - id: Q1
    order: 1
    question: "Is this mind advisory (lightweight domain advisor, single file, cheap to forge) or cognitive (apex 5-layer architecture, premium)?"
    feeds: depth_discriminator
    required: true
  - id: Q2
    order: 2
    question: "Which archetype best matches this mind \u2014 domain advisor, cognitive mentor, research partner, strategic thinker, technical specialist, or creative catalyst?"
    feeds: archetypes.selection
    required: true
  - id: Q3
    order: 3
    question: "For cognitive minds only: which sub-type \u2014 SELF (your own expertise), GENIUS (historical or archetypal exemplar from genius-library), or DOMAIN (synthesized from /scout research)?"
    feeds: cognitive_sub_types.selection
    required_for: cognitive
  - id: Q4
    order: 4
    question: "What cognitive judgment does this mind deliver in one sentence? (What does the buyer get that they could not get from vanilla Claude?)"
    feeds: essence.amplifies
    required: true
  - id: Q5
    order: 5
    question: "What 3-6 knowledge domains is this mind deep in, and where does it refuse to advise (adjacent domains)?"
    feeds: cognitive_architecture.layers.L4_knowledge_domains (cognitive) OR knowledge_boundary (advisory)
    required: true
  - id: Q6
    order: 6
    question: "For cognitive minds: what is the mind's cognitive flow \u2014 the named 3-6 step sequence the mind applies to problems?"
    feeds: cognitive_architecture.layers.L2_cognitive_core C3 strand
    required_for: cognitive
  - id: Q7
    order: 7
    question: "For cognitive minds: what 3+ characteristics make this mind irreplaceable (specific cognitive patterns, not generic traits)?"
    feeds: cognitive_architecture.layers.L2_cognitive_core C4 strand
    required_for: cognitive
  - id: Q8
    order: 8
    question: "What 5+ characteristic expressions and what tone define this mind's voice?"
    feeds: cognitive_architecture.layers.L3_personality_engine C5 strand
    required: true
  - id: Q9
    order: 9
    question: "For cognitive minds: what 3+ concrete reasoning patterns does this mind apply, each with a specific trigger condition and a method description?"
    feeds: cognitive_architecture.layers.L5_reasoning_engine C7 strand
    required_for: cognitive
  - id: Q10
    order: 10
    question: "What does this mind refuse to do or claim, even within its domain?"
    feeds: essence.refuses + anti_patterns_catalog
    required: true
  consumer_status: aspirational
  consumer_status_reason: "/create does not yet walk these questions in order. Wave 3 wires the ordered walker with depth-conditional branching."

# ===========================================================================
# ANTI-PATTERNS CATALOG — AP-M1..M8 minds-specific + inherited AP-A1..A6
# ===========================================================================

anti_patterns_catalog:
  scope: "Minds-specific failure modes. Agent anti-patterns (AP-A1..A6 from product-dna/agent.yaml) apply by inheritance. Skill anti-patterns (AP-D1..P3 from product-dna/skill.yaml) apply transitively."
  inherited_from_agent: "AP-A1 through AP-A6 from product-dna/agent.yaml"
  inherited_from_skill: "AP-D1 through AP-P3 from product-dna/skill.yaml transitively"
  aspirational_framework_failures:
    AP_M1_framework_decoration:
      name: Framework Decoration
      symptom: "Mind name-drops famous frameworks in L5 reasoning-engine.md without concrete patterns \u2014 'Uses first-principles thinking, systems analysis, and Bayesian reasoning'"
      problem: "C7 strand is decorative, not operational. The mind looks cognitively deep but reasons generically in practice. Name-dropping frameworks triggers invisibility leak at Stage 7 anti-commodity."
      severity: high
      fix: "Replace framework names with concrete {name, trigger, method} patterns. 'When X happens, apply method Y' \u2014 a pattern the mind can actually detect and execute."
    AP_M2_performative_identity:
      name: Performative Identity
      symptom: "AGENT.md uses 'Act as X' or 'Role-play X' or 'Pretend to be X' instead of 'You ARE X'"
      problem: "C1 strand fail. The ontological construction is measurably better than the performative construction at producing consistent embodied cognition. Performative framing degrades response quality."
      severity: critical
      fix: "Rewrite identity section using 'You ARE' construction. Ontological, not performative."
    AP_M3_fabricated_biographical_anchor:
      name: Fabricated Biographical Anchor
      symptom: "L2 cognitive-core.md contains biographical facts that are either fabricated (for historical figures) or not declared as fiction (for archetypes)"
      problem: "C2 strand fail with highest trust impact. The mind propagates hallucinations as authoritative. Buyers who check the facts discover the fabrication and uninstall with a bad review."
      severity: critical
      fix: "Either anchor C2 to verifiable facts (primary sources for historical figures) OR explicitly declare fiction for archetype-based personas."
    AP_M4_unbounded_knowledge:
      name: Unbounded Knowledge
      symptom: "L4 knowledge-base.md declares domains without explicit boundary statements \u2014 'Expert in research methods and science'"
      problem: "C6 strand fail \u2014 overclaim by construction. The mind will advise beyond its competence on edge cases because it never declared where competence ends."
      severity: high
      fix: "Add 2+ explicit boundary statements per domain. 'I do not advise on X because Y.' Specific domains, specific reasons."
  architecture_failures:
    AP_M5_strand_bleeding_across_layers:
      name: Strand Bleeding Across Layers
      symptom: "Cognitive flow (C3) documented in L1 AGENT.md instead of L2 cognitive-core.md; OR communication DNA (C5) scattered across multiple layer files"
      problem: "Progressive disclosure (D3) is broken \u2014 the layer decomposition is cosmetic rather than functional. Edits to one layer affect unrelated strands."
      severity: medium
      fix: "Move each strand to its declared layer \u2014 C1 in L1, C2+C3+C4 in L2, C5 in L3, C6 in L4, C7 in L5."
    AP_M6_monolithic_cognitive_file:
      name: Monolithic Cognitive File
      symptom: "Cognitive mind ships a single 1000-line AGENT.md with all 5 layers inlined instead of splitting into the 5 separate layer files"
      problem: "D3 violation \u2014 progressive disclosure impossible. Every invocation loads the full 1000 lines even when only L1 is needed at boot. Ambient cost at spawn is 5x what it should be."
      severity: high
      fix: "Split L2-L5 into separate reference files (cognitive-core.md, personality.md, knowledge-base.md, reasoning-engine.md). Keep L1 in AGENT.md under 250 lines."
  boundary_failures:
    AP_M7_missing_graceful_decline:
      name: Missing Graceful Decline
      symptom: "No When Not To Use section; mind produces answers for out-of-domain queries rather than declining"
      problem: "D14 fail \u2014 the mind fabricates rather than declining. Buyers get wrong advice confidently and the trust contract breaks."
      severity: critical
      fix: "Add When Not To Use section with declared templates for out-of-domain decline. 'I do not advise on X. Consider Y or Z instead.'"
    AP_M8_write_capable_without_justification:
      name: Write-Capable Without Justification
      symptom: "Mind declares Edit, Write, NotebookEdit, or Bash in allowed-tools without explicit justification in the mind body"
      problem: "Inherits ADVISER archetype implies read-only judgment. Override without justification creates unexpected tool surface \u2014 the buyer installs a mind expecting advisory behavior and gets a write-capable agent."
      severity: high
      fix: "Either remove the write-capable tools (restore ADVISER default) OR add explicit justification in the mind body naming why write capability is essential to the declared cognitive judgment."
  severity_definitions:
    critical: "Breaks the mind's trust contract \u2014 must fix before publish"
    high: "Significant degradation \u2014 fix recommended for MCS-2"
    medium: "Suboptimal \u2014 fix for MCS-3"
    low: "Polish"
  consumer_status: aspirational
  consumer_status_reason: "Wave 3 teaches /validate Stage 7 to grep against AP-M1..M8 plus inherited AP-A1..A6 from agent.yaml plus transitive skill anti-patterns."

