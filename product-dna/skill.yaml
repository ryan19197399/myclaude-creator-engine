  source_section: states
  scope: universal
  type_specific_branches: []
  regression_rules: Universal — file edit after validation regresses to content
  publish_prerequisites_addendum:
  - test_result == pass (for MCS-2+ skills)
  publish_prerequisites_addendum_reason: Skills at MCS-2+ require behavioral verification beyond structural validation
