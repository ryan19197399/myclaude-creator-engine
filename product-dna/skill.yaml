token_economics:
  catalog_cost_tokens: 50
  catalog_cost_source: loadSkillsDir.ts:100-105 — name + description + whenToUse → roughTokenCountEstimation (chars / 4)
  catalog_cost_reason: name + description loaded in catalog as part of every session's skill registry
  invocation_cost: load_on_demand
  invocation_cost_reason: Full SKILL.md loaded only when user invokes /skill-name OR Claude auto-invokes via description match
  ambient_cost: zero
  ambient_cost_reason: Skills are not auto-loaded — they activate via trigger
  optimization_notes: 'Short focused description = lower catalog cost. Long reference content

    in references/ = zero cost until invoked. Scripts and assets do not

    consume tokens unless explicitly loaded by Claude.

    '
  budget_example: 12 skills × 50 tokens each = ~600 tokens always in catalog
compact_instructions:
  applicable: true
  location: 'SKILL.md → ## Compact Instructions section'
  source_reference: compact/prompt.ts:133-143
  preserves:
  - creator intent
  - MCS scores
  - acceptance criteria
  - question system state
  - error states
  - current archetype + freedom level
discovery_questions:
  source_of_truth: this file (canonical for skill)
  legacy_location: '.claude/skills/create/references/discovery-questions.md → ## Skills section'
  legacy_status: PARTIAL — discovery-questions.md has a Skills section but does NOT include archetype selection or reasoning framework offering. Wave 4 should align discovery-questions.md with this codex
    OR deprecate it in favor of per-type codex blocks.
  minimum_set:
  - What specific problem does this skill solve? (One sentence — not 'helps with X')
  - 'Which archetype best matches: Executor (technical operations), Guide (process with variation), Framework (abstract principles), or Meta (generates other structures)?'
  - What triggers should activate this skill? (specific patterns or keywords users would say)
  - Who is the target user? (developer type, expertise level, role)
  - What domain knowledge does the skill need? (what goes in references/)
  - What output format should the skill produce? (markdown, JSON, structured text, code, other)
  - What are the top 5 things this skill should NEVER do?
  depth_set:
  - What inputs does the skill expect? (files, arguments, context, conversation state)
  - What tools or integrations does it need? (Read, Write, Bash, WebFetch, etc.)
  - Can this skill be part of a larger workflow? If so, what are its inputs/outputs as a component?
  - What existing tools/approaches does this compete with? What will yours do differently?
  - How should the skill handle ambiguous input? (ask one clarifying question / try anyway / refuse)
  - What is the ONE thing about this skill that no other skill on the marketplace would have?
  - When would a buyer SWITCH AWAY from this skill?
  archetype_specific_questions:
    executor:
    - What scripts will the skill provide? (one per atomic operation)
    - What edge cases must each script handle?
    - What are the dependencies (libraries, system tools)?
    guide:
    - What is the decision tree for the main process?
    - What contextual variations exist? How do they branch?
    - What heuristics adjust the process per context?
    framework:
    - What are the 3-5 central principles?
    - 'For each principle: what is the violation marker? what tension does it have with other values?'
    - What anti-patterns are critical to document?
    meta:
    - What does the skill generate?
    - What is the validation criterion for the generated output?
    - What is the iteration cycle (how does the generator improve)?
  reasoning_framework_offering:
    when: If creator answers 'I'm not sure' or vague to 2+ minimum_set questions
    offering: Would you like to think through this with one of 7 reasoning frameworks? (first principles, inversion, jobs-to-be-done, constraint-led, comparative, stakeholder mapping, risk analysis)
    routing: Based on which question stuck, route to the appropriate framework
  per_subtype: null
  per_subtype_reason: Skills do not have subtypes — they have ARCHETYPES which are queried in minimum_set
paths_scoping:
  description: Optional glob patterns to scope skill activation to specific file types
  example: 'paths: [''src/**/*.ts'', ''tests/**/*.test.ts'']'
  default: '**/* (activates everywhere — no paths key in frontmatter)'
  benefit: Saves context window — skill description only loaded when working on matching files
  when_to_use: Domain-specific skills (e.g., a SQL review skill should only activate on *.sql files)
  source_reference: claudemd.ts:254-268
acceptance_criteria:
  description: Machine-verifiable criteria that prove the product achieves its stated goal
  filled_by: /fill ACCEPTANCE CRITERIA CAPTURE step
  verified_by: /validate Stage 2 (Integrity) AND /test must_haves verification
  schema:
    truths:
      description: Observable behaviors from user perspective
      example: Running /my-skill on a TypeScript file produces a security report
    artifacts:
      description: Files that must exist with substantive content
      example: references/patterns.md >50 lines
    key_links:
      description: Critical connections between files
      example: SKILL.md references references/ >=2 times
state_machine_hooks:
