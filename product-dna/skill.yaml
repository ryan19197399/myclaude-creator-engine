    D2:
      required: true
      applicable: true
      name: Anti-Pattern Guard
      check: grep anti-pattern section with >=5 items
    D3:
      required: true
      applicable: true
      name: Progressive Disclosure
      check: references/ exists + primary <500 lines
    D4:
      required: true
      applicable: true
      name: Quality Gate
      check: grep quality gate with >=3 verifiable criteria
    D13:
      required: true
      applicable: true
      name: Self-Documentation
      check: README.md with what/install/usage/requirements
    D14:
      required: true
      applicable: true
      name: Graceful Degradation
      check: grep 'when not to use' or error handling
    D19:
      required: false
      applicable: true
      name: Attention-Aware Authoring
      check: critical rules in last 30% of file
  tier2:
    D5:
      required: true
      applicable: true
      name: Question System
      check: grep question/input table or 'if missing, ask'
    D6:
      required: false
      applicable: true
      name: Confidence Signaling
      check: grep confidence levels or certainty markers
    D7:
      required: true
      applicable: true
      name: Pre-Execution Gate
      check: grep precondition checks
    D8:
      required: false
      applicable: true
      name: State Persistence
      check: state file or persistence section
    D15:
      required: false
      applicable: true
      name: Testability
      check: test scenarios or expected outputs
    D16:
      required: true
      applicable: true
      name: Composability
      check: no hardcoded paths, no common command names
    D17:
      required: false
      applicable: true
      name: Hook Integration
      check: hooks section in frontmatter or docs
    D20:
      required: false
      applicable: false
      name: Cache-Friendly Design
      reason: Skills are not always-loaded — claude-md is the only type with D20 required.
  tier3:
    D9:
      required: false
      applicable: false
      name: Orchestrate Don't Execute
      reason: Single skills do not orchestrate — squads and systems do.
    D10:
      required: false
      applicable: false
      name: Handoff Specification
      reason: Single skills do not have handoffs — squads and systems do.
    D11:
      required: false
      applicable: true
      name: Socratic Pressure
      check: self-challenge or falsification pattern (optional bonus for skills)
    D12:
      required: false
      applicable: false
      name: Compound Memory
      reason: Cross-session memory is for agents/squads — skills are stateless within invocation.
    D18:
      required: false
      applicable: false
      name: Subagent Isolation
      reason: Single skills do not spawn subagents — squads and systems do.
