# product-dna/claude-md.yaml — DNA requirements for CLAUDE.md products
# Read by /create, /validate, /package when type=claude-md

type: claude-md
primary_file: CLAUDE.md
install_target: ".claude/rules/{slug}.md"
template: "templates/claude-md/"

dna_patterns:
  tier1:
    D1:  { required: true,  name: "Activation Protocol",    check: "boot sequence or activation section" }
    D2:  { required: true,  name: "Anti-Pattern Guard",     check: "anti-patterns or DON'T section >=5 items" }
    D3:  { required: true,  name: "Progressive Disclosure",  check: "references/ for detailed knowledge" }
    D4:  { required: false, name: "Quality Gate",            applicable: false, note: "CLAUDE.md sets rules, not gates" }
    D13: { required: true,  name: "Self-Documentation",      check: "README.md with install/usage" }
    D14: { required: false, name: "Graceful Degradation",    check: "scope containment rules" }
    D19: { required: true,  name: "Attention-Aware Authoring", check: "critical rules/constraints in last 30% of file" }
  tier2:
    D5:  { required: false, applicable: false }
    D6:  { required: false, applicable: false }
    D7:  { required: false, name: "Pre-Execution Gate", check: "boot sequence with file reads before action" }
    D8:  { required: false, applicable: false }
    D15: { required: false, applicable: false }
    D16: { required: true,  name: "Composability",           check: "no hardcoded paths, namespace-safe" }
    D17: { required: false, name: "Hook Integration",        check: "hooks config if applicable" }
    D20: { required: true,  name: "Cache-Friendly Design",    check: "paths: frontmatter, <2K primary, no dynamic content" }
  tier3:
    D9:  { applicable: false }
    D10: { applicable: false }
    D11: { applicable: false }
    D12: { applicable: false }
    D18: { applicable: false }

mcs_expectations:
  mcs1: "D1+D2+D3+D13+D19 PASS. Score >= 75%."
  mcs2: "D16+D20 required. Score >= 85%."
  mcs3: "Not applicable — CLAUDE.md max MCS-2."

template_files:
  - source: "CLAUDE.md.template"
    target: "CLAUDE.md"
    dna_injected: [D1, D2, D3, D19]
  - source: "README.md.template"
    target: "README.md"
    dna_injected: [D13]

# Frontmatter for claude-md products [SOURCE: claudemd.ts:254-268]
# CLAUDE.md files themselves don't use frontmatter, but when installed as
# .claude/rules/{slug}.md, they CAN use paths frontmatter for scoping.
frontmatter:
  required: []    # The file content IS the product — no name/description needed
  optional:
    - paths       # Glob patterns for activation scope [SOURCE: claudemd.ts:254-268]
                  # When set, rule only loads when user works on matching files
                  # Example: paths: ['src/api/**', 'src/routes/**']
                  # Uses picomatch for matching. ** alone = unscoped.

platform_features:
  at_include: "CLAUDE.md supports @path imports [SOURCE: claudemd.ts:451-469]. Circular refs prevented. Non-existent files silently ignored."
  paths_scoping: "Rules with `paths:` frontmatter only load when working on matching files [SOURCE: claudemd.ts:254-268]"
  html_stripping: "<!-- comments --> are auto-stripped from memory files [SOURCE: claudemd.ts:282-334]. WHY annotations are invisible to the model."
  distribution_constraint: "Rules CANNOT be distributed via plugin.json. Must be manually copied."
  local_override: "Buyers can use CLAUDE.local.md for private overrides (gitignored, high priority) [SOURCE: claudemd.ts:922-933]"

# Token economics [SOURCE: loadSkillsDir.ts — memory type analysis]
token_economics:
  catalog_cost: "N/A — claude-md products are not in skill catalog"
  invocation_cost: "N/A — always loaded, not invoked"
  ambient_cost: "HIGH — every character loaded EVERY turn as Project memory [SOURCE: claudemd.ts:790-960]"
  optimization: "CRITICAL: minimize ruthlessly. Every char costs tokens every turn. Move details to @included files."
  warning: "claude-md is the ONLY product type with permanent ambient cost. Optimize aggressively."

# Compact instructions applicability
compact_instructions:
  applicable: true
  location: "CLAUDE.md → ## Compact Instructions section [SOURCE: compact/prompt.ts:133-143]"
  preserves: "All rules, path-scoped conditions, error handling, purpose statement"
  note: "Since claude-md is always loaded, compact instructions protect the BUYER's session"

discovery_questions:
  - "What kind of project is this CLAUDE.md designed for?"
  - "What rules and conventions must Claude follow in this project?"
  - "What are the top 5 things Claude should NEVER do in this context?"
  - "What boot sequence should run at the start of each session?"
  - "What reference files should Claude load for domain knowledge?"
  - "How should this compose with the user's existing CLAUDE.md?"
