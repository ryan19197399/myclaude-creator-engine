token_economics:
  catalog_cost_tokens: 0
  catalog_cost_reason: Output styles are not in the skill catalog — they activate via selection, not invocation.
  invocation_cost: low
  invocation_cost_reason: When the buyer selects this style, the file content loads into the system prompt and persists while active.
  ambient_cost: zero_when_inactive
  ambient_cost_active: low
  ambient_cost_reason: 'Zero tokens when not selected. When selected, the entire style file persists in context across turns (low: ~500-1500 tokens for a typical 2K char style).'
  optimization_notes: 'Output styles persist in context while active. Every character costs tokens

    on every turn. Keep style files lean — under 2K is ideal, 4K is the hard

    ceiling. Move elaborations to README.md (not loaded at runtime) rather than

    bloating the style file with examples.

    '
compact_instructions:
  applicable: true
  location: 'OUTPUT-STYLE.md → ## Compact Instructions section'
  preserves:
  - voice and tone rules
  - formatting rules
  - anti-patterns (what this style refuses)
  - keep-coding-instructions setting value
  source_reference: compact/prompt.ts:133-143
  reason_for_applicability: Output styles persist across compaction — without compact instructions, the buyer's Claude reverts to default style mid-conversation, breaking the buyer's workflow silently.
discovery_questions:
  source_of_truth: this file (canonical for output-style)
  legacy_location: .claude/skills/create/references/discovery-questions.md
  legacy_status: GAP — discovery-questions.md does NOT contain an output-style entry (verified via grep). This codex is the authoritative source. Wave 4 should either add output-style to discovery-questions.md
    aligned with this codex, OR deprecate discovery-questions.md entirely in favor of per-type codex blocks.
  minimum_set:
  - What kind of output should Claude produce with this style? (technical docs, creative writing, concise reports, etc.)
  - What formatting rules should Claude follow? (headers, lists, code blocks, line length)
  - What should Claude NEVER do when using this style? (at least 3 specific refusals)
  - Should Claude keep its default coding instructions alongside your style rules? (true/false — default true)
  depth_set:
  - Who is the audience for the output this style produces? (a senior engineer, a non-technical stakeholder, your future self?)
  - Pick a paragraph you wrote that captures the voice you want. What makes it feel like you?
  - What is the ONE word that describes this voice that no other style on the marketplace would claim?
  - When would a buyer SWITCH AWAY from this style? (knowing the boundary builds trust)
  per_subtype: null
  per_subtype_reason: Output styles have no subtypes.
