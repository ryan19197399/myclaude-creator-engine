  optional: true
  optional_for: MCS-1
  required_for: MCS-2+

# ===========================================================================
# TOKEN ECONOMICS
# ===========================================================================

token_economics:
  catalog_cost_tokens: 50
  catalog_cost_source: loadSkillsDir.ts:100-105 — same formula applies to agents since both live in the skill/agent catalog
  catalog_cost_reason: name + description loaded in agent catalog as part of every session's agent registry
  invocation_cost: load_on_demand
  invocation_cost_reason: Full AGENT.md loaded only when Task tool spawns this agent
  ambient_cost: zero
  ambient_cost_reason: Agents are not auto-loaded — they activate via Task spawn
  optimization_notes: 'Short focused description = lower catalog cost. Long reference content

    in references/ = zero cost until spawn. Preloaded skills via skills: frontmatter

    ARE loaded at every spawn, so keep the preloaded list small (max 3).

    Ephemeral MCP servers are destroyed on finish, so they do not leak cost

    across invocations.
    '
  budget_example: 10 agents × 50 tokens each = ~500 tokens always in catalog
  omitClaudeMd_savings: '5-15 Gtok/week at fleet scale per read-only archetype adoption [SOURCE: loadAgentsDir.ts:127-133]'
  gitStatus_skip_savings: '1-3 Gtok/week at fleet scale when archetype is Explore or Plan [SOURCE: runAgent.ts:404-410]'

# ===========================================================================
# COMPACT INSTRUCTIONS
# ===========================================================================

compact_instructions:
  applicable: true
  location: 'AGENT.md → ## Compact Instructions section'
  source_reference: compact/prompt.ts:133-143
  preserves:
  - persona identity
  - tool boundary declaration
  - output contract
  - current archetype
  - constitution summary
  - active delegation state

# ===========================================================================
# DISCOVERY QUESTIONS
# ===========================================================================

discovery_questions:
  source_of_truth: this file (canonical for agent)
  legacy_location: ".claude/skills/create/references/discovery-questions.md → ## Agents section (if exists)"
  legacy_status: unverified in S118 — Wave 4 should align or deprecate
  minimum_set:
  - 'Which agent archetype matches your need? SCOUT (fast read-only search), ARCHITECT (read-only planning), GENERALIST (all-purpose), SPECIALIST (narrow write authority), ADVISER (read-only judgment), ORCHESTRATOR (routes to other agents), or FORK_HEIR (inherits parent context for parallel work)?'
  - What specific delegated task does this agent perform? (One sentence — not 'helps with X')
  - What parent contexts will spawn this agent? (When does it get invoked?)
  - What tool boundary defines its scope? (What tools does it need? What tools must it be denied?)
  - What does the agent return to the parent? (text report, labeled fields, verdict, ranked list)
  - What are the top 5 things this agent should NEVER do?
  - Does this agent need cross-invocation memory? If yes, which scope (user/project/local)?
  depth_set:
  - What reasoning framework or methodology drives the agent's decisions?
  - Should this agent inherit the parent's CLAUDE.md hierarchy? (Default yes for write archetypes, no for read-only)
  - Does this agent need its own MCP servers? If yes, shared (reference) or ephemeral (inline)?
  - Does this agent need a criticalSystemReminder_EXPERIMENTAL that re-injects its constitution every turn?
  - How should the agent handle ambiguous input? (ask one question / proceed with default / refuse)
  - What would the PARENT LLM need to know to decide whether to invoke this agent vs. a built-in?
  - What existing agents (Claude Code built-ins OR marketplace) does this compete with? What makes yours different?
  archetype_specific_questions:
    scout:
    - What are you searching FOR? (files, patterns, structures)
    - How fast is 'fast'? (return in seconds, return in under 2 minutes)
    - What are the thoroughness levels? (quick, medium, thorough)
    architect:
    - What kind of plan? (implementation plan, migration plan, refactoring plan)
    - What critical-files count is appropriate for your domain? (3, 5, 10)
    - What trade-offs does your domain have? (complexity vs speed, cost vs correctness)
    generalist:
    - What is the scope? (narrow but varied, or truly open-ended?)
    - Why a generalist instead of a specialist? (what makes this not a narrow domain?)
    specialist:
    - What is the narrow scope? (specific file types, specific operations)
    - What must the specialist NEVER touch outside its scope?
    - What is the commit convention? (per change, per task, end of session)
    adviser:
    - What kind of judgment? (ranking, critique, verification, recommendation)
    - What confidence levels does the adviser use? (high/moderate/low, or numeric)
    - What happens when the adviser disagrees with the parent's direction?
    orchestrator:
    - How many specialists does your squad have?
    - What is the routing logic? (sequential, parallel, conditional)
    - How does the orchestrator synthesize specialist returns?
    fork_heir:
    - What parent context does the fork inherit?
    - What is the fork's scope boundary? (what must it not touch in the inherited context)
    - What format is the return report? (labeled fields per fork directive convention)
  reasoning_framework_offering:
    when: If creator answers 'I'm not sure' or vague to 2+ minimum_set questions
    offering: Would you like to think through this with one of the reasoning frameworks? (jobs-to-be-done is recommended for agent creation — the 'job' is the delegated task)
    routing: jobs_to_be_done is the default; fall back to first_principles if the creator cannot describe the job either

