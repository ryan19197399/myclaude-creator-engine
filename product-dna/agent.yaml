# ===========================================================================

schema_consumer_status:
  fully_wired_sections:
  - type, primary_file, install_target, template (read by /create, /validate, /package, /test, /import)
  - dna_patterns (read by /validate Stage 3, 4, 5)
  - mcs_expectations (read by /validate scoring)
  - frontmatter (read by /create scaffold + /package Step 1.5 verify)
  - template_files (read by /create scaffold)
  - discovery_questions.minimum_set (read by /create)
  partially_wired_sections:
  - lifecycle.create (skill reads product-dna but not lifecycle.create.discovery_phase.archetype_selection_required or archetype_first)
  - lifecycle.fill (skill reads product-dna but not lifecycle.fill.sections_walked)
  - lifecycle.validate (skill reads dna_patterns but not per_stage_hooks structured form)
  - lifecycle.test (skill reads install_target but not type_specific_steps)
  - lifecycle.package (skill reads install_target/package_rename but not step_6b_verify)
  - lifecycle.import (detection is generic — does not check agent-specific fields)
  aspirational_sections:
  - essence
  - architectural_principles
  - operational_modes
  - freedom_levels
  - archetypes (CRITICAL — no current consumer; Wave 3 teaches /create to ask archetype first)
  - description_engineering (no consumer; Wave 3 teaches /validate Stage 3 D1 to apply agent-specific rubric)
  - progressive_disclosure_model
  - maturity_model
  - quality_rubric
  - anti_patterns_catalog (the AP-A1..A6 additions)
  - reasoning_frameworks
  - decision_trees
  - stakeholder_mapping
  - output_patterns
  - output_contract (CRITICAL — no current consumer; Wave 3 teaches /validate Stage 4 to verify body has matching Output format section)
  - flow
  - failure_modes
  - invariants
  - security_profile
  - marketplace_taxonomy
  - lifecycle_shared_refs.claude_code_ground_truth (new in S118 — must be consumed by Wave 3 as the verified source for all native claims)
  blocking_gaps_for_this_type:
  - id: GAP-1
    where: .claude/skills/import/SKILL.md detection table
    issue: 9 types listed including agent. Detection is generic (single .md with frontmatter) — does not check for agent-specific fields like tools, mcpServers, criticalSystemReminder_EXPERIMENTAL
    wave_to_fix: 3
    severity: minor — detection works for basic agents
  - id: GAP-2
    where: ".claude/skills/create/references/discovery-questions.md → ## Agents section"
    issue: existence and completeness unverified in S118
    wave_to_fix: 4
    severity: unknown
