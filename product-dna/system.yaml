# product-dna/system.yaml — DNA requirements for Systems
# Read by /create, /validate, /package when type=system
# Systems are the most complex product type — ALL 18 DNA patterns apply

type: system
primary_file: CLAUDE.md
install_target: ".claude/commands/{slug}/"
template: "templates/system/"

dna_patterns:
  tier1:
    D1:  { required: true,  name: "Activation Protocol",    check: "grep activation/boot section + references/ ref" }
    D2:  { required: true,  name: "Anti-Pattern Guard",     check: "grep anti-pattern section >=5 items" }
    D3:  { required: true,  name: "Progressive Disclosure",  check: "references/ dir + CLAUDE.md <500 lines" }
    D4:  { required: true,  name: "Quality Gate",            check: "grep quality gate >=3 criteria" }
    D13: { required: true,  name: "Self-Documentation",      check: "README.md with what/install/usage/requirements" }
    D14: { required: true,  name: "Graceful Degradation",    check: "error/fallback/degradation section" }
    D19: { required: false, name: "Attention-Aware Authoring", check: "critical rules in last 30% of file" }
  tier2:
    D5:  { required: true,  name: "Question System",         check: "input classification or triage table" }
    D6:  { required: true,  name: "Confidence Signaling",    check: "confidence levels in system output" }
    D7:  { required: true,  name: "Pre-Execution Gate",      check: "precondition checks before routing" }
    D8:  { required: true,  name: "State Persistence",       check: "state management (STATE.yaml or equivalent)" }
    D15: { required: true,  name: "Testability",             check: "test scenarios with expected routing" }
    D16: { required: true,  name: "Composability",           check: "no hardcoded paths, no common names, relative refs" }
    D17: { required: false, name: "Hook Integration",        check: "hooks for system events" }
  tier3:
    D9:  { required: true,  name: "Orchestrate Don't Execute", check: "CLAUDE.md has routing table, no domain instructions" }
    D10: { required: true,  name: "Handoff Spec",              check: "handoff template between components" }
    D11: { required: true,  name: "Socratic Pressure",         check: "self-challenge at decision points" }
    D12: { required: true,  name: "Compound Memory",           check: "memory config with project scope" }
    D18: { required: true,  name: "Subagent Isolation",        check: "context:fork in agent/component definitions" }
    D20: { required: false, name: "Cache-Friendly Design", check: "paths: frontmatter if generates rules files" }

mcs_expectations:
  mcs1: "All Tier 1 PASS. Score >= 75%."
  mcs2: "Tier 1+2 all required PASS. Score >= 85%."
  mcs3: "ALL 18 patterns PASS. Score >= 92%. PRO validation required."

required_files:
  - "CLAUDE.md"
  - "STATE.yaml"
  - "README.md"
  - "config/routing.yaml"

template_files:
  - source: "CLAUDE.md.template"
    target: "CLAUDE.md"
    dna_injected: [D1, D2, D4, D5, D7, D9, D10, D14]
  - source: "CLAUDE.local.md.template"
    target: "CLAUDE.local.md"
    dna_injected: []
    optional: true
    note: "Private buyer-specific config (gitignored). [SOURCE: claudemd.ts:922-933]"
  - source: "STATE.yaml.template"
    target: "STATE.yaml"
    dna_injected: [D8]
  - source: "README.md.template"
    target: "README.md"
    dna_injected: [D13]
  - source: "references/domain-knowledge.md.template"
    target: "references/domain-knowledge.md"
    dna_injected: [D3]
  - source: "agents/specialist.md.template"
    target: "agents/"
    dna_injected: [D8, D11, D12, D18]
  - source: "plugin.json.template"
    target: ".claude-plugin/plugin.json"
    dna_injected: [D16]
    optional: true
    note: "Generated by /package for marketplace distribution. Not required for CC native operation."

frontmatter:
  required:
    - name            # System invocation name [SOURCE: loadSkillsDir.ts]
    - description     # Catalog display, token counted [SOURCE: loadSkillsDir.ts:100-105]
  recommended:
    - tools           # Minimal tool list for system orchestrator
    - model           # Force model for orchestrator (opus recommended) [SOURCE: AgentTool.ts]
    - "argument-hint" # Usage hint for /help
  optional:
    - "allowed-tools" # Restrict tool access [SOURCE: loadSkillsDir.ts]
    - "denied-tools"  # Block specific tools [SOURCE: loadSkillsDir.ts]
    - memory          # user|project|local [SOURCE: AgentTool internals]
    - permissionMode  # default|plan|dontAsk
    - maxTurns        # Limit orchestrator iterations [SOURCE: AgentTool.ts]
    - effort          # Reasoning effort [SOURCE: frontmatterParser.ts]
    - skills          # Preloaded skill knowledge
    - hooks           # System-scoped hooks [SOURCE: schemas/hooks.ts]
    - whenToUse       # Auto-trigger conditions, token counted [SOURCE: loadSkillsDir.ts]

# Token economics [SOURCE: loadSkillsDir.ts:100-105]
token_economics:
  catalog_cost: "name + description + whenToUse → ~50-100 tokens in catalog"
  invocation_cost: "Full CLAUDE.md + STATE.yaml + routing loaded on invoke"
  ambient_cost: "Zero — systems are command-type, loaded on demand"
  optimization: "CLAUDE.md as routing table. Components in agents/. Knowledge in references/."

# Compact instructions applicability
compact_instructions:
  applicable: true
  location: "SYSTEM.md (CLAUDE.md) → ## Compact Instructions section"
  preserves: "boot state, component registry, routing table, active operations, configuration"

canonical_refs:
  description: "Mandatory section listing full paths to every external reference downstream consumers must read"
  required: true
  validation: "grep canonical_refs|canonical references in primary file"

discovery_questions:
  - "What complex domain does this system operate in?"
  - "How many distinct agents/components does it need?"
  - "What is the orchestration pattern (hub-spoke, pipeline, mesh)?"
  - "How do components communicate — what handoff protocol?"
  - "What state must persist across sessions?"
  - "What quality gates exist between system phases?"
  - "How does the system handle component failure?"
  - "What is the system's memory architecture?"
