# ===========================================================================
# INSTALL MANIFEST — multi-destination dispatch for organism bundles
# ===========================================================================
# Extends squad.yaml install_manifest with system-specific multi-destination
# dispatch. A system ships a CLAUDE.md fragment, optional hooks fragment,
# optional output-style, optional sub-squads, optional sub-agents, optional
# sub-skills — each of these goes to a DIFFERENT native destination. The
# install_manifest declares every target explicitly, the install-manifest.lock
# records the hashes, and uninstall reverses the dispatch exactly.

install_manifest:
  rationale: "Systems are the most multi-targeted product type. A single organism can ship content to .claude/rules/ (claude-md fragment), .claude/settings.local.json (hooks fragment via merge), .claude/agents/ (sub-agents), .claude/squads/ (sub-squads), .claude/skills/ (preloaded specialist skills), .claude/output-styles/ (external voice), .claude/systems/{slug}/ (organism root with STATE.yaml and routing). install_manifest is the declarative contract that makes this dispatch auditable and reversible."
  schema:
    version: "integer — manifest schema version (current: 1)"
    organism_root: "path — the system's own directory, typically .claude/systems/{slug}/"
    targets:
      type: list
      item_schema:
        source: "relative path inside the organism bundle (e.g., CLAUDE.md, hooks.json, agents/observer.md)"
        target: "destination path using {slug} placeholder and one of the canonical native destinations"
        kind: "one of: copy, merge, append"
        kind_details:
          copy: "Plain file copy to the target location. Overwrites only with --force."
          merge: "For JSON files (settings.local.json, plugin.json). The source is merged into the target by key, with added keys tracked in install-manifest.lock for exact removal at uninstall."
          append: "For text files (.claude/rules/{slug}.md if appending to an existing rules file, README.md badges). Appends with BEGIN/END markers for idempotent removal."
    post_install_hint: "string — message shown after install (invocation instructions)"
    pre_uninstall_checks: "optional list of checks before uninstall"
  canonical_example: |
    version: 1
    organism_root: ".claude/systems/{slug}/"
    targets:
      - source: CLAUDE.md
        target: ".claude/rules/{slug}.md"
        kind: copy
      - source: STATE.yaml
        target: ".claude/systems/{slug}/STATE.yaml"
        kind: copy
      - source: config/routing.yaml
        target: ".claude/systems/{slug}/config/routing.yaml"
        kind: copy
      - source: hooks.json
        target: ".claude/settings.local.json"
        kind: merge
      - source: agents/observer.md
        target: ".claude/agents/{slug}__observer.md"
        kind: copy
      - source: agents/orchestrator.md
        target: ".claude/agents/{slug}__orchestrator.md"
        kind: copy
      - source: squads/review-squad/
        target: ".claude/squads/{slug}__review-squad/"
        kind: copy
      - source: output-style.md
        target: ".claude/output-styles/{slug}.md"
        kind: copy
    post_install_hint: |
      Organism installed. Invoke via:
        Task(subagent_type: "{slug}__orchestrator", prompt: "<your request>")
      Or let the SessionStart hook auto-align on the next session start.
  namespace_strategy:
    default: "double-underscore prefix — {slug}__{role} — for agents and squads to prevent collision with other installed products"
    alternative: "subdirectory — {slug}/{role} — for skills where native path namespace is supported"
    source: "loadSkillsDir.ts:523-543 native namespace via pathSep; squad.yaml namespace_strategy as precedent"
  idempotency_rules:
  - "Install is idempotent — re-running with the same manifest produces no changes"
  - "Uninstall is idempotent — re-running after first uninstall is a no-op"
  - "append operations use BEGIN/END markers; uninstall removes content between markers exactly"
  - "merge operations preserve unrelated keys; uninstall removes only keys the install added, tracked via install-manifest.lock"
  manifest_lock:
    description: "On install, myClaude writes install-manifest.lock listing every file created, every append marker position, every merged key, every hash. Uninstall reads this lock and reverses exactly."
    schema:
      installed_files: "list of absolute paths created"
      appended_sections: "list of {file, start_marker, end_marker}"
      merged_keys: "list of {file, key_path}"
      install_timestamp: ISO 8601
      manifest_version: integer
      source_hashes: "per source file sha256"
      target_hashes: "per target file sha256 at install time"
  forward_compat_note: "If Claude Code ships native system-install support in a future release, install_manifest becomes a no-op and systems install natively. The bundle structure already matches the expected native layout."
  consumer_status: aspirational
  consumer_status_reason: "The myClaude CLI does not yet consume install_manifest for multi-destination dispatch. Wave 3 extends the CLI to read install_manifest and perform the multi-target install with lock generation. Until then, systems install via manual file placement and the manifest serves as documentation."

# ===========================================================================
# ORGANISM STATE MACHINE (system-specific lifecycle states)
# ===========================================================================
# Renamed from state_machine to organism_state_machine to avoid conceptual
# collision with state_machine_hooks (which refers to the Engine-level
# lifecycle states of the forged product: scaffold, content, validated, tested,
# packaged, published). The organism_state_machine describes the RUNTIME
# lifecycle states of an installed system as it operates — a different concept.

organism_state_machine:
  rationale: "A forged system has runtime states distinct from the Engine lifecycle states. The Engine lifecycle (scaffold → content → validated → tested → packaged → published) is ABOUT the forge. The organism state machine is about the RUNTIME — the states an installed system moves through as it is used."
  states:
  - name: installed
    description: "install_manifest has been consumed, all files are in place, manifest-lock is written, the organism exists on disk but has not been invoked."
    entry_trigger: "myclaude install {slug} completes successfully"
    exit_trigger: "First invocation of any sub-part by the user OR first SessionStart hook fires"
  - name: idle
    description: "The organism is present, its claude-md fragment is loaded, its hooks are bound, but no active sub-agent is running."
    entry_trigger: "Session start completes, no active Task spawn"
    exit_trigger: "Sub-agent spawn OR matching hook event fires"
  - name: active
    description: "A sub-agent is currently running in a forked context. The organism is doing its work."
    entry_trigger: "Task spawn of any sub-agent"
    exit_trigger: "Sub-agent returns its final message"
  - name: observing
    description: "An E11 longitudinal observer sub-agent is writing to memory:project in background. Only applies to systems that declared E11."
    entry_trigger: "PostToolUse AgentHook fires an observer"
    exit_trigger: "Observer returns"
  - name: hibernating
    description: "/compact has dissolved the conversation context. The organism's disk state survives but the runtime state is gone."
    entry_trigger: "/compact command"
    exit_trigger: "Next user turn after compact — organism reconstitutes from STATE.yaml + .meta.yaml + claude-md fragment"
  - name: uninstalling
    description: "myclaude uninstall {slug} is running install_manifest.lock reversal."
    entry_trigger: "myclaude uninstall {slug}"
    exit_trigger: "All targets reversed, manifest-lock removed"
  state_file: ".claude/systems/{slug}/STATE.yaml"
  consumer_status: aspirational
  consumer_status_reason: "The organism state machine is a declarative model the codex uses to describe runtime behavior. No skill currently consumes the model — Wave 3 teaches /status to surface the current organism state and /test to cycle through the states in sandbox."

# ===========================================================================
# HOOKS FRAGMENT SPEC
# ===========================================================================

hooks_fragment_spec:
  rationale: "A system that declares E4 environmental perception or E5 cognitive reflex ships a hooks fragment (hooks.json) that install_manifest merges into the user's .claude/settings.local.json. This section declares the fragment format, event vocabulary, and merge semantics."
  fragment_file: hooks.json
  fragment_location_in_bundle: "workspace/{slug}/hooks.json"
  install_target: .claude/settings.local.json
  install_kind: merge
  install_merge_strategy: "The fragment is a JSON object with event names as top-level keys and arrays of hook definitions as values. Merging means ADDING the system's hook definitions to the existing arrays for each event, tracking the added entries in install_manifest.lock for exact removal at uninstall time."
  canonical_event_vocabulary:
    source: references/claude-code-ground-truth.md §Layer 2 — 27 canonical HOOK_EVENTS
    events_always_emitted: [SessionStart, Setup]
    events_per_tool: [PreToolUse, PostToolUse, PostToolUseFailure]
    events_per_turn: [UserPromptSubmit, Stop, StopFailure]
    events_per_spawn: [SubagentStart, SubagentStop]
    events_compact: [PreCompact, PostCompact]
    events_permission: [PermissionRequest, PermissionDenied]
    events_teams: [TeammateIdle]
    events_task: [TaskCreated, TaskCompleted]
    events_mcp: [Elicitation, ElicitationResult]
    events_settings: [ConfigChange, InstructionsLoaded]
    events_worktree: [WorktreeCreate, WorktreeRemove]
    events_filesystem: [CwdChanged, FileChanged]
    events_session_lifecycle: [SessionEnd]
    events_notification: [Notification]
  hook_types_available:
  - BashCommandHook — shell command execution with timeout, async, asyncRewake options
  - PromptHook — LLM prompt evaluation with model and timeout
  - HttpHook — webhook POST with headers and allowedEnvVars whitelist
  - AgentHook — full agent spawn with prompt, model, timeout, statusMessage
  if_matcher_syntax: "Uses permission rule syntax — Bash(git *), Write(*.py), Read(**/*.md). The hook only evaluates if the tool call matches the pattern [SOURCE: schemas/hooks.ts:19-27]."
  canonical_example_fragment: |
    {
      "SessionStart": [
        {
          "type": "agent",
          "if": "SessionStart(*)",
          "prompt": "Session homeostasis verifier — read STATE.yaml, align constitution for next spawn",
          "model": "claude-haiku-4-5",
          "timeout": 30,
          "statusMessage": "Aligning organism"
        }
      ],
      "PostToolUse": [
        {
          "type": "agent",
          "if": "Write(**/*.md) OR Bash(git *)",
          "prompt": "Longitudinal observer — write one narrative observation to memory:project",
          "model": "claude-haiku-4-5",
          "timeout": 60
        }
      ]
    }
  namespace_strategy: "Each hook entry the system adds is tracked by install_manifest.lock with the event name and entry index, so uninstall can remove exactly those entries without disturbing other systems' hooks bound to the same events."
  validation_checks:
  - Every bound event is in the canonical 27
  - Every hook has a valid type (BashCommandHook, PromptHook, HttpHook, AgentHook)
  - Every AgentHook has a prompt, model, and timeout
  - Every if matcher uses valid permission rule syntax
  - No hook binds to Setup or SessionStart without justification (these are always-emitted and expensive)
  consumer_status: partial
  consumer_status_reason: "The canonical event vocabulary is fully wired via the S118c ground-truth update. The install_manifest merge strategy is documented but the CLI does not yet consume it (GAP-SYS-1). /validate does not yet enforce the validation_checks list above — Wave 3."

# ===========================================================================
# CLAUDE_MD FRAGMENT SPEC
# ===========================================================================

claude_md_fragment_spec:
  rationale: "A system ships a CLAUDE.md fragment that install_manifest appends into .claude/rules/{slug}.md (or the canonical project memory tier). The fragment carries the organism's constitutional content that is re-loaded every turn."
  fragment_file: CLAUDE.md
  fragment_location_in_bundle: "workspace/{slug}/CLAUDE.md"
  install_target: ".claude/rules/{slug}.md"
  install_kind: append
  install_append_marker_format: "<!-- BEGIN system:{slug} -->...<!-- END system:{slug} --> wrapped around the fragment content, enabling idempotent removal at uninstall time."
  memory_hierarchy_position:
    tier: 3
    tier_name: project
    reason: "Systems install into the project memory tier because the organism is a project-level constitutional contribution. User-tier and managed-tier install are reserved for personal-global and organization-global products respectively."
    source: "references/claude-code-ground-truth.md §Layer 0 — managed(1) < user(2) < project(3) < local(4), reverse priority"
  max_chars_hard: 4000
  max_chars_hard_source: "config.yaml token_budgets.claude_md_char_hard AND references/claude-code-ground-truth.md §Layer 0 MAX_MEMORY_CHARACTER_COUNT=40000 with Engine soft limit 4000 for ambient cost discipline"
  frontmatter_conditional_activation:
    field: paths
    syntax: "Glob patterns in frontmatter make the fragment conditional — only loaded when matching files exist in the working context. Patterns ending in /** are normalized to /. Pattern ** alone means no-glob (always applies)."
    source: "claudemd.ts:253-279 parseFrontmatterPaths"
  at_include_directive:
    syntax: "@path, @./relative, @~/home, @/absolute — resolved in leaf text nodes only, not inside code blocks or code spans"
    composition_use: "Enables the system to split the fragment into modular sub-files (e.g., @./rules/observability.md, @./rules/coupling.md) that stay under the 4000 char individual limit while composing a richer constitution"
    source: "claudemd.ts:18-26"
  html_comment_stripping: "Block-level HTML comments <!-- ... --> are stripped from the fragment by the runtime BEFORE injection into the prompt. WHY comments at the block level are invisible to the model but visible to human readers of the source. /package exploits this by removing WHY comments from disk, matching what the runtime would have stripped anyway [SOURCE: claudemd.ts:281-334]."
  canonical_example_fragment: |
    ---
    paths: [src/**/*.ts, src/**/*.tsx]
    ---
    # {organism-name}

    This fragment is conditional — it loads only when TypeScript files are present
    in the working context.

    ## Identity
    <one-line organism identity>

    ## Active Engines
    (list of the 7-13 active engines with their couples_with)

    @./rules/coupling-declarations.md
    @./rules/ecological-coexistence.md

    ## Anti-Patterns (last 30% for attention-recency)
    (AP-S1..S12 as applicable to this organism)
  validation_checks:
  - Fragment file exists and parses as markdown
  - Frontmatter paths (if present) are valid glob patterns
  - "@include references resolve to files inside the organism bundle"
  - Char count under 4000 OR @include composition is used to split content
  - No HTML comments contain sensitive information (they are visible in source)
  - Critical constraints are in the last 30% of the fragment body (D19)
  consumer_status: fully-wired
  consumer_status_reason: "All mechanisms are verified native primitives per the S118c ground-truth Layer 0. /validate stage 3 check_d3 and check_d19 enforce the structural requirements. The install append with markers is a myClaude convention already declared in squad.yaml install_manifest — system extends to the project memory tier."

# ===========================================================================
# RECURSION PROOF — P9 operationalized
# ===========================================================================

recursion_proof:
  rationale: "P9 Recursive Integrity is the principle that a system must pass its own validator when pointed at itself. For system type, this is not aspirational — it is a forge-time gate. The codex blocks publish if the recursion_proof section is absent or the declared demonstration cannot be verified."
  rule: "Every forged system MUST ship a recursion_proof.md (or equivalent demonstration) that shows the output of /validate --target=self run against the system bundle, with a declared expected result (PASS or PASS with declared warnings) and a timestamp of the last successful run."
  enforced_by:
  - lifecycle.validate.type_specific.per_stage_hooks.stage_3_dna_tier1.check_d4
  - lifecycle.publish.blocks_when
  - mcs_expectations.mcs2.blocks_publish
  blocks_publish: true
  blocks_publish_reason: "Clause VII of the Engine constitution — the Engine passes its own /validate --target=engine before shipping. Systems, being organisms that compose multiple primitives, are the only type where recursive integrity can be both demanded and verified. Without the proof, the codex is hypocritical (AP-S9 structural_hypocrisy)."
  demonstration_file_template: |
    # Recursion Proof — {system-name}

    ## Command
    /validate --target=self --level=3

    ## Expected Result
    PASS (0 errors, X warnings — all declared below)

    ## Last Run Timestamp
    {ISO-8601 timestamp}

    ## Declared Warnings (if any)
    (enumerate every warning that is expected and accepted — anything unexplained fails the proof)

    ## Substrate Verification
    (for each of the 13 engines active in this organism, the proof verifies that:
    - the engine is declared in organismic_engines
    - couples_with is non-empty and rationale is declared
    - the corresponding discovery question is answered in the CLAUDE.md fragment
    - the native mechanisms declared for the engine are present in the sub-parts)
  recursion_modalities_offered: [level_1_quick, level_3_split, level_3_cached, level_3_full]
  recursion_modalities_source: lifecycle.validate.type_specific.recursion_modalities
  self_challenge_requirement: "The recursion_proof demonstration MUST include one self-challenge — a specific question the creator asked themselves about the organism that could have failed the proof, and the answer that resolved it. This instantiates D11 Socratic Pressure at the organism level."
  consumer_status: aspirational
  consumer_status_reason: "The rule is declared; /validate does not yet run --target=self automatically against a forged system. Wave 3 teaches /validate to accept --target=self and to block /publish when the proof is missing or stale. Until then, the recursion_proof is coached via /create and /fill but enforced only by manual creator discipline."

# ===========================================================================
# ANTI-PATTERNS CATALOG — system-specific AP-S1..S12
# ===========================================================================

anti_patterns_catalog:
  scope: "System-specific failure modes. Agent anti-patterns (AP-A1..A6) apply to each sub-agent. Squad anti-patterns (AP-SQ1..SQ6) apply to each sub-squad. Skill anti-patterns apply to each preloaded skill."
  inherited_from_agent: "AP-A1 through AP-A6 from product-dna/agent.yaml apply to each sub-agent"
  inherited_from_squad: "AP-SQ1 through AP-SQ6 from product-dna/squad.yaml apply to each sub-squad"
  inherited_from_skill: "AP-D1 through AP-P3 from product-dna/skill.yaml apply to each preloaded skill"
  orchestration_failures:
    AP_S1_pile_without_couplings:
      name: Pile Without Couplings
      symptom: "Engines declared in organismic_engines with empty couples_with or missing rationale"
      problem: "The organism is a set of drawers, not a set of organs. Each engine appears to do something, but the functional relationships are undeclared. When one engine changes behavior, the effect on others is unknowable."
      severity: critical
      fix: "Declare couples_with [E_x, E_y] for each active engine with a rationale explaining what useful flow the coupling produces"
    AP_S2_undeclared_metabolism:
      name: Undeclared Metabolism
      symptom: "E1 declared but at_rest and in_operation token costs not specified"
      problem: "The organism's ambient and per-invocation costs are unknown. Budget enforcement (Cláusula VIII) cannot be checked."
      severity: high
      fix: "Declare at_rest (ambient) and in_operation (per-spawn type) token estimates"
    AP_S3_identity_in_prose_only:
      name: Identity in Prose Only
      symptom: "Constitution declared in CLAUDE.md fragment prose but not re-injected via criticalSystemReminder_EXPERIMENTAL on any sub-agent"
      problem: "Identity drifts across turns because the model has to remember it rather than being reminded. D1 violation at the organism level."
      severity: high
      fix: "Install criticalSystemReminder_EXPERIMENTAL on the orchestrator sub-agent with a one-sentence constitution that is always current"
    AP_S4_closure_without_perception:
      name: Closure Without Perception
      symptom: "E0 operational closure declared but E4 environmental perception has zero bound hook events"
      problem: "The membrane is walled — the organism cannot sense what changes in its environment. The boundary becomes a coffin instead of a skin."
      severity: high
      fix: "Bind at least one event from the canonical 27 — SessionStart or PostToolUse are common starting points"
    AP_S5_reflex_without_judgment_or_vice_versa:
      name: Reflex Without Judgment OR Judgment Without Reflex
      symptom: "E5 cognitive reflex declared with no E6 isolated judgment behind it (all responses are reflexes), OR E6 declared with no E5 (every routine goes through full deliberation)"
      problem: "The brain-and-spine dimension is broken. Reflex-only systems are rigid; judgment-only systems are slow. The dual cognition is the point."
      severity: medium
      fix: "Declare explicit split — which threats are handled by reflex (hooks), which by judgment (sub-agent spawn)"
    AP_S6_mnemonic_layer_collapse:
      name: Mnemonic Layer Collapse
      symptom: "Procedural and declarative registers of E3 mixed — STATE.yaml contains narrative prose OR memory:project contains structured state"
      problem: "The two registers serve disjoint functions. Collapsing them produces a mixed-function file that is hard to query AND hard to narrate. AP-S6 is the organism-level analog of mixing facts and intuitions in a notebook."
      severity: medium
      fix: "Separate — STATE.yaml for structured facts (scores, phase, counts), memory:project for natural-language observations (patterns, insights)"
    AP_S7_free_text_routing:
      name: Free-Text Routing
      symptom: "System composes multiple sub-squads but the system-level routing between them is declared in CLAUDE.md fragment prose rather than a system-level routing.yaml"
      problem: "Cross-sub-squad routing cannot be audited, diffed, or replayed. Violates P4 contract-before-narrative at the system level."
      severity: high
      fix: "Create a system-level routing.yaml that declares which sub-squad handles which class of request, with fallback"
    AP_S8_undisciplined_voice:
      name: Undisciplined Voice
      symptom: "E8 external voice declared but no output-style sub-part is composed, AND the sub-agent descriptions in the Task catalog are inconsistent in tone"
      problem: "The organism's external identity is inconsistent. Users perceive it as multiple personalities rather than one organism."
      severity: low
      fix: "Compose an output-style sub-part OR explicitly declare voice characteristics in the CLAUDE.md fragment that sub-agent descriptions must match"
    AP_S9_structural_hypocrisy:
      name: Structural Hypocrisy
      symptom: "System declares P9 recursive integrity but recursion_proof is missing OR the demonstration has never been run OR the declared modalities are not supported"
      problem: "The codex demands recursive integrity but the forged artifact does not demonstrate it. The Engine's Clause VII violated at the organism level."
      severity: critical
      fix: "Ship recursion_proof.md with actual /validate --target=self output and a timestamp"
    AP_S10_implicit_state:
      name: Implicit State
      symptom: "Engine E10 externalized persistent state declared but some piece of state lives only in memory (e.g., the system depends on the orchestrator remembering context across spawns without any file-backed persistence)"
      problem: "Implicit state does not survive /compact, session end, or reinstall. The organism forgets and the user is confused about why."
      severity: high
      fix: "Move every state claim to an externalized file — STATE.yaml, .meta.yaml, memory scope, or install-manifest.lock"
    AP_S11_self_blindness:
      name: Self-Blindness
      symptom: "System at apex quality tier declared without E11 longitudinal self-observation"
      problem: "The organism operates but never learns about its own operation. Second-order recursion is absent. Apex quality requires the organism to observe itself."
      severity: low
      severity_note: "low because E11 is optional for most systems — becomes high only at MCS-3 apex tier"
      fix: "Add E11 with a PostToolUse AgentHook observer writing to memory:project"
    AP_S12_stability_confused_with_viability:
      name: Stability Confused With Viability
      symptom: "System celebrates its reversibility (install_manifest.lock hash-verified, bit-exact uninstall) as if it were a sign of health, with no evolution path declared"
      problem: "Reversibility is an adjunct property, not a definition of health. A system that never drifts is a system that never evolves, and systems that do not evolve die when their environment shifts."
      severity: low
      fix: "Declare an evolution path in the CLAUDE.md fragment — how updates are shipped, how the constitution evolves, how hereditary memory (preloaded skills) is versioned"
  namespace_failures:
    AP_S13_global_namespace_collision:
      name: Global Namespace Collision
      symptom: "Sub-agent files named without system-slug prefix — e.g., observer.md instead of my-system__observer.md, OR system-level slash commands using common names like /start /stop /status"
      problem: "Installation collides with existing agents in user's .claude/agents/ directory OR with other systems' slash commands"
      severity: high
      fix: "Apply namespace strategy consistently — {slug}__{role} prefix OR {slug}/{role} subdirectory for skills native namespace"
  severity_definitions:
    critical: "Breaks the organism's trust contract — must fix before publish"
    high: "Significant degradation — fix recommended for MCS-2"
    medium: "Suboptimal — fix for MCS-3"
    low: "Polish"
  consumer_status: aspirational
  consumer_status_reason: "Wave 3 teaches /validate Stage 7 to grep against this catalog plus inherited catalogs from agent.yaml, squad.yaml, skill.yaml"
