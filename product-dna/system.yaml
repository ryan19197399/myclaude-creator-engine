# ===========================================================================
# COUPLING DECLARATION REQUIREMENT — the meta-requirement
# ===========================================================================

coupling_declaration_requirement:
  rule: "For every engine active in a forged system, the creator MUST declare a non-empty couples_with field naming 1 to 3 functional counterpart engines, plus a couples_rationale explaining what useful flow the coupling produces. An engine without declared couplings is a drawer; an engine with declared couplings is an organ."
  enforced_by:
  - lifecycle.validate.type_specific.per_stage_hooks.stage_5_dna_tier3
  - dna_patterns.tier1.D2
  - anti_patterns_catalog.orchestration_failures.AP_S1_pile_without_couplings
  blocks_forge_when: Any engine declared in the forged system's organismic_engines section has couples_with empty OR missing rationale OR coupling references a non-declared engine.
  reciprocity_hint: "When engine E_a declares couples_with [E_b], engine E_b SHOULD either declare couples_with containing E_a OR explicitly document the asymmetry in its couples_rationale. Reciprocity is the default; asymmetry must be named."
  consumer_status: aspirational
  consumer_status_reason: "Wave 3 teaches /validate to parse the organismic_engines section of a forged system, verify every active engine has a non-empty couples_with, and cross-check reciprocity."

# ===========================================================================
# ADVANCED COMPOSITION PATTERNS — the 8 brechas
# ===========================================================================

advanced_composition_patterns:
  total_patterns: 8
  canonical_example: constitutional_homeostasis_via_session_hook
  canonical_example_rationale: "Chosen because (1) it instantiates the thesis directly — a SessionStart hook IS an executive prohibition channeling the organism into the useful flow of waking pre-aligned; (2) it touches five engines simultaneously — E0, E2, E3, E4, E9; (3) it is invisible to the end user — the user opens a session and the system is simply ready, without visible preparation. Silent excellence is the criterion."

  constitutional_homeostasis_via_session_hook:
    one_line: The organism wakes pre-aligned via a SessionStart hook that spawns a verifier which reads state and updates the constitution before the user acts.
    primitives_combined:
    - "SessionStart event [SOURCE: coreTypes.ts:25-53]"
    - "AgentHook type [SOURCE: schemas/hooks.ts:128-163]"
    - "criticalSystemReminder_EXPERIMENTAL [SOURCE: runAgent.ts:711-714]"
    - "STATE.yaml as procedural memory"
    - "SubagentStart hook injecting additionalContexts into subsequent spawns [SOURCE: runAgent.ts:532-555]"
    when_to_use: "When the organism has non-trivial state and the constitution appropriate to the user's next action depends on that state. Buys cognitive punctuality."
    when_NOT_to_use: "When state is trivial OR when the verifier would cost more tokens than inline verification. The pattern has metabolic cost at every session boot; justify it against E1."
    coupled_with_engines: [E0, E2, E3, E4, E9]
    consumer_status: fully-wired

  ephemeral_specialist_with_temporary_organ:
    one_line: A sub-agent spawned for one invocation with an ephemeral MCP server that dissolves on agent exit.
    primitives_combined:
    - "context: fork [SOURCE: runAgent.ts:694-714]"
    - "mcpServers inline ephemeral object [SOURCE: runAgent.ts:95-218]"
    - "FINALLY block cleanup guaranteed [SOURCE: runAgent.ts:817]"
    when_to_use: "When a specialist needs an integration (Slack, GitHub, custom tool) that should exist only during invocation. The parent never pays ambient cost."
    when_NOT_to_use: "When the integration is reused across many invocations — spawn cost is paid per call and can exceed amortized cost of a persistent shared server."
    coupled_with_engines: [E0, E1, E6]
    consumer_status: fully-wired

  stigmergic_reflex_via_path_scoped_skills:
    one_line: Path-scoped skills dormant until matching files are touched, producing coordinated reflex behavior via environmental signals.
    primitives_combined:
    - "paths frontmatter on skills in conditionalSkills map [SOURCE: loadSkillsDir.ts:159-178, 826-1058]"
    - "activateConditionalSkillsForPaths on Read/Write/Edit [SOURCE: loadSkillsDir.ts:997-1058]"
    - "Gitignored directories skipped [SOURCE: loadSkillsDir.ts:892-897]"
    - "paths frontmatter on CLAUDE.md rules [SOURCE: claudemd.ts:253-279]"
    when_to_use: "When the organism's routine behavior is context-dependent and should not require the orchestrator to decide whether to activate it."
    when_NOT_to_use: "When the specialist should NOT be discoverable from file touch — for example, a security auditor that should run only under explicit invocation."
    coupled_with_engines: [E1, E4, E5]
    consumer_status: fully-wired

  executable_boot_via_initial_prompt:
    one_line: An agent that runs a pre-programmed initialization sequence via initialPrompt before accepting user input.
    primitives_combined:
    - "initialPrompt prepended to first user turn [SOURCE: loadAgentsDir.ts:123, 686-690]"
    - "slash commands work inside initialPrompt"
    - "skills preload runs before initialPrompt [SOURCE: runAgent.ts:577-646]"
    when_to_use: "When the agent needs deterministic preparation (load project context, read a specific file, verify state) before the user can make a request. Buys agent-spawn punctuality."
    when_NOT_to_use: "When preparation steps can fail in variable ways — fixed action patterns are FRAGILE in variable contexts. MUST be coupled with declared graceful degradation (D14)."
    coupled_with_engines: [E2]
    critical_warning: "Without D14 graceful degradation explicitly paired, the agent that boots executing a fragile protocol dies without ever hearing the user. Every system adopting this pattern MUST declare the degradation path."
    consumer_status: fully-wired

  habitat_polymorphism_via_required_mcp:
    one_line: The same organism appears in different visible forms depending on which MCP servers the user has configured — phenotype tracks habitat.
    primitives_combined:
    - "requiredMcpServers pattern list on agents [SOURCE: loadAgentsDir.ts:125, 229-242]"
    - "Agent filtered from selectable list if patterns do not match — case-insensitive substring"
    when_to_use: "When the organism has optional specialists that only make sense in certain habitats. Enables graceful coexistence with other systems via niche specialization."
    when_NOT_to_use: "When the specialist is core to the organism's identity — filtering hides it from the user, confusing what the system can do."
    coupled_with_engines: [E0, E12]
    consumer_status: fully-wired

  bifasic_mnemonic_consciousness:
    one_line: Explicit declaration of which memory content is procedural versus declarative, with the two registers kept non-overlapping.
    primitives_combined:
    - "STATE.yaml and .meta.yaml for procedural register"
    - "memory:project for declarative register [SOURCE: loadAgentsDir.ts:456-467, 594-605]"
    - "auto-injection of Write/Edit/Read when memory scope declared [SOURCE: loadAgentsDir.ts:662-674]"
    when_to_use: "In any system where the organism both tracks facts AND learns patterns. Prevents mnemonic layer collapse (AP-S6)."
    when_NOT_to_use: "In trivial systems where the organism only tracks one kind of information."
    coupled_with_engines: [E3, E10]
    consumer_status: fully-wired

  phylogenetic_cognition_via_skills_preload:
    one_line: Agents born with preloaded skills — knowledge inscribed at the species level, updated by editing the skill file.
    primitives_combined:
    - "skills frontmatter field on agents [SOURCE: loadAgentsDir.ts:684]"
    - "runAgent injects skill content as isMeta user messages before first turn [SOURCE: runAgent.ts:577-646]"
    - "Skill name resolution via 3-strategy algorithm [SOURCE: runAgent.ts:945-973]"
    when_to_use: "When a specialist needs deep domain knowledge shared across many invocations but not hard-coded in the agent body."
    when_NOT_to_use: "When the knowledge is ephemeral or user-specific — preloaded skills are for domain knowledge true across users."
    coupled_with_engines: [E3, E6]
    consumer_status: fully-wired

  longitudinal_self_observation:
    one_line: An observer sub-agent spawned by a PostToolUse AgentHook that writes narrative observations into memory:project.
    primitives_combined:
    - "PostToolUse event [SOURCE: coreTypes.ts:25-53]"
    - "AgentHook spawning full observer [SOURCE: schemas/hooks.ts:128-163]"
    - "memory:project on observer [SOURCE: loadAgentsDir.ts:456-467]"
    - "TaskCompleted event as alternate binding"
    when_to_use: "At apex systems where the organism needs auto-narrative across sessions — creator reads the dossier and uses it to update the constitution."
    when_NOT_to_use: "At lower quality tiers — significant complexity and token cost. Apex feature, not baseline."
    coupled_with_engines: [E3, E9, E11]
    consumer_status: partial
    consumer_status_reason: "Composition uses verified native primitives but the mechanism by which the observer reads the parent's conversation needs Wave 3 verification — likely via SubagentStart additionalContexts or forkContextMessages."

# ===========================================================================
# ARCHETYPES — 5 canonical organism shapes
# ===========================================================================

archetypes:
  selection_required: true
  selection_phase: lifecycle.create.type_specific.discovery_phase
  selection_question: "Which organism archetype best matches the system you are forging?"
  hybrid_policy: "Identify the dominant archetype. Use secondary traits for enrichment. Never declare two equal archetypes."
  cognitive_organism:
    when_to_use: "The default. A full stack composing constitution + orchestration + reflexes + memory + voice, with all 13 engines active at varying depths. Used when the creator is shipping the complete organism."
    mandatory_engines: [E0, E1, E2, E3, E4, E9, E10, E12]
    recommended_engines: [E5, E6, E7, E8]
    optional_engines: [E11]
    typical_dimensions: [dual_temporal_homeostasis, triple_memory]
    examples_by_domain:
    - "A domain-expert advisor organism (constitution + specialist squad + reflex on PostToolUse + memory:project for domain patterns)"
    - "A multi-mode development environment (constitution + workflow state machine + conditional skills + hooks for lifecycle)"
    validation_checklist:
    - "All 8 mandatory engines are declared in organismic_engines with non-empty couples_with"
    - "recursion_proof section exists with demonstration"
    - "CLAUDE.md fragment under 4000 chars or uses @include composition"
    - "install_manifest dispatches to at least 3 distinct native destinations"
  defensive_perimeter:
    when_to_use: "When the primary job of the organism is boundary enforcement — audit, security, policy verification. Emphasis on E0 operational closure, E4 environmental perception, E5 cognitive reflex."
    mandatory_engines: [E0, E1, E2, E4, E5, E9, E10, E12]
    recommended_engines: [E6]
    optional_engines: [E3, E7, E8, E11]
    typical_dimensions: [dual_cognition_brain_and_spine]
    examples_by_domain:
    - "A security audit organism that hooks PreToolUse on Bash + Write and spawns an AgentHook verifier"
    - "A compliance organism that hooks PostToolUse and checks every change against declared rules"
    validation_checklist:
    - "E4 declares at least 3 bound hook events from the canonical 27"
    - "E5 declares at least one AgentHook or PromptHook"
    - "Every reflex has a declared degradation path (D14)"
  observatorium:
    when_to_use: "When the primary job is longitudinal observation — the organism watches, records, learns patterns, and surfaces insights without intervening. Emphasis on E11 longitudinal self-observation and E3 declarative register."
    mandatory_engines: [E0, E1, E2, E3, E4, E9, E10, E11, E12]
    recommended_engines: [E5]
    optional_engines: [E6, E7, E8]
    typical_dimensions: [triple_memory]
    examples_by_domain:
    - "A project-health observatorium that runs post-tool-use observers and surfaces patterns weekly"
    - "A learning-extraction organism that watches the creator's work and builds a domain map over time"
    validation_checklist:
    - "E11 is declared and the observer sub-agent is defined"
    - "E3 declarative register maps to memory:project"
    - "No active write-intervention engines OR intervention requires explicit creator opt-in"
  stigmergic_workshop:
    when_to_use: "When the primary job is context-reactive specialist activation — path-scoped skills and rules that surface only when the user touches relevant files. Emphasis on brecha #3 stigmergic reflex and the dual cognition dimension."
    mandatory_engines: [E0, E1, E2, E4, E5, E9, E10, E12]
    recommended_engines: [E3, E6]
    optional_engines: [E7, E8, E11]
    typical_dimensions: [dual_cognition_brain_and_spine]
    examples_by_domain:
    - "A polyglot development organism with language-specific specialists that activate on file extension"
    - "A framework-specialized organism where the framework's conventions are ambient only when framework files are touched"
    validation_checklist:
    - "At least 2 sub-skills declare paths frontmatter"
    - "Ambient cost at rest (no matching files) is near zero"
    - "Conditional activation documented in the CLAUDE.md fragment"
  autonomic_agent_council:
    when_to_use: "When the primary job is multi-specialist advisory coordination — the organism composes multiple distinct specialist agents that the user or an orchestrator consults. Emphasis on E6 isolated judgment and E7 coordinated network."
    mandatory_engines: [E0, E1, E2, E4, E6, E7, E9, E10, E12]
    recommended_engines: [E5, E8]
    optional_engines: [E3, E11]
    typical_dimensions: [dual_cognition_brain_and_spine]
    examples_by_domain:
    - "A multi-expert review organism (security + architecture + style + performance advisors)"
    - "A research council where each specialist owns a research angle and returns synthesized findings"
    validation_checklist:
    - "At least 3 sub-agents declared, each with its own archetype from agent.yaml"
    - "routing.yaml at system root coordinating the council"
    - "handoff_format_spec declared in the system-level CLAUDE.md fragment"
  consumer_status: aspirational
  consumer_status_reason: "/create does not yet ask for system archetype. Wave 3 teaches /create to ask archetype first and inject archetype-specific scaffolds."

# ===========================================================================
# DISCOVERY QUESTIONS — 9 mandatory in order
# ===========================================================================

discovery_questions:
  source_of_truth: this file
  required_in_order:
  - id: Q1
    question: "Operational closure — what defines the inside of this organism? What is within the membrane and what is outside?"
    engine: E0
    rationale: "The first field in any organism is its boundary. Without a declared inside and outside, there is no organism to forge."
  - id: Q2
    question: "Productive asymmetry — for each capability this organism declares, what is the executive prohibition that channels it, and what useful flow does that prohibition produce?"
    engine: E2
    rationale: "Directly instantiates the thesis. A capability without a named prohibition is a drawer, not an organ."
  - id: Q3
    question: "Survival checklist — which artifacts of this organism must survive /compact, session end, reinstall, and update? List them explicitly."
    engine: E10
    rationale: "Forces explicit declaration of the externalized state surface."
  - id: Q4
    question: "Metabolism — what is the token cost at rest and in operation? How do path-scoped components stay dormant until needed?"
    engine: E1
    rationale: "Metabolism is the condition of being alive, not a function. Explicit declaration prevents ambient-cost creep."
  - id: Q5
    question: "External voice — what is the signature of identity this organism presents to the external world? How does it announce itself?"
    engine: E8
    rationale: "Voice is identity as observed from outside. Without declaration, the organism is performed inconsistently."
  - id: Q6
    question: "Recursion — does this organism pass its own validator when pointed at itself? Demonstrate in a recursion_proof section."
    engine: E9
    rationale: "Forge-time gate. A tool that fails its own validator cannot be trusted to validate others."
  - id: Q7
    question: "Context cardinality — how many forked contexts does this organism require to be one coherent thing? Justify the number."
    engine: E6
    rationale: "Forces the creator to think in multi-context architecture from the start, not as a later optimization."
  - id: Q8
    question: "Reflex versus judgment — which threats are handled by reflex (hooks) versus by judgment (agents)? Is the split conscious?"
    engine: E5
    rationale: "The brain-and-spine dimension. The split determines where latency and cost live."
  - id: Q9
    question: "Ecological coexistence — is this organism designed to coexist with other installed systems? How does it declare its niche, namespace conflicts, and composition boundaries?"
    engine: E12
    rationale: "A single user runs many installed products. Unnamed conflicts destroy coexistence silently."
  depth_set:
  - "What is the cardinality of sub-squads in this organism, and why that number?"
  - "Which of the 8 advanced composition patterns are adopted and why?"
  - "What is the fallback when the recursion proof fails mid-validation?"
  - "How does this organism behave when its hooks fragment conflicts with another installed organism's hooks fragment?"
  - "What is the longitudinal observation strategy, if any?"
  consumer_status: partial
  consumer_status_reason: "The 9 required_in_order questions are the canonical scaffolding input, but /create does not yet walk them in strict order — Wave 3 teaches /create to iterate the 9 in the declared order before scaffolding."

# ===========================================================================
# LIFECYCLE — 10 skills × universal contract + system-specific type_specific
# ===========================================================================

lifecycle:
  map:
    role: "Extract the creator's organism-scale expertise into domain-map.md, decomposing the workflow into the 13 engines and 4 dimensions."
    optional: true
    inputs:
    - creator.yaml
    - domain topic seed ($ARGUMENTS)
    outputs:
    - workspace/domain-map.md
    blocks_when: []
    consumer_status: aspirational
    consumer_status_reason: "/map does not yet consult system-specific decomposition prompts per the 13 engines."
    next_action: null
    next_action_reason: "read-only skill"
    type_specific:
      skip_recommended: false
      skip_message: "For systems, /map is valuable when the creator has workflow expertise but has not yet decomposed it into engine-by-engine shape."
      system_specific_prompts:
      - "What does this organism refuse to do? (boundary question — feeds E0)"
      - "What is the organism's state between sessions, and where does it live? (feeds E10)"
      - "What should happen automatically when the user starts a session? (feeds E2 + E4)"
      - "What specialist knowledge should be preloaded into sub-agents before they read any user input? (feeds E3 hereditary)"
      - "How does this organism coexist with other installed products? (feeds Q9)"
  scout:
    role: "Research existing systems in the marketplace and existing composable sub-parts. Prevents reinventing organisms that exist."
    optional: true
    inputs:
    - creator.yaml
    - domain query ($ARGUMENTS)
    outputs:
    - workspace/scout-{slug}.md
    - STATE.yaml.last_scout updated
    blocks_when: []
    consumer_status: aspirational
    consumer_status_reason: "/scout does not yet calibrate for system-specific composability research."
    next_action: null
    next_action_reason: "read-only research skill"
    type_specific:
      skip_recommended: false
      skip_message: "Skipping /scout for systems is risky — systems are the most likely type to reinvent existing compositions."
      scout_calibration_for_systems:
      - "Scan the marketplace for existing organisms in the same domain"
      - "Scan for composable sub-parts (squads, agents, skills, claude-md products, hooks products) that the new system could reuse"
      - "Identify composable gaps versus what must be forged new"
  import:
    role: "Bring an existing system directory from a workspace install target into the Engine workspace for validation, packaging, republish."
    optional: true
    inputs:
    - "Source directory containing CLAUDE.md + STATE.yaml + config/routing.yaml + (agents/ OR squads/ OR skills/)"
    - creator.yaml
    outputs:
    - workspace/{slug}/ (full directory imported preserving constitution, state, routing, sub-parts)
    - workspace/{slug}/.meta.yaml (state auto-detected)
    blocks_when:
    - workspace/{slug}/ already exists (no --force)
    - Source has no CLAUDE.md
    - Source has no STATE.yaml
    consumer_status: partial
    consumer_status_reason: "/import SKILL.md detection table now includes the system signature (CLAUDE.md + STATE.yaml + config/routing.yaml) after S118c update. Full inheritance walker not yet implemented."
    next_action: "/validate {slug}"
    type_specific:
      detection_pattern: "directory containing CLAUDE.md + STATE.yaml + config/routing.yaml + at least one of agents/ squads/ skills/"
      rename_on_import: null
      rename_on_import_reason: "Systems use the same filename convention in workspace and install — no rename needed during import."
      auto_detected_phase: content
  create:
    role: "Run the creation cycle for systems — 9 discovery questions in order, engine activation selection, archetype selection, sub-part roster declaration, scaffold of CLAUDE.md fragment, STATE.yaml skeleton, config/routing.yaml, install-manifest.yaml, and the sub-part directories."
    optional: false
    inputs:
    - creator.yaml
    - type
    - slug
    - archetype
    - engine_activation_table
    - sub_part_roster
    - scout_report
    - domain_map
    - discovery_answers
    outputs:
    - workspace/{slug}/CLAUDE.md (constitutional fragment scaffold)
    - workspace/{slug}/STATE.yaml (state skeleton)
    - workspace/{slug}/config/routing.yaml (routing scaffold)
    - workspace/{slug}/install-manifest.yaml (multi-destination dispatch scaffold)
    - workspace/{slug}/agents/ (if archetype requires sub-agents)
    - workspace/{slug}/squads/ (if archetype requires sub-squads)
    - workspace/{slug}/hooks.json (if hooks fragment required)
    - workspace/{slug}/README.md (4-section skeleton)
    - workspace/{slug}/.meta.yaml (state scaffold, archetype recorded, engines_active recorded)
    blocks_when:
    - slug invalid
    - workspace/{slug}/ exists without --force
    - creator.yaml missing AND micro-onboard fails
    - archetype not selected
    - engines_active table empty
    - any declared engine has empty couples_with
    consumer_status: aspirational
    consumer_status_reason: "/create does not yet scaffold system sub-parts. Wave 3 extends /create with system-specific scaffolding that walks the 9 discovery questions in order, iterates the engine activation table, and generates the multi-part structure."
    next_action: "/fill {slug}"
    type_specific:
      activates_templates:
      - templates/system/CLAUDE.md.template
      - templates/system/STATE.yaml.template
      - templates/system/config/routing.yaml.template
      - templates/system/install-manifest.yaml.template
      - templates/system/hooks.json.template
      - templates/system/README.md.template
      activates_dna_at_scaffold:
      - D1
      - D2
      - D3
      - D4
      - D13
      - D14
      - D19
      - D20
      discovery_phase:
        questions_source: this file → discovery_questions.required_in_order
        questions_walked_in_order: true
        archetype_selection_required: true
        archetype_first: true
        archetype_first_reason: "Archetype determines which engines are mandatory, which dimensions are typical, and which sub-parts the scaffold must create."
        engine_activation_phase: "After archetype selection, the creator declares engines_active table and for each engine declares couples_with with rationale."
      read_before_write_ratio: "10:1 — reads creator.yaml + scout + this codex + squad.yaml + agent.yaml + skill.yaml + structural-dna.md + ground-truth.md + config.yaml + template files before writing CLAUDE.md + sub-part files."
      ground_truth_required: true
      inherits_from:
      - squad.yaml (routing, handoff, install_manifest)
      - agent.yaml (sub-agent frontmatter, archetypes, token budgets)
      - skill.yaml (conditional activation, hub-and-spoke structure)
  fill:
    role: "Walk the CLAUDE.md fragment sections plus STATE.yaml schema plus routing.yaml plus install-manifest.yaml plus every sub-part sequentially. Systems have the deepest fill of all types."
    optional: false
    inputs:
    - workspace/{slug}/ (all files)
    - workspace/{slug}/.meta.yaml
    - creator.yaml
    - scout report
    - domain-map.md
    - this file (sections_walked)
    - squad.yaml (per-sub-squad walker)
    - agent.yaml (per-sub-agent walker)
    outputs:
    - All files filled
    - workspace/{slug}/.meta.yaml (state content, fill_progress updated, fill_metrics recorded)
    blocks_when: []
    consumer_status: aspirational
    consumer_status_reason: "/fill does not yet know how to walk a system bundle with multiple sub-parts across agents/squads/hooks/claude-md-fragment/output-style. Wave 3 teaches /fill to iterate sub-parts."
    next_action: "/validate {slug}"
    type_specific:
      sections_walked:
      - name: Organism Identity (CLAUDE.md fragment portico)
        why: Vitruvian declaration of what 'system' means in this organism, plus the one-line thesis of what this organism IS
        sparring_required: true
      - name: Engine Activation Table
        why: Which of the 13 engines are active in this organism, with couples_with declared for each
        sparring_required: true
        sparring_minimum: 2
      - name: Operational Closure Declaration
        why: What is inside, what is outside, what is the membrane
        sparring_required: true
      - name: Metabolic Budget
        why: At-rest cost plus per-invocation cost plus dormancy mechanisms
        sparring_required: true
      - name: Constitutional Re-injection
        why: What is re-injected each turn, in what event
        sparring_required: true
      - name: Mnemonic Layers (triple register)
        why: Hereditary + procedural + declarative registers, explicit function separation
        sparring_required: true
      - name: Environmental Perception (bound hook events)
        why: Which of the 27 hook events this organism binds, and what each triggers
        sparring_required: true
      - name: Cognitive Reflexes vs Judgment
        why: Threats handled by reflex vs by judgment, explicit split
        sparring_required: true
      - name: Isolated Judgment Cardinality
        why: How many forked contexts, why that number
        sparring_required: false
      - name: Coordinated Network (system-level routing)
        why: If more than one sub-squad, how they coordinate at the system level
        sparring_required: false
      - name: External Voice
        why: Signature of identity, composed output-style reference
        sparring_required: false
      - name: Recursion Proof
        why: Demonstration of /validate --target=self pass
        sparring_required: true
      - name: State Persistence Survival Matrix
        why: Per-artifact declaration of what survives /compact, session end, reinstall, update
        sparring_required: true
      - name: Ecological Coexistence
        why: How this organism coexists with other installed products
        sparring_required: true
      - name: Each Sub-Squad (per squad.yaml.lifecycle.fill.sections_walked)
        why: Recursively fill each composed sub-squad
        sparring_required: true
        iteration: per_sub_squad
      - name: Each Sub-Agent (per agent.yaml.lifecycle.fill.sections_walked)
        why: Recursively fill each composed sub-agent not inside a squad
        sparring_required: true
        iteration: per_sub_agent
      sparring_protocol: "Deep sparring on engine couplings, reflex-vs-judgment split, and state persistence. These are where systems fail silently in production."
      research_injection_eligible: true
  validate:
    role: "Run structural + integrity + DNA at all three tiers + CLI preflight + anti-commodity + recursion proof + composition check. Systems are the type where P9 is fully recursive."
    optional: false
    inputs:
    - workspace/{slug}/ (all files)
    - workspace/{slug}/.meta.yaml
    - this file
    - squad.yaml (inherited checks per sub-squad)
    - agent.yaml (inherited checks per sub-agent)
    - skill.yaml (inherited checks per sub-skill)
    - claude-code-ground-truth.md
    - config.yaml
    - quality-gates.yaml
    - structural-dna.md
    outputs:
    - workspace/{slug}/.meta.yaml (state validated, scores, intelligence, recursion_proof_result)
    - Validation report
    blocks_when: []
    consumer_status: partial
    consumer_status_reason: "/validate reads dna_patterns per type but does not yet enforce system-specific checks (organismic_engines coupling verification, recursion_proof presence, multi-sub-part recursion)."
    next_action: "/test {slug} (required for MCS-2+) OR /package {slug}"
    type_specific:
      stages_run:
        mcs1: [1, 2, 3, 6]
        mcs2: [1, 2, 3, 4, 5, 6, 7, 8]
        mcs3: [1, 2, 3, 4, 5, 6, 7, 8]
      recursion_modalities:
        level_1_quick: "Validates the system level only — structural + integrity + DNA at the system's own files. Does NOT recursively validate sub-squads and sub-agents. Target: single session, ~20K tokens."
        level_3_split: "Full recursive validation split across sessions. Each session validates one sub-squad tree and caches result in .meta.yaml{last_validated, last_validated_scores}. Next session picks up from where the previous left off. Target: 3-5 sessions for a 3-squad system."
        level_3_cached: "Full recursive validation using cached results for unchanged sub-parts. Only sub-parts whose file mtime is newer than .meta.yaml.last_validated are re-validated. Target: single session if most sub-parts are cached."
        level_3_full: "Full recursive validation in a single session, running all nested validates. Only viable for small systems (single sub-squad, few sub-agents). ~836K tokens for a 3-squad×4-agent×2-skill system, exceeds window."
        choice_guidance: "Default to level_1_quick for MCS-1, level_3_split for MCS-2+, level_3_cached for iterative fixing during development."
      per_stage_hooks:
        stage_1_structural:
          check: "Glob workspace/{slug}/ for CLAUDE.md + STATE.yaml + config/routing.yaml + README.md + install-manifest.yaml present. Glob for at least one of agents/ squads/ skills/ hooks.json output-style subparts."
          blocking: true
        stage_2_integrity:
          check: "YAML parse on STATE.yaml, routing.yaml, install-manifest.yaml, each sub-part .meta.yaml. No placeholder patterns. No secret patterns."
          blocking: true
        stage_3_dna_tier1:
          required_patterns: [D1, D2, D3, D4, D13, D14, D19]
          recommended_patterns: [D20]
          check_d1: "CLAUDE.md fragment has identity + activation protocol explicit"
          check_d2: "CLAUDE.md fragment has anti-patterns section referencing AP-S1..S12"
          check_d3: "CLAUDE.md fragment under 4000 chars OR uses @include composition"
          check_d4: "recursion_proof section exists and declares blocks_publish: true"
          check_d13: "README.md has what/install/usage/requirements sections"
          check_d14: "Every active engine has a declared degradation path per the failure_modes section"
          check_d19: "Critical constraints in the last 30% of CLAUDE.md fragment body"
          check_d20: "CLAUDE.md fragment uses paths frontmatter for conditional activation where appropriate"
          blocking: true
        stage_4_dna_tier2:
          required_patterns: [D5, D7, D16]
          recommended_patterns: [D6, D8, D15, D17]
          check_d5: "Discovery questions are walked in the declared order by /create"
          check_d7: "System declares pre-execution checks (required_mcp_servers for habitat, required state files)"
          check_d16: "No hardcoded paths; install_manifest uses relative + {slug} placeholders"
          blocking: false
        stage_5_dna_tier3:
          required_patterns: [D9, D10, D11, D12, D18]
          check_d9: "Every sub-squad orchestrator inherits squad.yaml D9 — Agent in tools, Write/Edit/NotebookEdit excluded"
          check_d10: "Each sub-squad has handoff format declaration matching squad.yaml handoff_format_spec.canonical_form"
          check_d11: "recursion_proof section runs a self-challenge pattern — the system questions its own validation result"
          check_d12: "If any engine declares longitudinal or declarative memory, the memory scope is declared and files exist"
          check_d18: "Each sub-agent is a distinct agent file; sub-squads use Task spawn which forks context natively"
          coupling_check:
            rule: "Every engine declared in organismic_engines has a non-empty couples_with field and a non-empty couples_rationale. Every reference in couples_with resolves to another declared engine. Reciprocity is default; asymmetry must be documented in couples_rationale."
            blocking: true
            consumer_status: aspirational
            consumer_status_reason: "Wave 3 teaches /validate Stage 5 to parse organismic_engines and run the coupling check. Today this is coached via /create and /fill but not physically enforced at /validate time."
          blocking: true
        stage_6_cli_preflight:
          check: "myclaude validate {slug} succeeds — manifest, secrets, file sizes"
          blocking: true
        stage_7_anti_commodity:
          check: "Substance score + invisibility audit (word-bounded grep against substrate vocabulary) + quality_rubric application + AP-S1..S12 grep"
          blocking: false
          coaching_only: true
        stage_8_value_intelligence:
          check: "Value score, suggested price range, market position"
          blocking: false
          runs_at_mcs: [2, 3]
      read_before_write_ratio: "Read-only skill — updates .meta.yaml only"
      dogfood_check:
        description: "P9 enforcement — /validate system applied to reference systems in templates/system/ AND to the Engine's own CLAUDE.md + STATE.yaml + config.yaml which together form a self-applied system check."
        consumer_status: aspirational
        consumer_status_reason: "Wave 3 teaches /validate to accept --target=engine for self-dogfood."
      next_action_pass: "/test {slug} (required for MCS-2+) OR /package {slug}"
      next_action_fail: "/validate --fix {slug}"
  test:
    role: "Sandbox-install the system bundle in worktree isolation, verify install_manifest multi-target dispatch, verify routing.yaml parses, simulate the 9 discovery answers against the scaffold, run 3 behavioral scenarios."
    optional: true
    inputs:
    - workspace/{slug}/ (validated)
    - this file
    outputs:
    - workspace/{slug}/.meta.yaml (test_result, last_tested, test_scenarios)
    - Test report
    blocks_when: []
    consumer_status: aspirational
    consumer_status_reason: "/test does not yet have multi-sub-part sandbox logic for systems. Wave 3 teaches /test to dry-run install_manifest against a worktree sandbox and verify symmetric uninstall."
    next_action: "/package {slug}"
    type_specific:
      required_for_mcs: [2, 3]
      optional_for_mcs: [1]
      sandbox_isolation: worktree
      type_specific_steps:
      - step: install_manifest_dry_run
        check: "Dry-run install_manifest against the sandbox .claude/ — verify every target path is valid, no collisions, every source file exists, every append kind target has BEGIN/END markers, every merge kind target has key tracking."
      - step: routing_table_parse
        check: "Every sub-squad's routing.yaml parses and every specialist id resolves to an installed agent file."
      - step: hooks_fragment_parse
        check: "hooks.json parses, every event binding is one of the 27 canonical events, every if matcher uses valid permission rule syntax."
      - step: claude_md_fragment_load
        check: "CLAUDE.md fragment parses as markdown, frontmatter paths (if present) are valid globs, @include references resolve, char count under 4000 OR composition used."
      - step: recursion_proof_execution
        check: "Run /validate --target=self against the sandboxed system. Verify the result matches the recursion_proof section's declared demonstration."
      - step: uninstall_symmetric_dry_run
        check: "Dry-run the install_manifest.lock reversal — verify every installed file is removable, every appended section is excisable, every merged key is revertible."
      scenarios_applicable: true
      scenarios:
      - name: Happy Path
        purpose: Normal invocation with the system's primary archetype use case
        input_strategy: Trigger the primary use case of the declared archetype
        on_fail: Primary routing or reflex binding is broken
      - name: Edge Case
        purpose: Partial failure — one sub-part fails mid-sequence
        input_strategy: Inject a failing mock at one specialist spawn point
        on_fail: Degradation path is weak, strengthen failure_modes
      - name: Adversarial
        purpose: Ecological conflict — install alongside another mock system that binds the same hook event
        input_strategy: Install a second mock system and verify no cross-contamination
        on_fail: Ecological coexistence declaration is insufficient
      must_haves_verification: true
      next_action_pass: "/package {slug}"
  package:
    role: "Strip WHY comments from ALL files in the organism bundle, compute install_manifest.lock hashes, generate vault.yaml + plugin.json (with full sub-part list) + agentskills.yaml, verify ecological declarations, stage .publish/."
    optional: false
    inputs:
    - workspace/{slug}/ (validated, test_result pass for MCS-2+)
    - creator.yaml
    - this file
    - config.yaml
    outputs:
    - workspace/{slug}/.publish/CLAUDE.md (stripped, renamed to {slug}.md)
    - workspace/{slug}/.publish/STATE.yaml (copied)
    - workspace/{slug}/.publish/config/routing.yaml (copied)
    - workspace/{slug}/.publish/install-manifest.yaml (copied)
    - workspace/{slug}/.publish/install-manifest.lock (computed)
    - workspace/{slug}/.publish/hooks.json (if present, copied)
    - workspace/{slug}/.publish/agents/ (stripped sub-agents)
    - workspace/{slug}/.publish/squads/ (stripped sub-squads)
    - workspace/{slug}/.publish/README.md (badges injected)
    - workspace/{slug}/.publish/vault.yaml
    - workspace/{slug}/.publish/plugin.json
    - workspace/{slug}/.publish/agentskills.yaml
    - workspace/{slug}/.publish/CHANGELOG.md
    - workspace/{slug}/.publish/LICENSE.md
    blocks_when: []
    consumer_status: aspirational
    consumer_status_reason: "/package does not yet generate plugin.json with system-level multi-sub-part lists. Wave 3 extends /package to consult install-manifest.yaml and generate the full plugin declaration."
    next_action: "/publish {slug}"
    type_specific:
      strips:
      - HTML WHY comments in ALL files
      - "# WHY lines in ALL files"
      - .meta.yaml
      - domain-map.md
      renames:
      - from: CLAUDE.md
        to: "{slug}.md"
        reason: "Workspace file is CLAUDE.md for editorial clarity; installed fragment is renamed to match the slug so multiple systems coexist."
      injects:
      - field: marketplace_url
        value: "https://myclaude.sh/p/{slug}"
      - field: Attribution comment at end of CLAUDE.md fragment
        value: "<!-- Published on myclaude.sh | Engine: Studio v3 -->"
      - field: README badges
      plugin_json_block: |
        Plugin.json generated with both 'agents' field (listing every installed agent path) and 'claudeMd' field (pointing to the installed CLAUDE.md fragment) and 'hooks' field (pointing to the installed hooks.json) so that Claude Code loads all pieces simultaneously at install time.
      agentskills_yaml_block: "Platforms: [claude-code]. Systems are Claude Code specific (multi-primitive composition requires native agents + skills + hooks + claude-md)."
      step_6b_verify:
      - All system files present in .publish/
      - install-manifest.yaml references resolve to present source files
      - No WHY comments remaining
      - CLAUDE.md fragment under 4000 chars or modular composition present
      - All sub-agent files pass individual agent step_6b_verify per agent.yaml
      - All sub-squad files pass squad step_6b_verify per squad.yaml
      - Body of each file under 500 lines
  publish:
    role: "Push to the marketplace + Anthropic plugin marketplace. Systems are distributed via vault.yaml + plugin.json with the full multi-sub-part declaration."
    optional: false
    inputs:
    - workspace/{slug}/.publish/ (state packaged)
    - myclaude CLI auth
    - creator confirmation
    outputs:
    - Live marketplace listing
    - Plugin marketplace listing
    - workspace/{slug}/.meta.yaml (state published)
    blocks_when:
    - state != packaged
    - test_result != pass (for MCS-2+)
    - myclaude auth missing
    - creator declines confirmation
    - recursion_proof missing
    consumer_status: aspirational
    consumer_status_reason: "/publish distribution channel routing does not yet differentiate system from squad for plugin.json generation."
    next_action: null
    next_action_reason: terminal action
    type_specific:
      distribution_channels:
      - channel: myclaude
        primary: true
        url_pattern: "https://myclaude.sh/p/{slug}"
      - channel: anthropic-plugin
        primary: true
        plugin_json_block: "agents + claudeMd + hooks fields with full sub-part list"
      - channel: agentskills_universal
        primary: false
        applicable: false
        reason: "Multi-primitive composition is Claude Code specific."
      confirmation_required: true
      post_publish_actions:
      - "Suggest: 'Use the system in your own daily work. Systems reveal coupling weaknesses only through real use.'"
      - "Surface install command: myclaude install {slug}"
      - "Schedule check-in 7 days post-publish"
  status:
    role: "Display the system in dashboard with archetype badge, active engines count, sub-part count, invocation count, recursion proof status."
    optional: true
    inputs:
    - workspace/{slug}/.meta.yaml
    - this file
    - references/ux-vocabulary.md
    outputs:
    - Dashboard line
    - System badge
    blocks_when: []
    consumer_status: aspirational
    consumer_status_reason: "/status does not yet surface system archetypes or engine activation counts."
    next_action: null
    next_action_reason: read-only dashboard
    type_specific:
      ux_type_name: System
      ux_type_name_source: references/ux-vocabulary.md
      state_emoji_rules: Universal
      portfolio_role_default: organism
      portfolio_role_reason: "Systems are organisms in the creator's portfolio — they compose multiple sub-parts into one cohesive tool."

# ===========================================================================
# FLOW
# ===========================================================================

flow: |
  ```mermaid
  flowchart LR
    THINK[/think optional/] -.->|organism unclear| MAP[/map/]
    MAP -.->|engines decomposed| SCOUT[/scout/]
    SCOUT -.->|existing compositions surveyed| CREATE[/create system/]
    IMPORT[/import existing/] -.-> WORKSPACE
    CREATE -->|archetype + engines + couplings + sub-parts| WORKSPACE[(workspace/slug/)]
    WORKSPACE --> FILL[/fill/]
    FILL -->|CLAUDE.md fragment + state + routing + sub-parts| VALIDATE[/validate/]
    VALIDATE -->|fail| VALIDATE
    VALIDATE -->|pass + recursion proof| TEST[/test/]
    TEST -->|multi-sub-part sandbox + uninstall sim| PACKAGE[/package/]
    PACKAGE -->|stripped + plugin.json multi-sub-part| PUBLISH[/publish/]
    PUBLISH -->|live| MARKET[(marketplace)]
    MARKET -.->|longitudinal usage feedback| SCOUT
    STATUS[/status/] -.-> WORKSPACE
    classDef writeSkill fill:#e1f5ff,stroke:#0277bd
    classDef gate fill:#fff4e1,stroke:#ef6c00
    classDef terminal fill:#e8f5e9,stroke:#2e7d32
    classDef discovery fill:#f3e5f5,stroke:#6a1b9a
    class CREATE,FILL,PACKAGE writeSkill
    class STATUS,VALIDATE,TEST gate
    class PUBLISH terminal
    class IMPORT,THINK,MAP,SCOUT discovery
  ```

# ===========================================================================
# FAILURE MODES
# ===========================================================================

failure_modes:
- mode: engine_declared_without_couples_with
  detection: /validate Stage 5 coupling_check
  degradation: BLOCK MCS-2 — pile-of-drawers anti-pattern
  recovery: Declare couples_with with rationale for every active engine
- mode: recursion_proof_missing
  detection: /validate Stage 3 check_d4
  degradation: BLOCK — P9 not operationalized
  recovery: Add recursion_proof section and demonstration file
- mode: claude_md_fragment_exceeds_4000_chars_without_composition
  detection: /validate Stage 3 check_d3 AND check_d20
  degradation: BLOCK MCS-2 — ambient cost violation
  recovery: "Split fragment via @include composition or move content to .claude/rules/ with paths scoping"
- mode: install_manifest_missing
  detection: /validate Stage 1 structural
  degradation: BLOCK — system cannot be installed reversibly
  recovery: Scaffold install-manifest.yaml from archetype
- mode: hooks_fragment_binds_non_canonical_event
  detection: /validate Stage 2 integrity
  degradation: BLOCK — unknown hook event
  recovery: Use one of the 27 canonical events from environmental_perception
- mode: sub_squad_orchestrator_has_write_in_tools
  detection: /validate Stage 5 D9
  degradation: BLOCK MCS-2 — physical D9 missing
  recovery: Remove Write/Edit from orchestrator tools per squad.yaml P2
- mode: hereditary_register_mixed_with_declarative_register
  detection: /validate Stage 7 anti-commodity
  degradation: coaching — mnemonic layer collapse
  recovery: Separate preloaded skill content (hereditary) from memory:project narrative (declarative)
- mode: longitudinal_observer_writes_to_state_yaml_instead_of_memory
  detection: /validate Stage 5 check_d12
  degradation: coaching — register misuse
  recovery: Observer writes narrative to memory:project, STATE.yaml is procedural only
- mode: ecological_coexistence_undeclared
  detection: /validate Stage 2 integrity
  degradation: BLOCK MCS-2 — Q9 unanswered
  recovery: Declare namespace, hook binding, fragment scope in CLAUDE.md fragment
- mode: boot_initial_prompt_without_degradation_path
  detection: /validate Stage 3 check_d14
  degradation: BLOCK MCS-2 — fragile protocol without fallback
  recovery: Add graceful degradation path to initialPrompt
- mode: recursion_proof_demonstration_fails
  detection: /validate Stage 3 check_d4 + recursion_proof self-run
  degradation: BLOCK publish — P9 hypocritical
  recovery: Fix underlying failure in the organism before claiming recursive integrity

# ===========================================================================
# INVARIANTS
# ===========================================================================

invariants:
- Primary file is CLAUDE.md (renamed to {slug}.md at package time)
- System install target is multi-file — {slug}/ directory holding CLAUDE.md, STATE.yaml, config/routing.yaml, install-manifest.yaml, README.md, plus sub-parts
- Minimum file count — CLAUDE.md + STATE.yaml + config/routing.yaml + install-manifest.yaml + README.md + at least one of (hooks.json, agents/, squads/, output-style) = 6+ files
- Every active engine in organismic_engines has a non-empty couples_with with non-empty rationale
- At least 7 engines (the mandatory set E0 E1 E2 E4 E9 E10 E12) are active in every forged system
- CLAUDE.md fragment under 4000 characters OR uses @include composition
- install_manifest dispatches to at least 3 distinct native destinations (e.g., .claude/rules/, .claude/agents/, .claude/settings.local.json via merge)
- Every sub-squad follows squad.yaml invariants independently
- Every sub-agent follows agent.yaml invariants independently
- routing.yaml MUST declare fallback at system level if more than one sub-squad
- hooks.json bindings use only the 27 canonical hook events
- No hardcoded absolute paths anywhere in the bundle
- All Tier 3 patterns D9/D10/D11/D12/D18 are REQUIRED for systems at MCS-2+
- recursion_proof section present with demonstration file referenced
- Ecological coexistence (Q9) answered explicitly in CLAUDE.md fragment or README
- namespace_strategy applied consistently across all sub-parts

# ===========================================================================
# SECURITY PROFILE
# ===========================================================================

security_profile:
  aegis_applicable: true
  reason: "Systems compose multiple primitives each with its own attack surface. A system installs a CLAUDE.md fragment (ambient instruction injection vector), a hooks fragment (settings.local.json merge — can change hook event handlers globally), multiple sub-agents and sub-squads (each with their own attack surfaces), and an install_manifest that dispatches to multiple native destinations. Systems are the MOST security-relevant type, above squads."
  attack_surfaces:
  - Each sub-agent's individual attack surfaces (per agent.yaml.security_profile)
  - Each sub-squad's routing.yaml content (prompt injection vector)
  - hooks.json content loaded into settings.local.json (can modify global hook behavior)
  - CLAUDE.md fragment content (ambient instruction injection every turn)
  - install_manifest targets (can specify unintended paths, can merge into sensitive files)
  - install_manifest.lock hashes (integrity of the install chain)
  - requiredMcpServers patterns (habitat-dependent phenotype, can hide malicious agents from inexperienced users)
  - criticalSystemReminder_EXPERIMENTAL content (runtime constitution injection)
  - memory scope files of sub-agents (cross-session persistence vector)
  - "@include directives in the CLAUDE.md fragment (transitive inclusion chain)"
  shell_execution: via any sub-agent that allows Bash, plus BashCommandHook bindings
  file_io: via any sub-agent that allows Read/Write/Edit, plus PostToolUse hooks on file events
  network_calls: via any sub-agent with WebFetch or mcpServers, plus HttpHook bindings
  tool_invocation: controlled per sub-agent, plus the system-level hooks fragment
  installation_trust_level: audit_required
  installation_trust_reason: "Systems install multiple files to multiple native destinations including settings.local.json merges and CLAUDE.md rules. Every sub-part and the system-level fragments must be audited via /aegis before install. Systems should NEVER auto-install from untrusted sources. The install_manifest.lock is the audit trail."
  recommended_audit_checks:
  - Audit each sub-agent per agent.yaml.security_profile.recommended_audit_checks
  - Audit each sub-squad per squad.yaml.security_profile.recommended_audit_checks
  - Audit routing.yaml at system level for prompt injection patterns in triggers and synthesis
  - Audit hooks.json bindings — flag any binding to Setup, SessionStart, PreCompact, ConfigChange, PermissionRequest as high-impact
  - Audit install_manifest targets — flag any target outside the expected native destinations
  - Audit install_manifest merge kind entries — flag merges into settings.local.json that change hook configuration globally
  - Audit CLAUDE.md fragment @include directives — flag any include pointing outside the organism bundle
  - Audit requiredMcpServers patterns — verify they match intended habitats, not unrelated user environments
  consumer_status: aspirational
  consumer_status_reason: "/aegis does not yet audit systems as a distinct type. Wave 3 teaches /aegis to treat systems specially with the attack surface list above."

