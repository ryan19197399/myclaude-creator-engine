# ===========================================================================
# TOKEN ECONOMICS
# ===========================================================================

token_economics:
  catalog_cost_tokens: 400
  catalog_cost_reason: "Systems have multiple sub-agents each with name + description in catalog (~50 tokens × N sub-agents + ~100 tokens for the CLAUDE.md fragment if it enters ambient window via paths scoping). An apex system with 8 sub-agents costs ~500 tokens always in the catalog."
  catalog_cost_source: loadSkillsDir.ts:100-105
  invocation_cost: per_sub_part_spawn
  invocation_cost_reason: "Each sub-agent spawn is a full agent boot. Each sub-squad is an orchestrator + its specialists. A system-level invocation that activates 3 sub-squads × 4 specialists each costs ~12 full agent contexts."
  ambient_cost: medium_to_critical
  ambient_cost_reason: "CLAUDE.md fragment enters ambient every turn if present (up to 4000 chars hard limit). hooks.json bindings that match frequently touched events contribute ambient evaluation cost."
  optimization_notes: |
    Keep the CLAUDE.md fragment under 2000 chars when possible; use @include for modular
    composition. Use paths frontmatter on the fragment to make it conditional. Use path-scoped
    conditional skills for specialist knowledge that should be dormant until relevant files are
    touched. Use requiredMcpServers to hide sub-agents from habitats where they do not apply.
    The organism's metabolism at rest can approach zero if every non-core component is
    conditional on file context or habitat.
  budget_example: "Cognitive organism with 2 sub-squads, 6 sub-agents, 1 hooks fragment, 1 claude-md fragment: ambient ~500-2000 tokens/turn depending on fragment size, invocation cost ~15K per orchestrator turn scaled by specialist spawns."

