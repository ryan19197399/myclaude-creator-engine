# product-dna/system.yaml — Codex for Systems
# Read by /create, /fill, /validate, /test, /package, /publish, /import, /map, /status
# when type=system. The SINGLE SOURCE OF TRUTH for the System product type.
#
# Schema version: 3.0.0 (Sprint 8 Wave 2b — codex)
# Ground truth: every claim about Claude Code native behavior carries a
# [SOURCE: file.ts:line] reference verified in S118c. See
# references/claude-code-ground-truth.md for the full verified capability register.
#
# HERITAGE: system extends squad.yaml, which extends agent.yaml, which extends
# skill.yaml. Everything about sub-agents inherits from agent.yaml; everything
# about coordinated sub-squads inherits from squad.yaml; everything about
# composed skills inherits from skill.yaml. This codex adds the ORGANISM layer —
# operational closure, declared metabolism, re-injected constitution, triple
# mnemonic substrate, environmental perception via hooks, declared cognitive
# reflexes, coupling declaration requirement, and recursive integrity made into
# a forge-time gate.
#
# VOCABULARY NOTE (Vitruvian declaration in the portico of essence below):
# When this codex uses the word "system", read it as you would read "organism" —
# not as you would read "software". A system here is not a cohesive set of
# components; it is a composed organism with re-declared identity, memory in
# three registers, environmental reflexes, plasticity across two scales, and
# the capacity to observe its own behavior longitudinally. The word stays for
# communication reasons; the meaning is richer by declaration at the portico.

# ===========================================================================
# IDENTITY
# ===========================================================================

type: system
primary_file: CLAUDE.md
install_target: .claude/systems/{slug}/
template: templates/system/
canonical_spec: references/product-specs/system-spec.md
package_rename: '{slug}.md'

# ===========================================================================
# ESSENCE
# ===========================================================================

essence:
  one_line: A composed cognitive organism with operational closure, re-declared identity, triple memory, environmental reflexes, and reversible lifecycle.
  amplifies: "Organism-scale capability composition \u2014 a system lets a creator ship a full cognitive stack (multiple squads + agents + skills + hooks + claude-md fragment + output-style) as one reversible install whose parts were designed together, whose boundaries are declared, and whose recursive self-validation is a forge-time gate."
  philosophy: |
    Read the word "system" in this codex as you would read "organism", not as you would read "software".
    A state-of-art system is NOT a coherent set of components. It is what emerges when declared capabilities
    meet executive prohibitions — runtime-enforced restrictions that channel cognitive energy into useful flow.
    A pile is a set of capabilities. A system is a set of capabilities each of which has a named executive
    counterpart declaring what useful flow its prohibition produces. The founding question for forging a
    system is not "what can it do" — it is "what can it physically NOT do, and what useful flow does that
    impossibility channel". Every engine declared below instantiates this founding question at a different
    scale. The meta-requirement is that every active engine name its functional counterpart, because without
    that naming it is a drawer, not an organ.
  refuses:
  - Existing as a single monolithic CLAUDE.md fragment — a system requires at minimum a CLAUDE.md fragment PLUS at least one of (sub-squad, sub-agent, hooks fragment, output-style). Otherwise it is a claude-md product mislabeled.
  - Shipping capabilities without declaring their executive counterparts — every capability must name the runtime prohibition that channels it into useful flow.
  - Assuming context will remember across sessions — state must live in externalized artifacts (STATE.yaml, .meta.yaml, memory scope files, install_manifest.lock) that survive /compact.
  - Declaring environmental reflexes without declaring the executive prohibition that makes them reflexes rather than arbitrary event handlers.
  - Claiming to self-validate without a recursion_proof section demonstrating that /validate passed when pointed at the system itself.
  - Co-existing with other installed systems without declaring its ecological niche — namespace conflicts, hook event binding overlap, claude-md fragment scope.
  trade_offs:
    gains:
    - Operational closure made physical via omitClaudeMd + context fork + ephemeral mcpServers + tools intersection [SOURCE: runAgent.ts:390-398, 694-714, 95-218; agentToolUtils.ts:15-37].
    - Metabolic budget declarable at both rest and operation — auditable against config.yaml token_budgets, plus conditional activation of path-scoped components [SOURCE: loadSkillsDir.ts:159-178].
    - Re-injected constitution via criticalSystemReminder_EXPERIMENTAL per turn plus CLAUDE.md re-load per turn — identity as active work [SOURCE: runAgent.ts:711-714, verificationAgent.ts:150-151, claudemd.ts:1-16].
    - Triple mnemonic substrate in three orthogonal registers — hereditary via skills preload, procedural via STATE.yaml+.meta.yaml+memory, declarative via memory:project natural-language notes [SOURCE: runAgent.ts:577-646; loadAgentsDir.ts:456-467].
    - Environmental perception via 27 canonical hook events — the full enum is verified [SOURCE: coreTypes.ts:25-53, coreSchemas.ts:355-385].
    - Declared cognitive reflexes via the four hook types — BashCommand, Prompt, Http, Agent [SOURCE: schemas/hooks.ts:31-163].
    - Isolated judgment via fork-context subagents [SOURCE: runAgent.ts:694-714].
    - Coordinated network via declarative routing.yaml consumed by orchestrators [SOURCE: AgentTool/prompt.ts:271].
    - External voice via composed output-style fragments — declared signature, not decoration.
    - Recursive integrity operationalized — /validate --target=self is a forge-time gate.
    - Externalized persistent state with an explicit survival matrix.
    - Longitudinal self-observation available via PostToolUse + AgentHook + memory:project composition.
    - Reversible lifecycle via install_manifest + manifest-lock hash-verified — symmetric install and uninstall.
    sacrifices:
    - Highest forge cost in the family-skill lineage — 3-5x a squad.
    - Multi-target install complexity — install_manifest dispatches fragments to multiple native destinations.
    - Validation recursion cost at level=3 — ~44 nested validate runs for a complex system, ~836K tokens, exceeds single-session window, must be split or cached.
    - Ecological coexistence overhead — namespace, hook binding, and fragment scope must be declared.
    - Return value still unstructured text at the orchestrator layer [SOURCE: AgentTool/prompt.ts:257].
    worth_it_when: The creator is shipping a full cognitive stack whose parts were designed together — constitution plus orchestration plus reflexes plus memory plus voice — and needs the install to be reversible, the validation to be recursive, and the coexistence with other installed products to be declared.

# ===========================================================================
# ARCHITECTURAL PRINCIPLES — 9 specializations for systems
# ===========================================================================

architectural_principles:
  P1_purpose_before_shape:
    specialization: "Before scaffolding a system, the creator answers the 9 discovery questions in order — operational closure, productive asymmetry, survival checklist, metabolism, external voice, recursion, context cardinality, reflex vs judgment, ecological coexistence. Archetype selection and declaration of which of the 13 engines are active happens BEFORE any fragment is scaffolded."
    enforced_by:
    - discovery_questions.required_in_order
    - archetypes.selection_required
    - lifecycle.create.type_specific.discovery_phase
    blocks_forge_when: Creator cannot answer any of the 9 discovery questions OR cannot name which engines of the 13 are active.
  P2_constraint_before_feature:
    specialization: "For a system, constraint is the entire organism's runtime boundary. Operational closure is declared FIRST — what is inside, what is outside, what is the membrane. Every capability must name an executive prohibition that channels it into useful flow. Every sub-agent inherits the tool boundary enforcement pattern from agent.yaml and squad.yaml."
    enforced_by:
    - dna_patterns.tier1.D2
    - coupling_declaration_requirement
    - anti_patterns_catalog
    - invariants
    blocks_forge_when: Any active engine is declared without a couples_with field OR any sub-agent violates tool boundary discipline.
  P3_composition_over_monolith:
    specialization: "A system IS composition by definition — it composes multiple squads, agents, skills, hooks, claude-md fragments, and output-style into one reversible install. Minimum is CLAUDE.md fragment PLUS at least one of (sub-squad, sub-agent, hooks fragment, output-style)."
    enforced_by:
    - dna_patterns.tier1.D3
    - dna_patterns.tier2.D20
    - install_manifest
    - invariants
    blocks_forge_when: "System composes zero sub-parts beyond its own CLAUDE.md fragment OR the CLAUDE.md fragment exceeds the 4000 character soft limit without modular composition via @include."
  P4_contract_before_narrative:
    specialization: "The system's contract is the union of install_manifest, hooks_fragment_spec, claude_md_fragment_spec, organism_state_machine, and recursion_proof. Prose in the CLAUDE.md fragment explains the contract but never replaces it."
    enforced_by:
    - install_manifest
    - hooks_fragment_spec
    - claude_md_fragment_spec
    - organism_state_machine
    - recursion_proof
    - frontmatter.required
    blocks_forge_when: install_manifest missing OR hooks_fragment_spec declared but hooks_fragment file absent OR claude_md_fragment_spec declared but fragment file absent OR recursion_proof absent.
  P5_failure_mode_before_happy_path:
    specialization: "Systems declare failure modes at five levels — individual agent failure, routing failure at squad level, hook fragment failure, claude-md fragment load failure, recursion proof failure. Each level has a declared degradation path. Silent failure is forbidden."
    enforced_by:
    - dna_patterns.tier1.D14
    - failure_modes
    - hooks_fragment_spec
    - claude_md_fragment_spec
    - recursion_proof
    - invariants
    blocks_forge_when: Any of the 5 failure levels lacks a declared degradation path.
  P6_state_at_the_edge:
    specialization: "System state has four native channels — STATE.yaml at the organism root, .meta.yaml per composed sub-part, memory scope files of sub-agents, install_manifest.lock computed at install time. Every state claim must map to an externalized file that survives /compact."
    enforced_by:
    - dna_patterns.tier2.D8
    - dna_patterns.tier3.D12
    - organism_state_machine
    - invariants
    blocks_forge_when: System declares cross-session memory without declaring which file stores it OR without declaring how it survives /compact.
  P7_read_before_write:
    specialization: "/create reads creator.yaml plus optional scout report plus this codex plus templates/system/ plus canonical_spec plus claude-code-ground-truth.md plus agent.yaml plus squad.yaml plus structural-dna.md plus config.yaml BEFORE generating any scaffold (10 reads). Highest read-before-write ratio in the family-skill group."
    enforced_by:
    - lifecycle.create.type_specific.read_before_write_ratio
    - lifecycle.create.type_specific.ground_truth_required
    - recursion_proof
    - invariants
    blocks_forge_when: System scaffolded without reading squad.yaml AND agent.yaml for inheritance OR without reading claude-code-ground-truth.md for native behavior verification.
  P8_invisibility_of_mechanism:
    specialization: "User-facing strings in published systems MUST NOT reference Engine internals, substrate vocabulary, engine numbers, dimension names, archetype taxonomy labels, or meta-vocabulary used inside this codex. The buyer installs an organism and uses it; the forge machinery stays invisible."
    enforced_by:
    - lifecycle.validate.type_specific.per_stage_hooks.stage_7_anti_commodity
    blocks_forge_when: Word-bounded grep on published user-facing strings matches substrate vocabulary OR internal archetype names as marketing copy.
  P9_recursive_integrity:
    specialization: "The system is the ONLY type in the family-skill lineage where P9 is fully recursive. The organism must pass /validate when pointed at itself — structurally, integrally, on DNA patterns at all three tiers, on sub-squads recursively, on sub-agents recursively, on the hooks fragment, on the claude-md fragment, on the output-style. At level=3 the recursion is expensive; the codex offers three modalities."
    enforced_by:
    - recursion_proof
    - lifecycle.validate.type_specific.recursion_modalities
    - dna_patterns.tier1.D4
    - dna_patterns.tier3.D11
    blocks_forge_when: recursion_proof section absent OR /validate --target=self was never run on this system before publish attempt.

# ===========================================================================
# OPERATIONAL MODES + FREEDOM LEVELS
# ===========================================================================

operational_modes:
  supports: [discovery, structure]
  default: discovery
  rationale: "Systems default to DISCOVERY because composing an organism benefits enormously from /scout (existing systems, agents, squads in the marketplace) and /map (decomposing the organism into engines, sub-parts, and couplings). A creator with a fully clear system design can enter structure mode via /create system directly, but this is rare."
  discovery_entry_via:
    skill: /scout
    fallback: /map
    rationale: "/scout identifies existing organisms and composable sub-parts. /map decomposes the creator's workflow expertise into the 13 engines and 4 dimensions."

freedom_levels:
  valid: [1, 2, 3]
  default: 2
  rationale: "Systems work at freedom levels 1-3. Levels 4-5 are NOT recommended because autonomous system generation produces incoherent engine-plus-sub-part compositions. The creator must deliberately decide which engines are active and why."
  per_level_behavior:
    1: "Engine walks every engine, every coupling, every sub-part, every hook binding. Used for first system."
    2: "Engine proposes engine selection and sub-part roster from discovery; creator confirms. DEFAULT."
    3: "Engine generates full system from discovery plus scout plus domain-map; creator audits."
  consumer_status: aspirational
  consumer_status_reason: "Wave 3 teaches /create and /fill to consult freedom_level for systems."

# ===========================================================================
# INTENT TOPOLOGY — derived shape (delivery fixed to composed_system; nature + depth inherited)
# ===========================================================================
# Axis source: references/intent-topology.md §2. System is the only type
# delivered via composed_system — a myClaude convention dispatching CLAUDE.md
# fragment + sub-agents + sub-squads + hooks + output-style as a reversible
# bundle. Operational nature and cognitive depth are inherited from the
# composed sub-parts, not declared at the system level. Declaration mode: derived.

intent_topology:
  declaration_mode: derived
  declaration_mode_reason: "System has fixed delivery_mechanism=composed_system (the defining characteristic of the type) and INHERITED operational_nature and cognitive_depth from its composed sub-parts. A system can contain executor sub-agents (mutating state), advisor sub-agents (read-only judgment), orchestrator squads, and observer hooks — all simultaneously. Declaring a single operational_nature would misrepresent the composite nature of the type. cognitive_depth likewise applies per sub-part, not at the system level."
  runtime_shape_note: "delivery_mechanism=composed_system, operational_nature=inherited-from-sub-parts, cognitive_depth=inherited-from-sub-parts. See references/runtime-host-dag.md §2 row 6 (composed_system → varies by composed parts) and references/composition-anatomy.md §3 for the three composition classes."
  delivery_mechanism_fixed: composed_system
  operational_nature_inherited: true
  operational_nature_inherited_from: "sub-parts (agents, squads, hooks, output-styles, claude-md fragment)"
  cognitive_depth_applicable: per_sub_part
  cognitive_depth_applicable_reason: "A system itself has no cognitive architecture — it is a composition contract. Depth lives in each sub-agent and each sub-mind within the composition. The system's quality depends on composition discipline (D9 orchestrate-don't-execute, D10 handoff specification, D16 composability) not on depth."
  runtime_host_derived: "varies-by-composed-parts"
  locale_adaptive_clause_required: true
  locale_adaptive_clause_source: references/locale-adaptive-clause.md
  locale_adaptive_clause_required_reason: "Every forged system carries a runtime contract that propagates to ALL composed sub-parts: the CLAUDE.md fragment, each sub-agent, each sub-squad, each hook handler, and the output-style. Mirror the invoker's language in user-facing output while preserving structural markers in the source language. A system forged in PT-BR is installable by a French user as a complete organism: the composition contracts travel; every user-facing voice mirrors. Injected by /create during W2.6 into templates/system/ across all sub-part templates."
  locale_adaptive_clause_consumer_status: native
  consumer_status: aspirational
  consumer_status_reason: "Wave 2 W2.3-W2.5 consume this block per the standard routing, Stage 0, and drift-check enum paths. System-specific note: Stage 0 Intent Coherence for system type must recursively validate each sub-part's intent_declaration, not just the system's."

# ===========================================================================
# ARCHITECTURAL DIMENSIONS — 4 orthogonal coupling patterns (mental frame)
# ===========================================================================

architectural_dimensions:
  rationale: "These 4 dimensions are the mental frame the creator applies BEFORE deciding which of the 13 engines to instantiate. Without the frame, a system is a list of features. With the frame, a system is an organism with layered capability at different scales and registers. Each dimension pairs or triples engines that are functionally orthogonal and must be present together."
  dimensions_total: 4
  dual_temporal_homeostasis:
    one_line: The organism wakes pre-aligned at two time scales — once per session, once per agent spawn.
    description: "Homeostasis at the system level (once per session, via SessionStart or Setup hook) combined with homeostasis at the agent level (once per agent spawn, via initialPrompt). Together these two scales ensure the organism is cognitively punctual — no agent pays preparation cost in the user's working time."
    engines_touched: [E2, E4, E5]
    temporal_regimes: [instant, operational]
    pairs_with_patterns: [constitutional_homeostasis_via_session_hook, executable_boot_via_initial_prompt]
    one_line_pedagogy: "Ask — when the user opens a new session, what state is the organism in BEFORE the user types anything? And when a new agent is spawned, what work has it already done BEFORE reading the user's request?"
  dual_plasticity:
    one_line: The organism adapts at install time and at operation time, on two orthogonal scales.
    description: "Plasticity at install time via requiredMcpServers (phenotype tracks habitat) combined with plasticity at operation time via ephemeral mcpServers (temporary organs dissolve without trace). Two disjoint plasticities — adaptive to habitat at installation, adaptive to moment at operation."
    engines_touched: [E0, E12, E6]
    temporal_regimes: [operational, longitudinal]
    pairs_with_patterns: [habitat_polymorphism_via_required_mcp, ephemeral_specialist_with_temporary_organ]
    one_line_pedagogy: "Ask — does every user see the same visible form of this organism, or does the visible form depend on what the user's environment already contains? And does every invocation carry the same organs, or do some organs exist only for a single invocation?"
  dual_cognition_brain_and_spine:
    one_line: The organism has deliberate cognition (orchestrated squad) AND ambient reflexes (path-scoped conditional skills).
    description: "Deliberate cognition via the orchestrator-plus-specialists pattern (brain — decides then acts) combined with ambient reflexes via path-scoped conditional skills (spine — triggered by environmental signals, cheap, fast, context-specific). A system with only brain is slow for routine contexts; with only reflexes, cannot do strategy."
    engines_touched: [E5, E6, E7]
    temporal_regimes: [instant, operational]
    pairs_with_patterns: [stigmergic_reflex_via_path_scoped_skills]
    one_line_pedagogy: "Ask — which responses are ambient reflexes that should fire automatically when the user touches a certain kind of file, and which responses are deliberate decisions the orchestrator should make? Name the split consciously."
  triple_memory:
    one_line: The organism has memory in three orthogonal registers — hereditary, procedural, declarative.
    description: "Hereditary via skills preload (the agent is born knowing what the species learned, updated by editing the skill file). Procedural via STATE.yaml plus .meta.yaml plus memory scope files used for structured facts. Declarative via memory:project used for natural-language observations. Mixing functions across registers is an anti-pattern (AP-S6)."
    engines_touched: [E3, E10, E11]
    temporal_regimes: [instant, operational, longitudinal]
    pairs_with_patterns: [bifasic_mnemonic_consciousness, phylogenetic_cognition_via_skills_preload, longitudinal_self_observation]
    one_line_pedagogy: "Ask — what does this organism KNOW before any user arrives (hereditary), what does it TRACK during operation (procedural), what does it LEARN ABOUT ITSELF across sessions (declarative)?"

# ===========================================================================
# ORGANISMIC ENGINES — 13 functional engines + coupling meta-requirement
# ===========================================================================

organismic_engines:
  total_engines: 13
  meta_requirement: coupling_declaration_requirement
  engines_mandatory_for_all_systems: [E0, E1, E2, E4, E9, E10, E12]
  engines_optional_for_mcs1: [E3, E5, E6, E7, E8, E11]
  engines_required_for_mcs3_apex: all

  E0_operational_closure:
    rank: 0
    one_line: The declared boundary between inside and outside the organism — condition of possibility of all other engines.
    native_mechanisms:
    - "omitClaudeMd: true drops parent CLAUDE.md hierarchy [SOURCE: runAgent.ts:390-398]"
    - "context: fork creates isolated conversation history [SOURCE: runAgent.ts:694-714]"
    - "ephemeral mcpServers inline, cleaned up on agent exit [SOURCE: runAgent.ts:95-218, 817]"
    - "tools ∩ ¬disallowedTools computed before spawn, fixed for lifetime [SOURCE: agentToolUtils.ts:15-37]"
    - "isolation: worktree for physical FS isolation [SOURCE: loadAgentsDir.ts:607-621]"
    couples_with: [E4]
    couples_rationale: "The membrane only makes functional sense when there is something outside to perceive. Operational closure without environmental perception is a sealed chamber — technically bounded but operationally dead."
    temporal_regimes: [instant, operational]
    principles_enforced: [P2, P8]
    dna_patterns_instantiated: [D3, D16, D18]
    discovery_question: 1
    codex_destination: "Forged system declares operational_closure section in CLAUDE.md fragment naming what is inside, what tool surface is closed, which sub-agents drop parent context."
    consumer_status: fully-wired
  E1_metabolic_budget:
    rank: 1
    one_line: The declared token cost at rest and in operation — the condition of continued life, not a function.
    native_mechanisms:
    - "paths frontmatter on skills stays dormant until matching files are touched [SOURCE: loadSkillsDir.ts:159-178, 826-1058]"
    - "paths frontmatter on CLAUDE.md fragments stays dormant until matching files are present [SOURCE: claudemd.ts:253-279]"
    - "omitClaudeMd drops 5-15 Gtok/week at fleet scale [SOURCE: runAgent.ts:390-398]"
    - "Fork subagent cache byte-identical prefix [SOURCE: forkSubagent.ts:91-169]"
    - "config.yaml token_budgets — ambient 4000, per_op 15000, ceiling 0.70"
    couples_with: [E0]
    couples_rationale: "A rigid membrane without metabolism is a coffin. Metabolism without membrane is continuous leakage. Co-conditions of the organism being alive AND being an organism."
    temporal_regimes: [operational, longitudinal]
    principles_enforced: [P3]
    dna_patterns_instantiated: [D3, D20]
    discovery_question: 4
    codex_destination: "Forged system declares metabolic_budget section with at_rest tokens and in_operation tokens per invocation type."
    consumer_status: fully-wired
  E2_reinjected_constitution:
    rank: 2
    one_line: Active identity re-declared each turn — constitution as continuous work.
    native_mechanisms:
    - "criticalSystemReminder_EXPERIMENTAL re-injected at every user turn [SOURCE: runAgent.ts:711-714, verificationAgent.ts:150-151]"
    - "CLAUDE.md re-loaded per turn, 4-tier hierarchy managed+user+project+local, reverse-priority order [SOURCE: claudemd.ts:1-16]"
    - "initialPrompt prepended to first user turn of each agent spawn [SOURCE: loadAgentsDir.ts:123, 686-690]"
    - "@include directive for modular composition [SOURCE: claudemd.ts:18-26]"
    couples_with: [E1, E8]
    couples_rationale: "Re-injection has metabolic cost that must be accounted for in E1. And the internal constitution re-declared must match the external voice (E8), or the organism lies about itself."
    temporal_regimes: [instant]
    principles_enforced: [P1, P5]
    dna_patterns_instantiated: [D1, D19]
    discovery_question: 2
    codex_destination: "Forged system declares constitutional_reinjection section listing what is re-injected and on which event."
    consumer_status: fully-wired
  E3_triple_mnemonic_substrate:
    rank: 3
    one_line: Memory in three orthogonal registers — hereditary, procedural, declarative — serving disjoint functions.
    native_mechanisms:
    - "HEREDITARY — skills preload via skills frontmatter, injected as isMeta user messages [SOURCE: loadAgentsDir.ts:684, runAgent.ts:577-646]"
    - "PROCEDURAL — STATE.yaml, .meta.yaml, memory:project for structured facts [SOURCE: loadAgentsDir.ts:456-467, 594-605]"
    - "DECLARATIVE — memory:project for natural-language observations, auto-injected Write/Edit/Read [SOURCE: loadAgentsDir.ts:456-467, 662-674]"
    - "Updating a preloaded skill updates all future agent spawns"
    couples_with: [E10, E11]
    couples_rationale: "The procedural register IS externalized state (E10) — same files, different angles. The declarative register is fed by longitudinal self-observation (E11) — without observation there is nothing to declare."
    temporal_regimes: [instant, operational, longitudinal]
    principles_enforced: [P6]
    dna_patterns_instantiated: [D8, D12]
    discovery_question: 3
    codex_destination: "Forged system declares mnemonic_layers section with three sub-fields — hereditary, procedural, declarative — each naming the files and the function."
    consumer_status: fully-wired
  E4_environmental_perception:
    rank: 4
    one_line: Ability to sense what changed in the world — via the 27 canonical hook events.
    native_mechanisms:
    - "27 canonical hook events in the SDK core types [SOURCE: coreTypes.ts:25-53, coreSchemas.ts:355-385]"
    - "4 hook types — BashCommandHook, PromptHook, HttpHook, AgentHook — with if matching via permission rule syntax [SOURCE: schemas/hooks.ts:31-163, 19-27]"
    - "SessionStart and Setup are ALWAYS emitted regardless of matchers [SOURCE: hookEvents.ts:18]"
    - "SubagentStart hook injects additionalContexts into child agent spawn [SOURCE: runAgent.ts:532-555]"
    couples_with: [E0, E5]
    couples_rationale: "Perception needs a boundary to distinguish inside from outside (E0), and perception needs a reflex layer to turn signals into reactions (E5). An eye without a membrane is dissolution; an eye without a reflex is a passive sensor."
    temporal_regimes: [instant]
    principles_enforced: [P7]
    dna_patterns_instantiated: [D17]
    discovery_question: 8
    codex_destination: "Forged system declares environmental_perception section with list of bound hook events from the canonical 27."
    consumer_status: fully-wired
  E5_declared_cognitive_reflex:
    rank: 5
    one_line: Automatic reactions to perceptions — including reactions that involve judgment, via AgentHook.
    native_mechanisms:
    - "AgentHook spawns a full agent to react — cognitive reflex [SOURCE: schemas/hooks.ts:128-163]"
    - "PromptHook makes the LLM evaluate a condition — semantic reflex [SOURCE: schemas/hooks.ts:67-96]"
    - "BashCommandHook executes a shell side effect [SOURCE: schemas/hooks.ts:31-66]"
    - "HttpHook fires a webhook [SOURCE: schemas/hooks.ts:97-126]"
    couples_with: [E6, E4]
    couples_rationale: "A reflex without isolated judgment is rigidity — fast but context-blind. Judgment without reflex is slowness — every routine event goes through deliberation. Together with perception (E4) they form the sensorimotor cognitive chain."
    temporal_regimes: [instant]
    principles_enforced: [P2, P5]
    dna_patterns_instantiated: [D14, D17]
    discovery_question: 8
    codex_destination: "Forged system declares cognitive_reflexes section with a table of threats handled by reflex versus threats handled by judgment."
    consumer_status: fully-wired
  E6_isolated_judgment:
    rank: 6
    one_line: Specialized decision units in forked context with restricted tools and own constitution.
    native_mechanisms:
    - "context: fork creates isolated context window [SOURCE: runAgent.ts:694-714]"
    - "tools intersection with disallowedTools per agent [SOURCE: agentToolUtils.ts:15-37]"
    - "forkContextMessages parameter for context inheritance decisions [SOURCE: runAgent.ts:248-329]"
    - "7 archetypes from agent.yaml (SCOUT, ARCHITECT, GENERALIST, SPECIALIST, ADVISER, ORCHESTRATOR, FORK-HEIR)"
    couples_with: [E7, E5]
