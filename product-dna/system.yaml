dna_patterns:
  tier1:
    D1:
      required: true
      applicable: true
      name: Activation Protocol
      check: "CLAUDE.md fragment has identity + activation protocol; every sub-agent and sub-squad has activation protocol"
    D2:
      required: true
      applicable: true
      name: Anti-Pattern Guard
      check: "CLAUDE.md fragment references AP-S1..S12; every sub-agent has its own anti-patterns per agent.yaml"
    D3:
      required: true
      applicable: true
      name: Progressive Disclosure
      check: "CLAUDE.md fragment under 4000 chars OR @include composition; each sub-part under 500 lines; references/ used"
    D4:
      required: true
      applicable: true
      name: Quality Gate
      check: "recursion_proof declared; each sub-squad has synthesis quality gate; each sub-agent has its own quality gate"
    D13:
      required: true
      applicable: true
      name: Self-Documentation
      check: "README.md with what/install/usage/requirements; install instructions reference myclaude install"
    D14:
      required: true
      applicable: true
      name: Graceful Degradation
      check: "Every engine declares a degradation path in failure_modes; every reflex has when-not-to-use"
    D19:
      required: true
      applicable: true
      name: Attention-Aware Authoring
      check: "Critical constraints in the last 30% of CLAUDE.md fragment body; @include ordering preserves attention-recency priority"
  tier2:
    D5:
      required: true
      applicable: true
      name: Question System
      check: "Discovery questions walked in required_in_order; 9 questions present"
    D6:
      required: false
      applicable: true
      name: Confidence Signaling
      check: "System synthesis step signals confidence in final reports (recommended for observatorium archetype)"
    D7:
      required: true
      applicable: true
      name: Pre-Execution Gate
      check: "System declares pre-execution checks (required files, required state, required MCP habitat)"
    D8:
      required: true
      applicable: true
      name: State Persistence
      check: "STATE.yaml at organism root; per-sub-part .meta.yaml; explicit survival matrix in state_persistence section"
    D15:
      required: true
      applicable: true
      name: Testability
      check: "examples/ or scenarios/ directory with the 3 canonical scenarios (happy, edge, adversarial)"
    D16:
      required: true
      applicable: true
      name: Composability
      check: "No hardcoded paths; install_manifest uses {slug} placeholders; no command name conflicts; ecological coexistence declared"
    D17:
      required: true
      applicable: true
      name: Hook Integration
      check: "hooks.json declared when E4 or E5 is active; bound events from the canonical 27; permission rule syntax for matchers"
    D20:
      required: false
      applicable: true
      name: Cache-Friendly Design
      check: "CLAUDE.md fragment under 4000 chars hard limit; frontmatter paths scoping when appropriate; no dynamic content in cached region"
  tier3:
    D9:
      required: true
      applicable: true
      name: "Orchestrate Don't Execute"
      check: "Every sub-squad orchestrator has Agent in tools and excludes Write/Edit/NotebookEdit (inherited from squad.yaml)"
    D10:
      required: true
      applicable: true
      name: Handoff Specification
      check: "Every sub-squad declares handoff_format_spec matching squad.yaml canonical_form; system-level handoffs between sub-squads declared"
    D11:
      required: true
      applicable: true
      name: Socratic Pressure
      check: "recursion_proof runs self-challenge; observatorium archetype's observer uses self-challenge pattern; adviser sub-agents use self-challenge"
    D12:
      required: true
      applicable: true
      name: Compound Memory
      check: "If any engine uses longitudinal memory (E11), memory scope is declared and files exist; hereditary register (skills preload) updates propagate to future spawns"
    D18:
      required: true
      applicable: true
      name: Subagent Isolation
      check: "Each sub-agent is distinct agent file; Task spawns fork context natively; orchestrators do not share state with specialists except via handoff"

