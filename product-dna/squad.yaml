# product-dna/squad.yaml — Codex for Squads
# Read by /create, /fill, /validate, /test, /package, /publish (and /import, /map,
# /status when they read product-dna) when type=squad.
#
# This file is the SINGLE SOURCE OF TRUTH for everything the Engine knows about the
# Squad product type. A squad is a coherent BUNDLE of agent and skill files
# distributed as one product and installed as multiple coordinated artifacts into
# .claude/agents/ and .claude/skills/. A squad is NOT a native Claude Code
# primitive — it is a myClaude CONVENTION layered on top of native primitives
# (subagents, skills, hooks, the Task tool) that enables coordinated multi-agent
# work. The codex makes this convention explicit.
#
# Schema version: 3.0.0
# Ground truth: every claim about Claude Code native behavior carries a
# [SOURCE: file.ts:line] reference verified in S118. See
# references/claude-code-ground-truth.md.
#
# HERITAGE: squad extends agent.yaml. Everything in agent.yaml's architectural
# principles, frontmatter schema, token economics, and quality rubric applies
# to each individual agent that composes a squad. This codex adds the COORDINATION
# layer — routing, handoff, install manifest, orchestration archetype enforcement.

# ===========================================================================
# IDENTITY
# ===========================================================================

type: squad
primary_file: SQUAD.md
# Squad install is MULTI-TARGET. install_target points to the workspace directory
# that holds the full bundle; the actual install is driven by install_manifest
# below. The bundle contains:
#   - SQUAD.md (manifest + orchestrator persona)
#   - routing.yaml (declarative routing consumed by the orchestrator)
#   - agents/{role}.md (sub-agent files, installed to .claude/agents/ with namespace)
#   - skills/{role}/SKILL.md (optional sub-skills, namespaced via path)
# See install_manifest for the canonical multi-target copy logic.
install_target: .claude/squads/{slug}/
template: templates/squad/
canonical_spec: references/product-specs/squad-spec.md

essence:
  one_line: A coherent bundle of agents coordinated by an orchestrator through a declarative routing table.
  amplifies: "Multi-agent coordination with physical D9 enforcement \u2014 the orchestrator routes via the Task tool using tool boundary restrictions (Agent, Read, Grep only; no Write or Edit) so it CANNOT execute specialist work itself, and the specialists each carry their own constitution and memory."
  philosophy: "A squad is the unit of coordinated delegation. Where an individual agent is trust-once, a squad is trust-a-team. The orchestrator's job is routing and synthesis, the specialists' job is execution within their scope, and the routing table makes the decisions auditable. Squads are NOT a Claude Code native primitive \u2014 they are a myClaude convention that declares a multi-file install manifest consumed by `myclaude install`, producing a set of coordinated native artifacts."
  refuses:
  - "Existing as a single monolithic file \u2014 a squad with one AGENT.md is either an agent or an over-sold skill. Squads require at least one orchestrator + one specialist."
  - "Orchestrators that execute specialist work \u2014 tool boundary enforcement (D9) is physical, not rhetorical. The orchestrator's `tools:` whitelist contains Agent, Read, Glob, Grep, and Bash (read-only) and EXCLUDES Write, Edit, NotebookEdit."
  - "Implicit routing \u2014 if routing logic lives only in orchestrator prose, it cannot be audited, validated, or replayed. The routing.yaml file is mandatory."
  - "Handoff as free text \u2014 when the orchestrator calls Task to spawn a specialist, the prompt MUST follow the handoff format declared in handoff_format_spec below. Free-text handoffs compound ambiguity."
  - "Recursive squads without budget \u2014 a squad that spawns another squad is permitted, but the recursion depth and spawn budget must be declared in routing.yaml."
  trade_offs:
    gains:
    - "Physical D9 enforcement via orchestrator tool boundary \u2014 an orchestrator agent that cannot Write or Edit CANNOT execute specialist work, regardless of prompt pressure. [SOURCE: loadAgentsDir.ts:677-681 disallowedTools]"
    - "D10 handoff as structured contract \u2014 the handoff_format_spec declares an XML envelope that every orchestrator spawn must emit, making handoffs diffable, loggable, and replayable."
    - "D18 subagent isolation via native fork \u2014 each specialist spawned via the Task tool runs in its own forked context window, file state cache, and permission rules. [SOURCE: runAgent.ts:694-714]"
    - "Native parallelism via multiple Task calls in one assistant turn \u2014 the orchestrator can spawn N specialists in parallel by emitting multiple Agent tool uses in a single message. [SOURCE: AgentTool/prompt.ts:271 — 'a single message with multiple tool use content blocks']"
    - "Distributable as a single bundle \u2014 `myclaude install squad-slug` reads install_manifest and does the multi-target copy; `myclaude uninstall` reverses it exactly using the manifest as the audit trail."
    - "Plugin.json declares the full artifact set \u2014 the squad ships a plugin.json with both `agents:` and `skills:` fields so the buyer's Claude Code discovery picks up all pieces simultaneously."
    - "Namespaced via filesystem path \u2014 sub-agents install with {slug}__{role} naming OR via {slug}/{role} subdirectory, preventing collision with other installed agents. [SOURCE: loadSkillsDir.ts:523-543 native namespace via pathSep]"
    sacrifices:
    - "Higher forge cost \u2014 a state-of-art squad requires designing the orchestrator persona, each specialist's persona and tool boundary, the routing table, the handoff format, and the install manifest."
    - "Install complexity \u2014 multi-target install means the buyer must trust the install_manifest. A squad that does not declare its install_manifest is untrustworthy at scale."
    - "Coordination overhead \u2014 each Task spawn costs a full agent boot (system prompt, initial messages, MCP init). Squads that spawn 10 specialists serially are token-expensive."
    - "Return shapes must be disciplined \u2014 the orchestrator can only synthesize what specialists return. Specialists without output contracts produce squads that fail integration."
    worth_it_when: "The task requires multiple distinct expertise areas that should NOT share context, benefits from parallelism, or needs auditable routing decisions for compliance/review."

# ===========================================================================
# ARCHITECTURAL PRINCIPLES — specialized for squads
# ===========================================================================

architectural_principles:
  P1_purpose_before_shape:
    specialization: "A squad's purpose is multi-agent coordination for a specific delegated workflow. Before scaffolding, the creator must answer: (1) what workflow does this squad coordinate, (2) what are the distinct expertise areas (specialists), (3) what is the routing logic (sequential / parallel / conditional / iterative), (4) what does the orchestrator synthesize and return. Shape (orchestrator + N specialists + routing.yaml + install_manifest) is answered after purpose."
    enforced_by:
    - discovery_questions.minimum_set
    - lifecycle.create.type_specific.discovery_phase
    blocks_forge_when: "Creator cannot name the distinct specialists OR cannot describe the routing logic in one sentence."
  P2_constraint_before_feature:
    specialization: "For squads, the constraint is the orchestrator's tool boundary. The orchestrator's `tools:` whitelist MUST contain Agent (to spawn specialists) and MUST exclude Write, Edit, NotebookEdit. This physical boundary is D9 enforcement \u2014 the orchestrator cannot execute specialist work even under prompt pressure. Anti-patterns are extended with squad-specific failure modes (AP-SQ1 to AP-SQ5 below)."
    enforced_by:
    - dna_patterns.tier1.D2
    - dna_patterns.tier3.D9
    - anti_patterns_catalog
    - invariants
    blocks_forge_when: "Orchestrator frontmatter does not include Agent in tools OR includes Write/Edit/NotebookEdit."
  P3_composition_over_monolith:
    specialization: "A squad IS composition by definition. Minimum 1 orchestrator + 1 specialist = 2 files. The routing.yaml declaratively composes routes. The install_manifest declaratively composes targets. No single file exceeds 500 lines (each orchestrator and each specialist individually follows D3)."
    enforced_by:
    - dna_patterns.tier1.D3
    - install_manifest
    - routing_table_schema
    - invariants
    blocks_forge_when: "Squad has fewer than 2 agent files (an orchestrator and at least one specialist) OR any single agent file exceeds 500 lines."
  P4_contract_before_narrative:
    specialization: "The squad's contract is the install_manifest (what gets installed where) + routing.yaml (which routes exist) + handoff_format_spec (what handoff payloads look like) + each agent's individual frontmatter. Prose in SQUAD.md explains the contract but never replaces it."
    enforced_by:
    - install_manifest
    - routing_table_schema
    - handoff_format_spec
    - frontmatter.required
    blocks_forge_when: "routing.yaml missing OR install_manifest missing OR any specialist has no frontmatter name/description."
  P5_failure_mode_before_happy_path:
    specialization: "Squads declare failure modes at three levels: (a) individual agent failure handling (inherited from agent.yaml P5); (b) routing failure handling (what happens when no route matches); (c) synthesis failure handling (what the orchestrator returns when specialists disagree or return errors). The routing.yaml declares a fallback route; the orchestrator body declares synthesis failure convention."
    enforced_by:
    - dna_patterns.tier1.D14
    - failure_modes
    - routing_table_schema
    - invariants
    blocks_forge_when: "routing.yaml has no fallback OR orchestrator body has no synthesis failure convention."
  P6_state_at_the_edge:
    specialization: "Squad state has THREE native channels: (1) each individual agent's `memory:` scope \u2014 inherited from agent.yaml; (2) the routing.yaml itself \u2014 state of the routing logic lives in declarative YAML on disk, not in orchestrator prose; (3) optional shared squad state file at `.claude/squads/{slug}/state.yaml` which the orchestrator reads and writes via its Read/Write tools (note: orchestrator's Write tool is DENIED in the recommended pattern, so shared state is either written via a specialist or via a hook). Implicit cross-agent memory is forbidden."
    enforced_by:
    - dna_patterns.tier2.D8
    - dna_patterns.tier3.D12
    - routing_table_schema
    - invariants
    blocks_forge_when: "Squad describes cross-agent memory without declaring a state file OR without a hook/specialist that writes the state."
  P7_read_before_write:
    specialization: "/create reads creator.yaml + scout report + this codex + templates/squad/ + canonical_spec + claude-code-ground-truth.md + agent.yaml (for inheritance) BEFORE generating any scaffold (7 reads). This is the highest read-before-write ratio in the family-skill group because squads inherit from both agent AND skill. /validate reads the full squad bundle + routing.yaml + install_manifest BEFORE scoring."
    enforced_by:
    - lifecycle.create.type_specific.read_before_write_ratio
    - lifecycle.create.type_specific.ground_truth_required
    - invariants
    blocks_forge_when: "Squad scaffolded without reading agent.yaml for sub-agent inheritance OR without reading claude-code-ground-truth.md."
  P8_invisibility_of_mechanism:
    specialization: "User-facing strings in published squads (orchestrator description, each specialist description, README) MUST NOT reference Engine internals, myClaude conventions (install_manifest, handoff_format_spec are internal to the codex), archetype taxonomy names (ORCHESTRATOR as label is internal), or substrate vocabulary. The buyer sees a coherent team of named agents; the coordination plumbing stays invisible."
    enforced_by:
    - lifecycle.validate.type_specific.per_stage_hooks.stage_7_anti_commodity
    blocks_forge_when: "grep on user-facing strings finds substrate vocabulary OR internal archetype names as marketing."
  P9_recursive_integrity:
    specialization: "The /validate squad pipeline must pass when applied to the Engine's own squad-shaped tools (if any ship as squads) and when applied to reference squads in templates/squad/. A squad codex that demands MCS-3 from its creators while its own exemplars score MCS-1 is dishonest."
    enforced_by:
    - lifecycle.validate.type_specific.dogfood_check
    - quality_rubric
    consumer_status: aspirational
    consumer_status_reason: "/validate does not yet run dogfood checks against Engine-shipped squads or reference squad exemplars — the dogfood_check field declared below under lifecycle.validate.type_specific names the consumer contract so the capability is wireable once the codex validator reads this hook."
    blocks_forge_when: "Codex cannot pass its own validator when applied to itself."

# ===========================================================================
# OPERATIONAL CALIBRATION
# ===========================================================================

operational_modes:
  supports:
  - structure
  - discovery
  default: discovery
  rationale: "Squads default to DISCOVERY mode because multi-agent coordination benefits from /scout (marketplace + built-in squad survey) and /map (decomposing the workflow into specialist areas). A creator with a fully clear squad design can enter structure mode via /create squad directly."
  discovery_entry_via:
    skill: /scout
    fallback: /map
    rationale: "/scout identifies existing squads and specialist agents that could be composed. /map decomposes the creator's workflow expertise into specialist roles."
freedom_levels:
  valid:
  - 1
  - 2
  - 3
  - 4
  default: 2
  rationale: "Squads work at freedom levels 1-4. Level 5 is NOT recommended because autonomous squad generation produces incoherent specialist rosters. The creator needs to decide the specialist decomposition deliberately."
  per_level_behavior:
    1: "Engine walks every specialist role, every routing decision, every handoff format question. Used for first squad."
    2: "Engine proposes specialist decomposition from discovery; creator confirms. DEFAULT."
    3: "Engine generates full squad from discovery + scout + domain-map; creator audits."
    4: "Engine generates squad end-to-end from creator.yaml + scout report + existing agent inventory; creator reviews and edits."
  consumer_status: aspirational
  consumer_status_reason: "/create and /fill do not yet consult freedom_level at the squad-specific level — the field is declared so the two skills can route by autonomy level once their squad branches are extended to read it."

# ===========================================================================
# INTENT TOPOLOGY — derived shape (delivery + nature fixed; depth N/A at squad level)
# ===========================================================================
# Axis source: references/intent-topology.md §2. Every squad is task-spawned
# (the coordinator agent is spawned via the Task tool; the sub-agents spawn
# via handoffs from the coordinator) and every squad is fundamentally an
# orchestrator — its value is routing work to specialists. Cognitive_depth
# applies to the sub-agents individually, not to the squad as a whole.
# Declaration mode: derived.

intent_topology:
  declaration_mode: derived
  declaration_mode_reason: "Squad has fixed (delivery_mechanism, operational_nature). Every squad is invoked via Task tool and operates as an orchestrator — the coordinator routes to specialists. Declaring full enums would be tautological. cognitive_depth is not declared at the squad level because depth is a property of the SUB-AGENTS, not of the coordination pattern."
  runtime_shape_note: "delivery_mechanism=invoked_task_spawn, operational_nature=orchestrator, cognitive_depth=per-sub-agent. See references/runtime-host-dag.md §2 row 4 (invoked_task_spawn + any → [agent_spawn]) and references/composition-anatomy.md §3 for how squad composition relates to sub-agent depths."
  delivery_mechanism_fixed: invoked_task_spawn
  operational_nature_fixed: orchestrator
  cognitive_depth_applicable: per_sub_agent
  cognitive_depth_applicable_reason: "A squad itself has no cognitive depth — it is a coordination pattern. Individual sub-agents within the squad each carry their own cognitive_depth per the agent codex intent_topology. The squad's MCS quality depends on orchestration discipline (handoff specification D10, orchestrate-don't-execute D9) not on depth."
  runtime_host_derived: "[agent_spawn]"
  locale_adaptive_clause_required: true
  locale_adaptive_clause_source: references/locale-adaptive-clause.md
  locale_adaptive_clause_required_reason: "Every forged squad carries a runtime contract that propagates to the coordinator agent and all sub-agents: mirror the invoker's language in user-facing output while preserving handoff markers and orchestration protocol in the source language. A squad forged in PT-BR is installable by a French user: the coordination logic travels; the user-facing voice mirrors. Injected by /create during W2.6 into templates/squad/SQUAD.md.template and propagated to each sub-agent template."
  locale_adaptive_clause_consumer_status: native
  consumer_status: aspirational
  consumer_status_reason: "This block is consumed by the standard routing table consumer, the Stage 0 intent coherence consumer, and the drift-check enum paths — the three consumers share the canonical enums declared here. The derived-mode rationale above names which enums are fixed and which are delegated to the per-sub-agent level."

# ===========================================================================
# ARCHETYPES — canonical squad shapes
# ===========================================================================
# Squad archetypes are COORDINATION PATTERNS. Each archetype determines the
# routing logic, the expected specialist count, and the orchestrator persona.

archetypes:
  selection_required: true
  selection_phase: lifecycle.create.type_specific.discovery_phase
  selection_question: "Which coordination archetype best matches your squad?"
  hybrid_policy: "Identify the DOMINANT archetype. Use secondary for enrichment. Never declare two equal archetypes."
  sequential_pipeline:
    when_to_use: "Work flows through specialists in strict order. Each specialist consumes the previous one's output. Classic ETL or multi-stage review pattern."
    routing_mode: sequential
    specialist_count_typical: 3-5
    orchestrator_pattern: "Read routing.yaml → call Task(specialist_1) → receive result → call Task(specialist_2, input: result_1) → ... → synthesize final report"
    examples_by_domain:
    - "PR review squad (reviewer → security-auditor → synthesizer)"
    - "Migration squad (analyzer → planner → implementer → verifier)"
    - "Research squad (scout → fact-checker → writer)"
    validation_checklist:
    - "routing.yaml mode is sequential with explicit step order"
    - "Each specialist's output becomes the next specialist's input (declared in routing.yaml)"
    - "Orchestrator body explains the sequence contract"
    - "Failure in any step halts the pipeline unless continue_on_fail is declared"
    typical_dna_emphasis:
    - D1
    - D2
    - D4
    - D9
    - D10
    - D14
  parallel_convergent:
    when_to_use: "Work fans out to specialists that run independently then converges to a synthesis step. Classic multi-perspective review."
    routing_mode: parallel
    specialist_count_typical: 3-6
    orchestrator_pattern: "Read routing.yaml → emit N parallel Task calls in a single assistant message → receive N results → synthesize"
    examples_by_domain:
    - "Multi-perspective design review (architect + security + performance + ux in parallel → synthesizer)"
    - "Parallel file investigation (split files across specialists)"
    - "Research with multiple angles"
    validation_checklist:
    - "routing.yaml mode is parallel with specialist list"
    - "Orchestrator body instructs single-message parallel Task spawn [SOURCE: AgentTool/prompt.ts:271]"
    - "Synthesis specialist or orchestrator synthesis convention declared"
    - "Partial failure handling declared (what happens if 2 of 4 specialists fail)"
    typical_dna_emphasis:
    - D1
    - D2
    - D4
    - D9
    - D10
    - D11
    - D14
    - D18
  conditional_router:
    when_to_use: "Work is routed to ONE of several specialists based on input classification. Only one specialist runs per invocation."
    routing_mode: conditional
    specialist_count_typical: 2-8
    orchestrator_pattern: "Read routing.yaml → classify input → select matching route → call Task(selected_specialist) → return"
    examples_by_domain:
    - "Debug router (by error type → specific debugger)"
    - "Deploy router (by platform → platform-specific deployer)"
    - "Language router (by file extension → language-specific specialist)"
    validation_checklist:
    - "routing.yaml has conditional rules with natural-language triggers"
    - "Orchestrator has classification logic described in body"
    - "Default/fallback route declared for unclassifiable input"
    - "Specialists are mutually exclusive (only one runs per invocation)"
    typical_dna_emphasis:
    - D1
    - D2
    - D4
    - D5
    - D9
    - D10
    - D14
  iterative_refinement:
    when_to_use: "Work loops through specialists until a quality gate is met or a max-iterations budget is exhausted. Refinement pattern."
    routing_mode: iterative
    specialist_count_typical: 2-4 with gate
    orchestrator_pattern: "Read routing.yaml → loop: call Task(executor) → call Task(verifier) → if verifier PASS break, else continue → max N iterations → synthesize"
    examples_by_domain:
    - "Refactor-then-verify loop"
    - "Optimize-until-target-met loop"
    - "Write-then-review-then-revise loop"
    validation_checklist:
    - "routing.yaml declares max_iterations"
    - "Gate specialist is a read-only ADVISER or verification agent"
    - "Orchestrator body declares break condition and synthesis of final iteration"
    - "Each iteration's state is preserved for the next (via state file OR via assistant history)"
    typical_dna_emphasis:
    - D1
    - D2
    - D4
    - D9
    - D10
    - D11
    - D12
    - D14
  hierarchical_delegation:
    when_to_use: "Top-level orchestrator delegates to mid-level orchestrators that each manage their own specialist teams. Nested squads."
    routing_mode: hierarchical
    specialist_count_typical: 2 mid-orchestrators + 3-5 specialists each
    orchestrator_pattern: "Top orchestrator → delegates to mid-orchestrator(s) → each mid-orchestrator runs its own squad → synthesize at top"
    examples_by_domain:
    - "Enterprise code review (security squad + architecture squad + code-style squad each with own specialists)"
    - "Full-stack migration (backend squad + frontend squad + infra squad)"
    validation_checklist:
    - "routing.yaml declares nested routes with depth budget"
    - "Each mid-orchestrator has its own routing.yaml in its subdirectory"
    - "Recursion depth is capped (max_depth declared)"
    - "Synthesis at every level"
    typical_dna_emphasis:
    - D1
    - D2
    - D4
    - D9
    - D10
    - D11
    - D12
    - D14
    - D18
  hybrids:
    sequential_with_parallel_step:
      description: "Sequential pipeline where ONE step fans out to parallel specialists."
      when: "The pipeline has one step that benefits from parallel specialists (e.g., analyzer step runs 3 analysts in parallel)."
      example: "PR review with sequential stages, parallel during the multi-perspective review stage."
    conditional_with_sequential_branches:
      description: "Classifier routes to one of several sequential sub-pipelines."
      when: "Different input classes need different pipelines."
      example: "Language router where each language has its own sequential build+test pipeline."
  consumer_status: aspirational
  consumer_status_reason: "/create does not yet ask for squad archetype first. The discovery walker currently walks generic type questions before routing archetype selection — the archetype_first: true flag declared under lifecycle.create.type_specific.discovery_phase names the intended ordering so the walker can be extended to honor it."

# ===========================================================================
# ROUTING TABLE SCHEMA — declarative routing consumed by orchestrator
# ===========================================================================
# routing.yaml is the SOUL of a squad. It declares specialists, routes, handoff
# format, and failure handling in a file that can be diffed, replayed, and
# visualized. The orchestrator reads this file at boot and uses it to decide
# spawns.

routing_table_schema:
  file_path: routing.yaml
  file_location: "Workspace: workspace/{slug}/routing.yaml. Installed: `.claude/squads/{slug}/routing.yaml`."
  installed_by: install_manifest (routing.yaml is copied verbatim to install target)
  consumed_by: The orchestrator reads routing.yaml in its activation protocol (first turn) before emitting any Task calls.
  schema:
    name: string (squad display name)
    version: string (semver)
    archetype: "one of: sequential_pipeline, parallel_convergent, conditional_router, iterative_refinement, hierarchical_delegation"
    mode: "one of: sequential, parallel, conditional, iterative, hierarchical"
    max_iterations: "integer — required if mode is iterative"
    max_depth: "integer — required if mode is hierarchical"
    specialists:
      type: list
      item_schema:
        id: "string — the agent's agentType as installed (e.g., 'my-squad__reviewer')"
        role: "string — short human role name ('Reviewer')"
        description: "one-sentence purpose"
        tools_summary: "what the specialist can do, at a glance"
    routes:
      type: list
      item_schema:
        trigger: "natural-language or structured condition describing when this route fires"
        sequence: "list of specialist ids in the order they should be spawned"
        synthesis: "how the orchestrator combines specialist returns (prose explanation)"
        fallback: "what happens if any specialist in the sequence fails"
    fallback_required: true
    fallback_schema:
      trigger: "default / no-match / on-failure"
      action: "what to do when no route matches OR when a route's sequence fails"
  example: |
    name: code-review-squad
    version: 1.0.0
    archetype: sequential_pipeline
    mode: sequential
    specialists:
      - id: code-review-squad__reviewer
        role: Reviewer
        description: "General-purpose code review covering correctness and readability"
        tools_summary: "read-only — searches code, identifies issues"
      - id: code-review-squad__security-auditor
        role: Security Auditor
        description: "Specialized security review focusing on OWASP and common CVEs"
        tools_summary: "read-only — runs audit scripts"
      - id: code-review-squad__synthesizer
        role: Synthesizer
        description: "Combines review and audit into a prioritized report"
        tools_summary: "read-only — aggregates findings"
    routes:
      - trigger: "any PR review request"
        sequence: [code-review-squad__reviewer, code-review-squad__security-auditor, code-review-squad__synthesizer]
        synthesis: "The synthesizer's output is the final report. The orchestrator returns it verbatim to the parent context."
        fallback: "If reviewer fails, halt and return the error. If security-auditor fails, continue with reviewer output only and mark synthesis as PARTIAL."
    fallback:
      trigger: "no-match"
      action: "Return 'No matching route — please clarify your request.'"
  orchestrator_responsibilities:
  - "Read routing.yaml in activation protocol"
  - "Match the input against route triggers"
  - "For the matching route, spawn specialists in declared sequence (or in parallel for mode: parallel)"
  - "Pass each specialist's return as context to the next (for sequential)"
  - "Synthesize according to the route's synthesis declaration"
  - "Handle failures per the route's fallback declaration"
  - "Return a final report to the parent context"
  validation_checks:
  - "routing.yaml is valid YAML"
  - "Every route.sequence specialist id is present in specialists list"
  - "Every specialist id matches an agent file in the install_manifest"
  - "mode is consistent with archetype"
  - "fallback is present"
  - "If mode is iterative, max_iterations is set"
  - "If mode is hierarchical, max_depth is set"
  consumer_status: aspirational
  consumer_status_reason: "/validate does not yet parse routing.yaml nor run the schema checks declared above. /create does not yet scaffold routing.yaml from discovery answers plus archetype selection — the field is declared here so both consumers have a single canonical schema to read once their squad branches are extended."

# ===========================================================================
# HANDOFF FORMAT SPEC — the XML envelope for orchestrator → specialist spawns
# ===========================================================================
# Every Task call the orchestrator emits to spawn a specialist MUST follow this
# format. This makes handoffs diffable, loggable, and replayable — D10 made
# physical through a prompt format contract.

handoff_format_spec:
  rationale: "A handoff payload is the text the orchestrator passes to Task(subagent_type: specialist, prompt: ...). Structuring it with an XML envelope means every handoff carries the same fields: task description, context from previous specialists, output contract, budget. The orchestrator body is TAUGHT this format in its activation protocol."
  canonical_form: |
    <handoff>
      <from>{orchestrator_slug}</from>
      <to>{specialist_slug}</to>
      <sequence_step>{current_step}/{total_steps}</sequence_step>
      <task>
        {one-sentence task description specific to this specialist's scope}
      </task>
      <context_from_previous>
        {summary of previous specialist returns, or "null" for first in sequence}
      </context_from_previous>
      <output_contract>
        {exactly what shape the specialist should return — labeled fields, verdict line, etc.}
      </output_contract>
      <budget_tokens>{approximate limit, e.g., 8000}</budget_tokens>
      <scope_boundary>
        {what this specialist should NOT touch — prevents scope bleed}
      </scope_boundary>
    </handoff>
  example: |
    <handoff>
      <from>code-review-squad-orchestrator</from>
      <to>code-review-squad__security-auditor</to>
      <sequence_step>2/3</sequence_step>
      <task>
        Audit the changes introduced in PR #1234 for security issues (OWASP Top 10, injection, auth, secrets).
      </task>
      <context_from_previous>
        The reviewer found 3 readability issues and 1 potential null dereference in src/auth.ts:45. Full reviewer report attached at .claude/squads/code-review-squad/transcripts/reviewer-output.md.
      </context_from_previous>
      <output_contract>
        Return labeled fields:
          Scope: "<echo of task>"
          Findings: "<list of security issues found, each with severity and file:line>"
          Blockers: "<list of issues that must fix before merge>"
          VERDICT: "SAFE | UNSAFE | NEEDS-REVIEW"
      </output_contract>
      <budget_tokens>8000</budget_tokens>
      <scope_boundary>
        Do not review code style, readability, or functional correctness — those are the reviewer's scope.
      </scope_boundary>
    </handoff>
  enforcement: "The orchestrator's body includes a section 'Handoff format — every Task call MUST use this envelope' that quotes the canonical form verbatim. /validate Stage 3 checks that this section is present."
  parseability_note: "The envelope is prose-readable AND machine-parseable. A future myClaude release could parse handoff transcripts for auditability. Today it is pure convention that the LLM follows."
  consumer_status: aspirational
  consumer_status_reason: "/validate does not yet verify orchestrator body contains the handoff format section declared above. /test does not yet replay handoff transcripts. Both consumers are named here so the canonical_form becomes the single source of truth once the checks are wired."

# ===========================================================================
# INSTALL MANIFEST — multi-target install contract
# ===========================================================================
# A squad is a multi-file product. The install_manifest declares exactly what
# gets copied where. `myclaude install` reads it; `myclaude uninstall` reverses
# it. This is the mechanism that makes squads distributable as a coherent bundle
# without requiring a custom Claude Code loader.

install_manifest:
  rationale: "Claude Code has no native concept of 'install a squad'. It has .claude/agents/ and .claude/skills/ loaders. myClaude layers a multi-target install contract ON TOP of these loaders so that one `myclaude install squad-slug` command produces all the coordinated native artifacts."
  schema:
    version: "integer — manifest schema version (current: 1)"
    targets:
      type: list
      item_schema:
        source: "relative path inside the squad bundle (e.g., agents/reviewer.md)"
        target: "destination path using {slug} placeholder and one of the supported roots (~/.claude/, project .claude/)"
        kind: "one of: copy, merge, append"
        kind_details:
          copy: "Plain file copy. Overwrites if exists with --force."
          merge: "For JSON files (plugin.json, settings.json). myClaude merges the source into the existing file, preserving unrelated keys."
          append: "For text files (CLAUDE.md). Appends source content wrapped in `<!-- squad:{slug}:start -->...<!-- squad:{slug}:end -->` markers for idempotent removal."
    post_install_hint: "string — optional message shown after install (e.g., invocation instructions)"
    pre_uninstall_checks: "optional list of checks before uninstall (e.g., 'squad has not been invoked in the last 7 days')"
  canonical_example: |
    version: 1
    targets:
      - source: SQUAD.md
        target: "~/.claude/squads/{slug}/SQUAD.md"
        kind: copy
      - source: routing.yaml
        target: "~/.claude/squads/{slug}/routing.yaml"
        kind: copy
      - source: orchestrator.md
        target: "~/.claude/agents/{slug}-orchestrator.md"
        kind: copy
      - source: agents/reviewer.md
        target: "~/.claude/agents/{slug}__reviewer.md"
        kind: copy
      - source: agents/security-auditor.md
        target: "~/.claude/agents/{slug}__security-auditor.md"
        kind: copy
      - source: agents/synthesizer.md
        target: "~/.claude/agents/{slug}__synthesizer.md"
        kind: copy
    post_install_hint: |
      Squad installed. Invoke via:
        Task(subagent_type: "{slug}-orchestrator", prompt: "<your request>")
      Or via slash command if a wrapper command was installed.
  namespace_strategy:
    default: "double-underscore prefix — {slug}__{role} — because Claude Code's loadAgentsDir does NOT yet recognize subdirectory namespaces for .claude/agents/ (verified: loadMarkdownFilesForSubdir traverses but the discovered agentType comes from the `name:` frontmatter field). The prefix guarantees unique names."
    alternative: "subdirectory — {slug}/{role} — for .claude/skills/ where native path namespace IS supported via buildNamespace [SOURCE: loadSkillsDir.ts:523-543]. Skills inside a squad bundle SHOULD use subdirectory namespace and get {slug}:{role} names naturally."
  idempotency_rules:
  - "Install is idempotent: re-running it with the same manifest produces no changes (or overwrites with --force)."
  - "Uninstall is idempotent: re-running it after first uninstall is a no-op."
  - "append operations use START/END markers; uninstall removes content between markers exactly."
  - "merge operations preserve unrelated keys; uninstall removes only keys the install added, tracked via a .manifest-lock file written at install time."
  manifest_lock:
    description: "On install, myClaude writes `.claude/squads/{slug}/.manifest-lock.yaml` listing every file created, every append marker position, every merged key. uninstall reads this lock and reverses exactly."
    schema:
      installed_files: "list of absolute paths created"
      appended_sections: "list of {file, start_marker, end_marker}"
      merged_keys: "list of {file, key_path}"
      install_timestamp: ISO 8601
      manifest_version: integer
  forward_compat_note: "If Anthropic ships native squad support in a future Claude Code release, install_manifest becomes a no-op and squads install natively. The bundle structure matches the expected native layout by convention."
  consumer_status: aspirational
  consumer_status_reason: "The myClaude CLI does not yet consume install_manifest — multi-target install is documentation-only today. Squads install via manual file placement, and the manifest serves as the canonical declaration the CLI will read once its squad-install command is extended."

# ===========================================================================
# LIFECYCLE — 10 skills × universal contract + squad-specific type_specific
# ===========================================================================

lifecycle:
  map:
    role: "Extract creator's multi-agent workflow expertise into domain-map.md. For squads, /map helps decompose a workflow into distinct specialist roles."
    optional: true
    inputs:
    - creator.yaml
    - domain topic seed ($ARGUMENTS)
    outputs:
    - workspace/domain-map.md
    consumer_status: aspirational
    consumer_status_reason: "/map does not yet consult squad-specific decomposition prompts."
    blocks_when: []
    next_action: null
    next_action_reason: "read-only skill"
    type_specific:
      skip_recommended: false
      skip_message: "For squads, /map is valuable when the creator has workflow expertise but has not yet decomposed it into distinct specialist roles."
      squad_specific_prompts:
      - "What workflow does your squad coordinate? Describe it as a sequence of decisions and actions."
      - "What distinct expertise areas does the workflow touch? (e.g., security, performance, style, correctness)"
      - "Which expertise areas are INDEPENDENT (can run in parallel) vs. DEPENDENT (need each other's output)?"
      - "Where does the workflow make decisions based on context? (conditional routing)"
      - "Does the workflow iterate until a quality gate is met?"
  scout:
    role: "Research existing squads in the marketplace and existing individual agents that could be composed. For squads, /scout prevents reinventing specialists that already exist."
    optional: true
    inputs:
    - creator.yaml
    - domain query ($ARGUMENTS)
    outputs:
    - workspace/scout-{slug}.md
    - STATE.yaml.last_scout updated
    consumer_status: aspirational
    consumer_status_reason: "/scout does not yet calibrate for squad-specific composability research."
    blocks_when: []
    next_action: null
    next_action_reason: "read-only research skill"
    type_specific:
      skip_recommended: false
      skip_message: "Skipping /scout for squads is risky — you may reinvent specialists that exist as marketplace agents."
      scout_calibration_for_squads:
      - "Scan myclaude.sh agent category for specialists in the squad's domain"
      - "Scan myclaude.sh squad category for similar coordination patterns"
      - "Check Claude Code built-in agents for composable primitives (Explore, Plan, verification)"
      - "Identify composable gaps — what specialists should be forged vs. reused"
  import:
    role: "Bring an existing squad directory from ~/.claude/squads/{slug}/ into the Engine workspace for validation, packaging, republish."
    inputs:
    - "Source: ~/.claude/squads/{slug}/ directory (entire bundle)"
    - creator.yaml
    outputs:
    - workspace/{slug}/ (full directory imported preserving SQUAD.md + routing.yaml + agents/ + skills/)
    - "workspace/{slug}/.meta.yaml (state auto-detected)"
    blocks_when:
    - workspace/{slug}/ already exists (no --force)
    - "Source has no SQUAD.md"
    - "Source has no routing.yaml"
    consumer_status: blocked
    consumer_status_reason: "/import SKILL.md detection table does not currently include squad as a distinct type — a directory with SQUAD.md + routing.yaml + agents/ subdirectory is not recognized as a squad. The detection_pattern below names the shape the extended /import must match once its detection table is extended."
    next_action: "/validate {slug}"
    optional: true
    type_specific:
      detection_pattern: "directory in ~/.claude/squads/ containing SQUAD.md + routing.yaml + at least one agents/*.md file"
      rename_on_import: null
      rename_on_import_reason: "Squads use the same filename convention in workspace and install — no rename needed."
      auto_detected_phase: content
  create:
    role: "Run the 6-phase creation cycle for squads: discovery (archetype selection first, then specialist decomposition) → architecture (routing table + handoff format + install manifest) → description engineering (orchestrator + each specialist) → content development (all agent bodies + routing.yaml) → validation → iteration."
    inputs:
    - field: creator.yaml
      purpose: "Author metadata, technical_level, freedom_level default"
    - field: type
      value: squad
    - field: slug
      purpose: "Validates against ^[a-z0-9][a-z0-9-]{2,39}$"
    - field: archetype
      purpose: "MUST be selected before other questions"
    - field: specialist_roster
      purpose: "List of specialists with roles derived from discovery"
    - field: routing_logic
      purpose: "Sequential / parallel / conditional / iterative / hierarchical"
    - field: scout_report
      purpose: Optional
    - field: domain_map
      purpose: Optional
    - field: discovery_answers
      purpose: "Full squad design"
    outputs:
    - workspace/{slug}/SQUAD.md (scaffold with manifest sections)
    - workspace/{slug}/README.md (4-section skeleton)
    - workspace/{slug}/routing.yaml (scaffold with specialists + routes)
    - workspace/{slug}/install-manifest.yaml (scaffold with targets)
    - "workspace/{slug}/orchestrator.md (orchestrator agent file scaffolded as ORCHESTRATOR archetype per agent.yaml)"
    - "workspace/{slug}/agents/{role}.md for each declared specialist (each scaffolded as per their individual archetype)"
    - "workspace/{slug}/.meta.yaml (state: scaffold, archetype recorded)"
    blocks_when:
    - slug invalid
    - "workspace/{slug}/ exists without --force"
    - creator.yaml missing AND micro-onboard fails
    - archetype not selected
    - specialist_roster has fewer than 2 entries (orchestrator + at least 1 specialist)
    consumer_status: partial
    consumer_status_reason: "/create reads product-dna.squad today and scaffolds SQUAD.md + README.md + references/ + agents/. It does not yet scaffold routing.yaml, install-manifest.yaml, or orchestrator.md with tool boundary enforcement — the activates_templates list below names the full set the scaffold must produce once its squad branch is extended."
    next_action: "/fill {slug}"
    optional: false
    type_specific:
      activates_templates:
      - templates/squad/SQUAD.md.template
      - templates/squad/README.md.template
      - templates/squad/routing.yaml.template
      - templates/squad/install-manifest.yaml.template
      - templates/squad/orchestrator.md.template
      - templates/squad/agents/specialist.md.template
      activates_dna_at_scaffold:
      - D1
      - D2
      - D3
      - D4
      - D9
      - D10
      - D13
      - D14
      - D18
      discovery_phase:
        questions_source: "this file → discovery_questions.minimum_set"
        archetype_selection_required: true
        archetype_first: true
        archetype_first_reason: "Archetype determines routing mode, specialist count, orchestrator pattern, and install_manifest structure. Asking later is retrofitting."
        specialist_decomposition_phase: "After archetype is selected, the creator declares the specialist roster (names + roles + expected tool boundaries per agent archetype)."
        orchestrator_tool_boundary_enforced: "Scaffold sets orchestrator.md frontmatter tools: [Agent, Read, Glob, Grep] and disallowedTools: [Write, Edit, NotebookEdit] before prompting the creator for anything else."
      read_before_write_ratio: "7:1 (canonical_spec + this codex + claude-code-ground-truth.md + agent.yaml + creator.yaml + templates + scout_report read; 1 SQUAD.md + N specialist files written)"
      ground_truth_required: true
      inherits_from: agent.yaml (each specialist is an agent and follows agent.yaml's archetypes, frontmatter, rubric)
  fill:
    role: "Walk each specialist's AGENT.md sections (per agent.yaml.lifecycle.fill.sections_walked) PLUS the orchestrator's routing table section PLUS the routing.yaml content PLUS the install-manifest.yaml targets. Squads have the deepest fill of all types."
    inputs:
    - "workspace/{slug}/.meta.yaml (state: scaffold or content)"
    - workspace/{slug}/SQUAD.md
    - workspace/{slug}/routing.yaml
    - workspace/{slug}/install-manifest.yaml
    - workspace/{slug}/orchestrator.md
    - workspace/{slug}/agents/*.md
    - creator.yaml
    - scout report
    - domain-map.md
    - this file (sections_walked)
    - agent.yaml (per-specialist section walker)
    outputs:
    - All files filled
    - "workspace/{slug}/.meta.yaml (state: content, fill_progress updated)"
    consumer_status: partial
    consumer_status_reason: "/fill does not yet walk multiple agent files in sequence within one squad. The sections_walked list below names the full walker sequence that the extended /fill squad branch must honor once iteration across specialists is wired."
    next_action: "/validate {slug}"
    optional: false
    blocks_when: []
    type_specific:
      sections_walked:
      - name: "Squad Identity (SQUAD.md)"
        why: "Overall squad purpose, the workflow it coordinates, the name of each specialist"
        sparring_required: true
        sparring_minimum: 1
      - name: "Routing Table (routing.yaml)"
        why: "Specialists list, routes with triggers, synthesis, fallback"
        sparring_required: true
        sparring_minimum: 2
      - name: "Handoff Format Declaration (SQUAD.md section)"
        why: "The XML envelope the orchestrator uses for every Task call"
        sparring_required: false
      - name: "Install Manifest (install-manifest.yaml)"
        why: "Multi-target copy declaration"
        sparring_required: true
        sparring_minimum: 1
      - name: "Orchestrator Persona (orchestrator.md)"
        why: "Per agent.yaml fill protocol, but orchestrator archetype specifically"
        sparring_required: true
        sparring_minimum: 1
      - name: "Each Specialist (agents/{role}.md)"
        why: "Per agent.yaml fill protocol per specialist; iterate over all specialists"
        sparring_required: true
        sparring_minimum: 1
      sparring_protocol: "Deep sparring on routing logic and handoff format. These are where squads fail silently in production."
      research_injection_eligible: true
  validate:
    role: "Run structural + integrity + DNA Tier 1+2+3 + CLI preflight + anti-commodity + value intelligence. Squads are the ONLY type where D9/D10/D18 are all required at Tier 3."
    inputs:
    - workspace/{slug}/ (all files)
    - "workspace/{slug}/.meta.yaml"
    - this file
    - agent.yaml (inherited checks per specialist)
    - claude-code-ground-truth.md
    - config.yaml
    - quality-gates.yaml
    outputs:
    - "workspace/{slug}/.meta.yaml (state: validated, scores, intelligence)"
    - Validation report
    consumer_status: partial
    consumer_status_reason: "/validate reads dna_patterns per type but does not yet enforce squad-specific checks — routing.yaml schema validation, install_manifest schema validation, and handoff_format_spec presence in orchestrator body are declared above but not yet consumed. The per_stage_hooks block below names each check the extended validator must run once its squad branch is wired."
    optional: false
    blocks_when: []
    next_action: "/test {slug} (required for MCS-2+) OR /package {slug}"
    type_specific:
      stages_run:
        mcs1:
        - 1
        - 2
        - 3
        - 6
        mcs2:
        - 1
        - 2
        - 3
        - 4
        - 5
        - 6
        - 7
        - 8
        mcs3:
        - 1
        - 2
        - 3
        - 4
        - 5
        - 6
        - 7
        - 8
      per_stage_hooks:
        stage_1_structural:
          check: "Glob workspace/{slug}/SQUAD.md + routing.yaml + install-manifest.yaml + orchestrator.md + at least 1 agents/*.md exist"
          blocking: true
        stage_2_integrity:
          check: "YAML frontmatter on every agent file parses. routing.yaml parses. install-manifest.yaml parses. No placeholder patterns."
          blocking: true
        stage_3_dna_tier1:
          required_patterns:
          - D1
          - D2
          - D3
          - D4
          - D13
          - D14
          recommended_patterns:
          - D19
          check_d1: "Every agent file has identity + activation protocol"
          check_d2: "Every agent file has anti-patterns with >=5 items"
          check_d3: "Each agent file <500 lines; references/ exist when needed"
          check_d4: "Orchestrator has synthesis quality gate; each specialist has its own quality gate"
          check_d13: "README.md with what/install/usage/requirements"
          check_d14: "Routing has fallback; each specialist has when-not-to-use"
          blocking: true
        stage_4_dna_tier2:
          required_patterns:
          - D5
          - D7
          - D16
          recommended_patterns:
          - D6
          - D8
          - D15
          - D17
          check_d5: "Orchestrator classifies input against route triggers"
          check_d7: "Orchestrator reads routing.yaml in activation protocol"
          check_d16: "No hardcoded paths; install_manifest uses relative + {slug} placeholders"
          blocking: false
        stage_5_dna_tier3:
          required_patterns:
          - D9
          - D10
          - D18
          recommended_patterns:
          - D11
          - D12
          check_d9: "Orchestrator frontmatter tools includes Agent AND excludes Write, Edit, NotebookEdit (verified via agentToolUtils.ts filter logic)"
          check_d10: "Orchestrator body contains handoff format declaration matching handoff_format_spec.canonical_form"
          check_d18: "Each specialist is a distinct agent file; the orchestrator spawns them via Task which forks context natively [SOURCE: runAgent.ts:694-714]"
          check_d11: "For iterative_refinement archetype, the gate specialist is a read-only ADVISER with socratic pressure pattern"
          check_d12: "If squad uses state file, memory scope declared or hook writes state"
          blocking: true
        stage_6_cli_preflight:
          check: "myclaude validate {slug} succeeds"
          blocking: true
        stage_7_anti_commodity:
          check: "Substance score + invisibility audit + quality_rubric application + anti_patterns grep (AP-A1..A6 inherited + AP-SQ1..5 squad-specific)"
          blocking: false
          coaching_only: true
          routing_table_check: "routing.yaml is declarative, not prose-in-orchestrator"
          install_manifest_check: "install_manifest.yaml exists and targets list is complete"
          invisibility_check: "grep user-facing strings for substrate vocabulary"
        stage_8_value_intelligence:
          check: "Value score, suggested price range, market position"
          blocking: false
          runs_at_mcs:
          - 2
          - 3
          recommended_pricing_strategy: "Per archetype: sequential_pipeline → premium ($15-35), parallel_convergent → premium ($15-40), conditional_router → solid ($8-20), iterative_refinement → premium ($15-35), hierarchical_delegation → premium-rare ($25-75)"
      read_before_write_ratio: "Read-only skill — updates .meta.yaml only"
      dogfood_check:
        description: "P9 enforcement — /validate squad applied to reference squads in templates/squad/ AND to any squad-shaped Engine tools"
        method: "Run full /validate squad against dogfood targets, surface failures"
        consumer_status: aspirational
        consumer_status_reason: "/validate does not yet accept a --target=reference-squads argument. The dogfood_check declared here names the P9 enforcement contract so the argument becomes wireable once the validator CLI is extended."
      next_action_pass: "/test {slug} (required for MCS-2+) OR /package {slug}"
      next_action_fail: "/validate --fix {slug}"
  test:
    role: "Sandbox-install the squad bundle in worktree isolation, verify install_manifest multi-target copy works, verify routing.yaml parses, simulate orchestrator spawning each specialist via Task, verify handoff format, run 3 scenarios."
    inputs:
    - "workspace/{slug}/ (validated)"
    - this file
    outputs:
    - "workspace/{slug}/.meta.yaml (test_result, last_tested, test_scenarios)"
    - Test report
    consumer_status: partial
    consumer_status_reason: "/test hardcoded table does not yet cover squad testing — the type_specific_steps declared below name the install-manifest simulation, routing parse, spawn simulation, and uninstall reversibility checks the extended /test squad branch must consult once the hardcoded table is replaced by type-driven step lookup."
    optional: true
    blocks_when: []
    next_action: "/package {slug}"
    type_specific:
      required_for_mcs:
      - 2
      - 3
      optional_for_mcs:
      - 1
      sandbox_isolation: "worktree"
      type_specific_steps:
      - step: "Install manifest simulation"
        check: "Dry-run the install_manifest against the sandbox .claude/ — verify every target path is valid, no collisions with existing agents, all source files exist"
      - step: "Routing table parse"
        check: "routing.yaml parses. Every specialist id in routes exists in specialists list. Every specialist id matches an installed agent file. fallback is present."
      - step: "Each agent frontmatter parse"
        check: "Per agent.yaml.lifecycle.test.type_specific_steps for every agent in the squad"
      - step: "Orchestrator tool boundary verification"
        check: "Orchestrator tools includes Agent AND excludes Write/Edit/NotebookEdit"
      - step: "Handoff format declaration presence"
        check: "Orchestrator body contains a section matching handoff_format_spec.canonical_form"
      - step: "Spawn simulation"
        check: "Using mock, spawn the orchestrator with a test input. Verify it reads routing.yaml. Verify it emits at least one Task call with a handoff-formatted prompt."
      - step: "Manifest uninstall simulation"
        check: "Dry-run the uninstall using .manifest-lock — verify every installed file is removed, every appended section is cleanly excised, every merged key is reverted"
      scenarios_applicable: true
      scenarios:
      - name: Happy Path
        purpose: "Normal invocation with a request matching the primary route"
        input_strategy: "Request that clearly matches route trigger"
        on_fail: "Routing or specialist spawn is fundamentally broken"
      - name: Edge Case
        purpose: "Fallback route fires (no direct match)"
        input_strategy: "Ambiguous request"
        on_fail: "Fallback handling is weak — strengthen routing.yaml"
      - name: Adversarial
        purpose: "Specialist failure mid-sequence"
        input_strategy: "Inject a failing specialist mock"
        on_fail: "Squad does not degrade gracefully — fix synthesis failure convention"
      must_haves_verification: true
      next_action_pass: "/package {slug}"
  package:
    role: "Strip WHY comments from ALL files in the bundle, rename orchestrator.md appropriately if needed, generate vault.yaml + plugin.json (with agents field listing every installed agent) + agentskills.yaml (with squad entry if supported), verify install_manifest integrity, stage .publish/."
    inputs:
    - "workspace/{slug}/ (validated, test_result: pass for MCS-2+)"
    - creator.yaml
    - this file
    - config.yaml
    outputs:
    - workspace/{slug}/.publish/SQUAD.md (stripped)
    - workspace/{slug}/.publish/routing.yaml (copied)
    - workspace/{slug}/.publish/install-manifest.yaml (copied)
    - workspace/{slug}/.publish/orchestrator.md (stripped)
    - workspace/{slug}/.publish/agents/*.md (all stripped)
    - workspace/{slug}/.publish/README.md (badges injected)
    - workspace/{slug}/.publish/vault.yaml
    - workspace/{slug}/.publish/plugin.json (with full agents field list)
    - workspace/{slug}/.publish/agentskills.yaml
    - workspace/{slug}/.publish/CHANGELOG.md + LICENSE.md
    consumer_status: partial
    consumer_status_reason: "/package does not yet generate plugin.json with multi-agent lists for squads — current generation ships a single-agent plugin.json regardless of type. The plugin_json_block template declared below names the canonical multi-agent shape the extended /package squad branch must emit once plugin.json generation is type-driven."
    next_action: "/publish {slug}"
    optional: false
    blocks_when: []
    type_specific:
      strips:
      - "<!-- WHY: ... --> HTML comments in ALL files"
      - "# WHY: lines in ALL files"
      - .meta.yaml
      - domain-map.md
      renames: null
      renames_reason: "Squads use the same filenames in workspace and install."
      injects:
      - field: marketplace_url
        value: "https://myclaude.sh/p/{slug}"
      - field: Attribution comment at end of SQUAD.md
        value: "<!-- Published on MyClaude (myclaude.sh) | Quality: MCS-{level} ({score}%) | Engine: Studio v3 -->"
      - field: README badges
      plugin_json_block: "{\n  \"name\": \"{slug}\",\n  \"agents\": [\".claude/agents/{slug}-orchestrator.md\", \".claude/agents/{slug}__reviewer.md\", \".claude/agents/{slug}__security-auditor.md\", \".claude/agents/{slug}__synthesizer.md\"]\n}\n"
      plugin_json_reason: "Squads ship a plugin.json that lists EVERY installed agent file path so Claude Code loads them all on plugin install."
      agentskills_yaml_block: "Generate with platforms: [claude-code]. Squads are Claude Code specific (multi-agent coordination requires the Agent tool)."
      step_6b_verify:
      - All squad files present in .publish/
      - routing.yaml references in plugin.json match installed agent files
      - No WHY comments remaining
      - install-manifest.yaml targets all have source files present
      - All agent files pass individual agent step_6b_verify per agent.yaml
      - Body of each agent <=500 lines
  publish:
    role: "Push to myclaude.sh + Anthropic plugin marketplace. Squads are distributed via vault.yaml + plugin.json (multi-agent list)."
    inputs:
    - "workspace/{slug}/.publish/ (state: packaged)"
    - myclaude CLI auth
    - creator confirmation
    outputs:
    - Live listing at https://myclaude.sh/p/{slug}
    - Plugin marketplace listing
    - "workspace/{slug}/.meta.yaml (state: published)"
    blocks_when:
    - state != packaged
    - "test_result != pass (for MCS-2+)"
    - myclaude auth missing
    - creator declines confirmation
    consumer_status: partial
    consumer_status_reason: "/publish distribution channel routing does not yet differentiate squad from agent for plugin.json generation."
    optional: false
    next_action: null
    next_action_reason: "terminal action"
    type_specific:
      distribution_channels:
      - channel: myclaude
        primary: true
        url_pattern: "https://myclaude.sh/p/{slug}"
      - channel: anthropic-plugin
        primary: true
        plugin_json_block: "agents field with multi-path list"
      - channel: agentskills_universal
        primary: false
        applicable: false
        reason: "Multi-agent coordination is Claude Code specific."
      confirmation_required: true
      post_publish_actions:
      - "Suggest: 'Use the squad in your own daily work. Squads reveal routing bugs only through real spawns.'"
      - "Surface install command: myclaude install {slug}"
      - "Schedule check-in 7 days post-publish"
  status:
    role: "Display the squad in dashboard with archetype badge, specialist count, invocation count."
    inputs:
    - "workspace/{slug}/.meta.yaml"
    - this file
    - references/ux-vocabulary.md
    outputs:
    - Dashboard line
    - Squad badge
    consumer_status: aspirational
    consumer_status_reason: "/status does not yet surface squad archetypes"
    optional: true
    blocks_when: []
    next_action: null
    next_action_reason: "read-only dashboard"
    type_specific:
      ux_type_name: Squad
      ux_type_name_source: "references/ux-vocabulary.md"
      state_emoji_rules: Universal
      portfolio_role_default: team
      portfolio_role_reason: "Squads are teams in the creator's portfolio — they coordinate multiple agents toward one workflow."

# ===========================================================================
# FLOW
# ===========================================================================

flow: "```mermaid\nflowchart LR\n  THINK[/think optional/] -.->|squad unclear| MAP[/map/]\n  MAP -.->|workflow decomposed| SCOUT[/scout/]\n  SCOUT -.->|existing specialists identified| CREATE[/create squad/]\n\
  \  IMPORT[/import existing/] -.-> WORKSPACE\n  CREATE -->|archetype + specialists + routing| WORKSPACE[(workspace/slug/)]\n  WORKSPACE --> FILL[/fill/]\n  FILL -->|all agents + routing.yaml + install-manifest|\
  \ VALIDATE[/validate/]\n  VALIDATE -->|fail| VALIDATE\n  VALIDATE -->|pass| TEST[/test/]\n  TEST -->|install sim + routing + spawn sim| PACKAGE[/package/]\n  PACKAGE -->|stripped + plugin.json with agents\
  \ list| PUBLISH[/publish/]\n  PUBLISH -->|live| MARKET[(marketplace + plugin marketplace)]\n  MARKET -.->|spawn feedback| SCOUT\n\n  STATUS[/status/] -.-> WORKSPACE\n\n  classDef writeSkill fill:#e1f5ff,stroke:#0277bd\n\
  \  classDef gate fill:#fff4e1,stroke:#ef6c00\n  classDef terminal fill:#e8f5e9,stroke:#2e7d32\n  classDef discovery fill:#f3e5f5,stroke:#6a1b9a\n  class CREATE,FILL,PACKAGE writeSkill\n  class STATUS,VALIDATE,TEST\
  \ gate\n  class PUBLISH terminal\n  class IMPORT,THINK,MAP,SCOUT discovery\n```\n"

# ===========================================================================
# FAILURE VOCABULARY
# ===========================================================================

failure_modes:
- mode: "orchestrator executes specialist work"
  detection: "/validate Stage 5 D9 — orchestrator frontmatter tools includes Write or Edit"
  degradation: "BLOCK MCS-2 — physical D9 enforcement is missing"
  recovery: "Remove Write/Edit from orchestrator tools; add to disallowedTools"
- mode: "routing.yaml missing"
  detection: "/validate Stage 1 structural"
  degradation: "BLOCK — squad is incomplete without routing"
  recovery: "Scaffold routing.yaml from archetype + specialist list"
- mode: "install_manifest missing"
  detection: "/validate Stage 1 structural"
  degradation: "BLOCK — squad cannot be installed without manifest"
  recovery: "Scaffold install-manifest.yaml from archetype"
- mode: "no fallback route in routing.yaml"
  detection: "/validate Stage 5 check_d9"
  degradation: "BLOCK MCS-2 — squad crashes on unclassifiable input"
  recovery: "Add fallback route to routing.yaml"
- mode: "handoff format declaration missing"
  detection: "/validate Stage 5 check_d10"
  degradation: "BLOCK MCS-2 — handoffs will be free-text"
  recovery: "Add handoff format section to orchestrator body per handoff_format_spec.canonical_form"
- mode: "specialist count below 2"
  detection: "/validate Stage 1 structural"
  degradation: "Not a squad — should be an agent"
  recovery: "Convert to type=agent OR add at least one specialist"
- mode: "specialist id in routing.yaml does not match any installed agent"
  detection: "/validate Stage 2 integrity"
  degradation: "BLOCK — orchestrator will fail to spawn the specialist"
  recovery: "Align specialist ids between routing.yaml and install_manifest"
- mode: "orchestrator preloads specialist skills instead of spawning agents"
  detection: "/validate Stage 5 — orchestrator has skills: preload of specialist knowledge"
  degradation: "Coaching — this collapses D18 isolation. Orchestrator is doing execution via preloaded knowledge."
  recovery: "Remove skills: preload. Use Task spawn for specialist work."
- mode: "recursive squad without depth budget"
  detection: "/validate Stage 5 — routing.yaml has hierarchical mode but no max_depth"
  degradation: "BLOCK — recursion could runaway"
  recovery: "Declare max_depth in routing.yaml"
- mode: "install manifest has collision with existing agent names"
  detection: "/test install simulation"
  degradation: "BLOCK — install would overwrite user's existing agents"
  recovery: "Use namespace prefix {slug}__{role}"
- mode: "routing.yaml references plugin.json agents that are not in install_manifest"
  detection: "/validate Stage 2 integrity cross-check"
  degradation: "BLOCK — plugin will not install all referenced agents"
  recovery: "Sync install_manifest.targets with plugin.json.agents list"

# ===========================================================================
# INVARIANTS
# ===========================================================================

invariants:
- "Primary file is SQUAD.md"
- "Squad install target is multi-file — {slug}/ directory holding SQUAD.md, routing.yaml, install-manifest.yaml, orchestrator.md, agents/*.md, optional skills/"
- "Minimum file count: 4 (SQUAD.md + routing.yaml + install-manifest.yaml + orchestrator.md) + 1 specialist = 5 files"
- "Minimum specialist count: 1 (plus the orchestrator = 2 agent files total)"
- "Orchestrator frontmatter MUST include Agent in tools AND exclude Write, Edit, NotebookEdit"
- "Each specialist follows agent.yaml invariants independently"
- "routing.yaml MUST declare fallback"
- "install-manifest.yaml MUST declare every file that gets installed"
- "Each agent file <=500 lines individually (per agent.yaml invariant)"
- "plugin.json agents field MUST list every installed agent file path"
- "No common command names for any specialist in the squad"
- "No hardcoded absolute paths anywhere in the bundle"
- "All Tier 3 patterns D9/D10/D18 are REQUIRED for squads"
- "handoff format declaration in orchestrator body matches handoff_format_spec.canonical_form"
- "namespace_strategy applied consistently (all specialists use same prefix pattern OR all use subdirectory)"

# ===========================================================================
# GOVERNANCE
# ===========================================================================

security_profile:
  aegis_applicable: true
  reason: "Squads compose multiple agents, each with its own attack surface. The orchestrator reads routing.yaml (prompt injection vector), installs multiple files (filesystem), and can spawn specialists with their own tools and MCP servers. Squads are the most security-relevant type after hooks."
  attack_surfaces:
  - "Each specialist's individual attack surfaces (per agent.yaml.security_profile)"
  - "routing.yaml content — loaded into orchestrator context, can be prompt-injection vector"
  - "install_manifest targets — can specify unintended paths"
  - "plugin.json merge into shared settings"
  - "Handoff payloads — XML envelopes can smuggle instructions between agents"
  - "Recursive spawns (hierarchical archetype) — depth budget is security boundary"
  shell_execution: "via any specialist that allows Bash"
  file_io: "via any specialist that allows Read/Write/Edit"
  network_calls: "via any specialist with WebFetch or mcpServers"
  tool_invocation: "controlled per specialist"
  installation_trust_level: "audit_required"
  installation_trust_reason: "Squads install multiple files to user's .claude/ directory. Every agent and the routing logic must be audited via /aegis before install. Squads should NEVER auto-install from untrusted sources."
  recommended_audit_checks:
  - "Audit each specialist file per agent.yaml.security_profile.recommended_audit_checks"
  - "Audit routing.yaml for prompt injection patterns in triggers and synthesis fields"
  - "Audit install_manifest targets — flag any target path outside ~/.claude/ or project .claude/"
  - "Audit install_manifest for merge kind — flag merges into settings.json that change hook configuration"
  - "Audit plugin.json agents list for consistency with install_manifest"
  - "Audit handoff_format_spec usage in orchestrator body — flag free-text handoffs"
  consumer_status: aspirational
  consumer_status_reason: "/aegis does not yet audit squads as a distinct type — the recommended_audit_checks list above names the squad-specific attack surfaces (routing.yaml prompt injection, install_manifest target paths, plugin.json merges, handoff XML envelopes, recursive spawn depth) that the extended /aegis squad branch must scan once squad type detection is wired."

marketplace_taxonomy:
  default_category: squad
  default_price: 15
  default_license: MIT
  pricing_rationale: "Squads justify premium pricing because they encode multi-agent coordination that is 5-10x more work to design than a single agent. Simple squads start at $15, complex hierarchical squads can reach $75."
  bundle_eligible: true
  bundle_eligible_reason: "Squads compose with claude-md (shared constitution), hooks (lifecycle reactions), and other squads (hierarchical)."
  composition_eligible_with:
  - agent
  - skill
  - hooks
  - claude-md
  - system
  - squad
  composition_eligible_reason: "Squads compose with everything except output-style (voice only) and bundle (composition type)."
  consumer_status: aspirational
  consumer_status_reason: "/package today reads vault_defaults from config.yaml without consulting type-specific overrides. The marketplace_taxonomy block above declares squad-specific defaults (default_category, default_price, bundle_eligible, pricing_strategy by archetype, natural_tags by archetype) that the extended /package squad branch must consult before falling back to config.yaml defaults."
  natural_tags:
    scope: by_archetype
    by_archetype:
      sequential_pipeline:
      - pipeline
      - sequential
      - review
      - multi-stage
      parallel_convergent:
      - parallel
      - multi-perspective
      - convergent
      - synthesis
      conditional_router:
      - router
      - classifier
      - conditional
      - dispatch
      iterative_refinement:
      - iterative
      - refinement
      - loop
      - quality-gate
      hierarchical_delegation:
      - hierarchical
      - nested
      - enterprise
      - delegation
  pricing_strategy:
    scope: by_archetype
    by_archetype:
      sequential_pipeline:
        default: premium
        recommended_range_usd:
        - 15
        - 35
      parallel_convergent:
        default: premium
        recommended_range_usd:
        - 15
        - 40
      conditional_router:
        default: solid
        recommended_range_usd:
        - 8
        - 20
      iterative_refinement:
        default: premium
        recommended_range_usd:
        - 15
        - 35
      hierarchical_delegation:
        default: premium-rare
        recommended_range_usd:
        - 25
        - 75

# ===========================================================================
# DNA PATTERNS
# ===========================================================================

dna_patterns:
  tier1:
    D1:
      required: true
      applicable: true
      name: Activation Protocol
      check: "Orchestrator has activation protocol; each specialist has activation protocol"
    D2:
      required: true
      applicable: true
      name: Anti-Pattern Guard
      check: "Orchestrator + every specialist each have anti-patterns section >=5 items"
    D3:
      required: true
      applicable: true
      name: Progressive Disclosure
      check: "SQUAD.md + each agent file <500 lines; references/ used when needed"
    D4:
      required: true
      applicable: true
      name: Quality Gate
      check: "Orchestrator has synthesis quality gate; each specialist has its own quality gate"
    D13:
      required: true
      applicable: true
      name: Self-Documentation
      check: "README.md with what/install/usage/requirements; install instructions reference myclaude install"
    D14:
      required: true
      applicable: true
      name: Graceful Degradation
      check: "routing.yaml has fallback; orchestrator has synthesis failure handling; each specialist has when-not-to-use"
    D19:
      required: false
      applicable: true
      name: Attention-Aware Authoring
      check: "Critical rules in last 30% of orchestrator body"
  tier2:
    D5:
      required: true
      applicable: true
      name: Question System
      check: "Orchestrator classifies input against route triggers (question-shaped classification)"
    D6:
      required: false
      applicable: true
      name: Confidence Signaling
      check: "Synthesis step signals confidence in final report (recommended for conditional_router archetype)"
    D7:
      required: true
      applicable: true
      name: Pre-Execution Gate
      check: "Orchestrator reads routing.yaml before any Task spawn"
    D8:
      required: false
      applicable: true
      name: State Persistence
      check: "If squad uses shared state, state file declared"
    D15:
      required: true
      applicable: true
      name: Testability
      check: "examples/ directory with scenario tests for the squad"
    D16:
      required: true
      applicable: true
      name: Composability
      check: "No hardcoded paths; install_manifest uses {slug} placeholders; no common command name conflicts"
    D17:
      required: false
      applicable: true
      name: Hook Integration
      check: "If squad needs lifecycle reactions (state write, notification), hooks declared in install_manifest"
    D20:
      required: false
      applicable: false
      name: Cache-Friendly Design
      reason: "Squads are not always-loaded. D20 is claude-md only."
  tier3:
    D9:
      required: true
      applicable: true
      name: "Orchestrate Don't Execute"
      check: "Orchestrator frontmatter tools includes Agent AND excludes Write, Edit, NotebookEdit. This is physical D9 enforcement via tool boundary."
    D10:
      required: true
      applicable: true
      name: Handoff Specification
      check: "Orchestrator body contains handoff format declaration matching handoff_format_spec.canonical_form"
    D11:
      required: false
      applicable: true
      name: Socratic Pressure
      check: "For iterative_refinement archetype, the gate specialist is a read-only ADVISER with self-challenge pattern"
    D12:
      required: false
      applicable: true
      name: Compound Memory
      check: "If squad uses cross-invocation memory, memory scope declared on orchestrator or via state file"
    D18:
      required: true
      applicable: true
      name: Subagent Isolation
      check: "Each specialist is a distinct agent file. Native context fork via Task spawn [SOURCE: runAgent.ts:694-714] provides physical isolation."

