  - lifecycle.test (multi-agent spawn simulation not implemented)
  - lifecycle.package (plugin.json multi-agent generation not implemented)
  aspirational_sections:
  - essence
  - architectural_principles
  - operational_modes
  - freedom_levels
  - archetypes (the 5 coordination patterns)
  - routing_table_schema
  - handoff_format_spec
  - install_manifest
  - quality_rubric (inherited from agent.yaml, squad-specific additions aspirational)
  - anti_patterns_catalog
  - reasoning_frameworks
  - failure_modes
  - invariants
  - security_profile
  - marketplace_taxonomy
  - lifecycle_shared_refs.claude_code_ground_truth
  - lifecycle_shared_refs.agent_codex
  blocking_gaps_for_this_type:
  - id: GAP-1
    where: .claude/skills/import/SKILL.md detection table
    issue: "squad is not in the detection table. A directory with SQUAD.md + routing.yaml + agents/ subdirectory is not recognized as a squad type."
    wave_to_fix: 3
    severity: MAJOR — blocks /import for squads
  - id: GAP-2
    where: myclaude CLI (external)
    issue: "install_manifest is not consumed by the CLI. Multi-target install is documentation-only today."
    wave_to_fix: 3
    severity: MAJOR — squad distribution relies on manual install until CLI ships install_manifest support
  - id: GAP-3
    where: .claude/skills/validate/references/validation-stages/stage-5-dna-tier3.md
    issue: "D9/D10/D18 checks are prose-based grep. Do not physically verify orchestrator tool boundary, handoff format match, or subagent isolation."
    wave_to_fix: 3
    severity: MAJOR — squads can pass current /validate with rhetorical D9
  - id: GAP-4
    where: .claude/skills/package/SKILL.md
    issue: "plugin.json generation does not yet support multi-agent lists. Squads package with single-agent plugin.json."
    wave_to_fix: 3
    severity: MAJOR — breaks squad install via plugin marketplace
  - id: GAP-5
    where: .claude/skills/create/references/discovery-questions.md
    issue: "Squads section existence and completeness unverified in S118"
    wave_to_fix: 4
    severity: unknown

# ===========================================================================
# QUALITY RUBRIC — squad-specific 30-point breakdown
# ===========================================================================

quality_rubric:
  total_points: 30
  scope: "squad craft quality — complementary to MCS"
  inherited_from: "Individual agent quality per agent.yaml.quality_rubric applies to each specialist"
  dimensions:
    orchestration:
      max_points: 12
      criteria:
        tool_boundary:
          0: "orchestrator has Write/Edit in tools"
          1: "orchestrator has some restrictions but not complete"
          2: "orchestrator has physical D9 enforcement (Agent in tools; Write/Edit in disallowedTools)"
        routing_table:
          0: "no routing.yaml"
          1: "routing.yaml exists but incomplete"
          2: "routing.yaml complete with fallback, triggers, synthesis, failure handling"
        handoff_format:
          0: "no handoff format declaration"
          1: "handoff mentioned in prose"
          2: "handoff format section matches canonical_form"
        synthesis_convention:
          0: "no synthesis declaration"
          1: "synthesis described loosely"
          2: "synthesis declared in routing.yaml and orchestrator body with failure handling"
        archetype_fidelity:
          0: "archetype unclear or contradicted"
          1: "archetype declared but routing mode differs"
          2: "archetype declared + routing mode matches + specialist count within typical"
        install_manifest:
          0: "no install_manifest.yaml"
          1: "install_manifest exists but incomplete"
          2: "install_manifest complete, idempotent, uninstall-testable"
    specialists:
      max_points: 12
      criteria:
        specialist_archetype_fidelity:
          0: "specialists have no declared archetype or contradicted archetypes"
          1: "specialists have archetypes but tool boundaries diverge"
          2: "each specialist's archetype matches agent.yaml patterns"
        individual_quality:
          0: "any specialist would score <15 on agent.yaml rubric"
          1: "specialists average 15-19"
          2: "specialists average 20+"
        no_duplication:
          0: "multiple specialists overlap heavily in scope"
          1: "some overlap"
          2: "each specialist has distinct scope"
        count_appropriate:
          0: "too few (<2) or too many (>10)"
          1: "slightly off"
          2: "count fits archetype typical range"
    composition:
      max_points: 6
      criteria:
        namespace_consistency:
          0: "mixed namespace strategies"
          1: "some consistency"
          2: "all specialists use same namespace strategy"
        install_reversibility:
          0: "uninstall leaves traces"
          1: "partial reversibility"
          2: "uninstall is exact reverse of install"
        test_coverage:
          0: "no example scenarios"
          1: "1-2 scenarios"
          2: "happy + edge + adversarial scenarios"
  scoring_thresholds:
    state_of_art:
      range: 27-30
      verdict: "Production-ready and reference-grade"
    excellent:
      range: 23-26
      verdict: "Production-ready"
    good:
      range: 19-22
      verdict: "Minor adjustments recommended"
    functional:
      range: 15-18
      verdict: "Improvements needed before production"
    deficient:
      range: 11-14
      verdict: "Significant refactor needed"
    critical:
      range: 0-10
      verdict: "Rewrite from scratch"
  consumer_status: aspirational
  consumer_status_reason: "/validate Stage 7 does not yet apply this squad-specific 30-point rubric. The dimensions and scoring thresholds above name the canonical rubric the extended Stage 7 squad branch must consume once type-specific rubric lookup is wired."

# ===========================================================================
# ANTI-PATTERNS CATALOG — squad-specific (extends agent.yaml)
# ===========================================================================

anti_patterns_catalog:
  scope: "Squad-specific failure modes. Agent anti-patterns (AP-A1..A6) apply to each specialist. Skill anti-patterns (AP-D1..P3) inherited via agent.yaml."
  orchestration_failures:
    AP_SQ1:
      name: "Executing Orchestrator"
      symptom: "Orchestrator frontmatter has Write or Edit in tools"
      problem: "Orchestrator can execute specialist work, violating D9"
      severity: critical
      fix: "Remove Write/Edit from tools, add to disallowedTools"
    AP_SQ2:
      name: "Prose Routing"
      symptom: "Routing logic lives in orchestrator body prose, no routing.yaml"
      problem: "Routing cannot be audited, diffed, or replayed. Also violates P4 contract-before-narrative."
      severity: high
      fix: "Extract routing logic to routing.yaml; orchestrator body becomes a reader"
    AP_SQ3:
      name: "Free-Text Handoff"
      symptom: "Orchestrator body instructs Task calls without declaring handoff format"
      problem: "Handoffs are ambiguous, cannot be parsed, cannot be replayed"
      severity: high
      fix: "Add handoff format section per handoff_format_spec.canonical_form"
    AP_SQ4:
      name: "Missing Install Manifest"
      symptom: "Squad has no install-manifest.yaml"
      problem: "Squad cannot be installed reversibly; distribution is ad-hoc"
      severity: critical
      fix: "Create install-manifest.yaml listing all targets"
    AP_SQ5:
      name: "Single-Agent Squad"
      symptom: "Squad has only 1 agent file (just the orchestrator, no specialists)"
      problem: "Not actually a squad — should be an agent"
      severity: critical
      fix: "Add specialists OR convert to type=agent"
  namespace_failures:
    AP_SQ6:
      name: "Global Namespace Collision"
      symptom: "Specialist agent files named without squad-slug prefix (e.g., reviewer.md instead of my-squad__reviewer.md)"
      problem: "Installation collides with existing agents in user's .claude/agents/ directory"
      severity: high
      fix: "Apply namespace_strategy consistently — prefix or subdirectory"
  inherited_from_agent: "AP-A1 through AP-A6 from product-dna/agent.yaml apply to each specialist"
  inherited_from_skill: "AP-D1 through AP-P3 from product-dna/skill.yaml apply to each agent in the squad"
  severity_definitions:
    critical: "Breaks the squad's trust contract — must fix before publish"
    high: "Significant degradation — fix recommended for MCS-2"
    medium: "Suboptimal — fix for MCS-3"
    low: "Polish"
  consumer_status: aspirational
  consumer_status_reason: "/validate Stage 7 does not yet grep against this squad-specific anti-patterns catalog nor against the inherited AP-A1..A6 from agent.yaml and AP-D1..P3 from skill.yaml. The orchestration_failures + namespace_failures blocks above name the canonical patterns the extended Stage 7 squad branch must scan once type-specific anti-pattern lookup is wired."

# ===========================================================================
# REASONING FRAMEWORKS — inherited by reference
# ===========================================================================

reasoning_frameworks:
  inherited_from: product-dna/skill.yaml.reasoning_frameworks
  squad_specific_notes:
    jobs_to_be_done: "Critical for squad design — the 'job' is the coordinated workflow, the 'user' is the parent context"
    stakeholder_mapping: "Squad stakeholders include the parent LLM, each specialist, the runtime, the end user who installs the bundle, and the creator who maintains the coordination"
    first_principles_decomposition: "Use to decompose the workflow into the minimum set of distinct specialist expertise"
  consumer_status: aspirational

# ===========================================================================
# DECISION TREES
# ===========================================================================

decision_trees:
  archetype_selection:
    question: "Which squad coordination archetype?"
    branches:
    - condition: "Workflow has strict sequential order with each step consuming previous output?"
      result: sequential_pipeline
    - condition: "Work fans out to independent specialists then converges?"
      result: parallel_convergent
    - condition: "Input classification routes to exactly ONE specialist?"
      result: conditional_router
    - condition: "Work loops until a quality gate is met?"
      result: iterative_refinement
    - condition: "Top-level routing delegates to sub-orchestrators with their own squads?"
      result: hierarchical_delegation
    - condition: "Default"
      result: sequential_pipeline
  specialist_count:
    question: "How many specialists should the squad have?"
    branches:
    - condition: "Archetype is conditional_router?"
      result: 2-8 mutually exclusive specialists
    - condition: "Archetype is sequential_pipeline?"
      result: 3-5 sequential specialists
    - condition: "Archetype is parallel_convergent?"
      result: 3-6 parallel specialists + 1 synthesizer
    - condition: "Archetype is iterative_refinement?"
      result: "2-4 specialists (executor + verifier at minimum)"
    - condition: "Archetype is hierarchical_delegation?"
      result: "2 sub-orchestrators + 3-5 specialists each"
  namespace_strategy:
    question: "How should specialist agent files be namespaced at install?"
    branches:
    - condition: "Default (safest across Claude Code versions)"
      result: "{slug}__{role} prefix (double underscore)"
    - condition: "Squad ships only skills (no agents)?"
      result: "{slug}/{role} subdirectory — native namespace via pathSep"
    - condition: "Default"
      result: "{slug}__{role} prefix"
  consumer_status: aspirational

# ===========================================================================
# STAKEHOLDER MAPPING — squad-specific
# ===========================================================================

stakeholder_mapping:
  parent_context:
    role: "The Claude Code session that invokes the squad orchestrator via Task tool"
    wants:
    - clear description on the orchestrator for spawn decision
    - predictable synthesis return
    - routing visibility (which specialist ran)
    design_for:
    - Orchestrator description follows agent.yaml.description_engineering formula
    - Synthesis returns a structured final report
    - Orchestrator surfaces "routed to X" in its output
  each_specialist:
    role: "Individual agents spawned by the orchestrator via Task"
    wants:
    - clear handoff payload (task, context_from_previous, output_contract)
    - scoped tool boundary
    - predictable failure convention
    design_for:
    - Handoff format is canonical
    - Each specialist follows agent.yaml.stakeholder_mapping for its own role
  claude_code_runtime:
    role: "The platform that loads all squad files, runs plugin install, parses each agent"
    wants:
    - valid frontmatter on every agent file
    - valid plugin.json with consistent agents list
    - no conflicting agent names in global .claude/agents/
    design_for:
    - install_manifest targets are audited for conflicts
    - plugin.json agents list matches install_manifest exactly
    - namespace_strategy is consistent
  end_user:
    role: "Human who runs myclaude install squad-slug and whose Claude Code spawns the orchestrator"
    wants:
    - one install command
    - clean uninstall
    - squad appears in /agents list as coordinated tool
    design_for:
    - install_manifest is idempotent and reversible
    - .manifest-lock provides audit trail
    - README explains how to invoke the squad
  creator_maintainer:
    role: "The original squad architect"
    wants:
    - easy to update individual specialists without breaking coordination
    - routing.yaml is diffable
    - install_manifest changes are safe
    design_for:
    - routing.yaml is the single source of routing truth
    - install_manifest changes are versioned
    - each specialist can be updated independently as long as its agentType doesn't change
  conflict_resolution:
    rule: "claude_code_runtime > parent_context > each_specialist > end_user > creator_maintainer"
    rationale: "Runtime constraints are non-negotiable. Parent context decides whether squad spawns. Specialists must be trusted. End user installs the bundle. Maintainer is last."

# ===========================================================================
# OUTPUT PATTERNS — squad-specific synthesis shapes
# ===========================================================================

output_patterns:
  synthesis_report:
    when_to_use: "sequential_pipeline, parallel_convergent, iterative_refinement"
    structure: "Orchestrator returns a synthesized final report combining all specialist outputs into a single labeled-fields format"
  routed_passthrough:
    when_to_use: "conditional_router"
    structure: "Orchestrator returns the selected specialist's output verbatim with a 'Routed to: {specialist}' header"
  hierarchical_rollup:
    when_to_use: "hierarchical_delegation"
    structure: "Each sub-orchestrator returns its own synthesis; top orchestrator combines them with per-squad attribution"
  consumer_status: aspirational
  consumer_status_reason: "/validate Stage 4 does not yet verify that the orchestrator body teaches a synthesis pattern matching its declared archetype. The three output_patterns above (synthesis_report, routed_passthrough, hierarchical_rollup) are the canonical shapes the extended Stage 4 squad branch must cross-reference against the orchestrator body's synthesis section once archetype-to-pattern mapping is wired."

# ===========================================================================
# MIND-FORGE SQUAD SCHEMA EXTENSIONS
# ===========================================================================
# This block declares the multi-mind composition contract that layers on
# top of the existing 5 coordination archetypes (sequential_pipeline,
# parallel_convergent, conditional_router, iterative_refinement,
# hierarchical_delegation). The existing archetypes are unchanged — the
# additions below wire an orchestrator-led composition discipline, a
# plural-field handoff contract, and an ontological diversity gate that
# any archetype can honor when its specialists are minds.
#
# Every field below has an explicit consumer among the Engine skills
# (/validate, /create, /fill) scheduled for downstream wiring. The
# discipline is aspirational today and mechanical when wired.

mind_forge_squad_schema:
  source_architecture: references/engine-mind-forge-architecture.md
  applies_to: "squads composing multiple minds as coordinated specialists — layered on top of the existing 5 coordination archetypes"
  consumer_status: aspirational
  consumer_status_reason: "The operational contract for multi-mind composition. Downstream consumers (/validate composition_gates check, /validate handoff_contract_template check, /validate diversity_check on 4-zone ontology, /create squad discovery walker extensions) are scheduled across the materialization roadmap declared in references/engine-mind-forge-architecture.md §11."

  # ------------------------------------------------------------------------
  # B1 — Composition gates (load-bearing; partial fill for GAP-COMPOSITION-1)
  # Source: engine-mind-forge-architecture.md §5.8 (L8)
  # ------------------------------------------------------------------------
  B1_composition_gates:
    rationale: "Productive-tension-mandatory composition with orchestrator-led hierarchy. Forces structured disagreement, prevents echo-chamber consensus, makes multi-voice analysis operationally meaningful. The producer/judge separation is the load-bearing discipline — the orchestrator routes and validates but never produces, so production and judgment are physically distinct at the role boundary."
    size_bounds:
      min: 3  # below 3 minds, no productive tension can be guaranteed
      max: 5  # above 5 minds, cacophony risk dominates
      soft_ideal: [3, 4]
      rationale: "below 3 there is no structural opportunity for productive disagreement; above 5 coordination overhead exceeds synthesis benefit"
    productive_tension_gate:
      rule: "composer MUST verify ≥1 productive-tension edge exists across the selected team"
      evidence_source: "registry productive_tension: field per mind entry in product-dna/minds.yaml mind_forge_schema.A9_library_indexing"
      enforcement: "blocker — squad cannot ship without evidence of at least one productive-tension edge"
    echo_alert:
      rule: "if all minds' outputs agree above similarity_threshold, halt and escalate"
      similarity_threshold: 0.85
      escalation: "flag as 'possible training-data echo' and request human review"
      rationale: "total agreement is suspect, not celebration — echo chambers masquerade as convergence"
    disagreement_first_synthesis:
      rule: "final squad output MUST list dissenting positions BEFORE consensus"
      structure:
        section_1: dissenting_views  # who disagreed, on what, why
        section_2: convergent_positions  # where minds agreed
        section_3: synthesis_with_declared_trade_offs  # final recommendation with named losses
    confidence_cap:
      rule: "collective squad confidence ≤ max(individual mind confidences)"
      rationale: "squads do not manufacture certainty that no individual mind possesses — a team of five uncertain minds cannot produce a certain verdict"
    orchestrator_role:
      production_allowed: false
      allowed_actions: [routing, triage, final_validation, convergence_synthesis]
      forbidden_actions: [content_production, self_grading]
      rationale: "Clause II Separation of Production and Judgment operationalized at the squad composition level"

  # ------------------------------------------------------------------------
  # B2 — Handoff contract template (LAW-MF-4 binding; fills GAP-COMPOSITION-1)
  # Source: engine-mind-forge-architecture.md §4.4 (LAW-MF-4), §5.10 (L10)
  # ------------------------------------------------------------------------
  B2_handoff_contract_template:
    rationale: "LAW-MF-4 binding — plural-field admission payload with loop-not-degrade fallback. Every multi-mind team handoff MUST be guarded by a plural-field admission payload with ≥5 independent fields mixing numeric thresholds and structural flags. Producer self-converges before handing off; receiver holds input-side veto; fallback direction is loop, never silent degradation. FILLS GAP-COMPOSITION-1 declared in references/composition-anatomy.md."
    applies_to: "every squad with ≥2 producers — mandatory contract shape"
    fills_gap: GAP-COMPOSITION-1
    fills_gap_source: references/composition-anatomy.md
    schema:
      numeric_fields:
        description: "at least 3 distinct numeric admission thresholds required"
        per_field:
          field_name: string
          threshold: number
          description: "what this field counts and why"
      structural_flags:
        description: "at least 2 distinct structural flags required"
        per_field:
          field_name: string
          allowed_states: "list of permitted values"
          description: "what structural property this flag represents"
      provenance_tags:
        description: "every unit of transferred content carries provenance"
        per_field:
          field_name: string
          marker_vocabulary: [source, inferred, speculative]
          description: "how the receiver distinguishes grounded from inferred"
    minimum_total_fields: 5
    maximum_total_fields: 12
    producer_discipline:
      self_convergence_before_handoff:
        rule: "producer runs a self-validation checklist BEFORE offering the payload to the receiver"
        check_type: "convergence — not quality verdict"
        rationale: "the producer detects its own incompleteness; quality judgment is external per Clause II"
      final_validation: forbidden  # producer never final-validates its own output
    receiver_discipline:
      input_veto:
        rule: "receiver holds input-side veto and bounces incomplete payloads"
        bounce_direction: producer  # never silently degrade, never accept with warning
      acceptance_criteria: "all schema fields populated AND all thresholds met AND zero unmarked inferences"
    fallback_direction:
      on_admission_failure: loop_to_producer
      rule: "admission failure sends work BACK to the producer with specific remediation guidance"
      documentation: "stall states are detectable (bounced N times); human intervention at N≥3"
    no_side_channels:
      rule: "all inter-agent state passes through the payload; no direct agent-to-agent communication outside the contract"
      enforcement: "violations detected by producer-receiver coupling audit"
    example_minimum_payload:
      description: "concrete template for a team with extraction + build specialists"
      numeric_fields:
        - citation_count: "≥15"
        - signature_phrase_count: "≥5"
        - source_tier_1_proportion: "≥0.60"
      structural_flags:
        - all_inferences_marked: true
        - provenance_markers_present: true
      provenance_tags:
        - extracted_unit_markers: [SOURCE, INFERRED]

  # ------------------------------------------------------------------------
  # B3 — Orchestrator-led team template
  # Source: engine-mind-forge-architecture.md §5.8 (L8)
  # ------------------------------------------------------------------------
  B3_orchestrator_led_team_template:
    rationale: "Three-role strictly-disjoint hierarchy — orchestrator routes but never produces, producers produce but never final-validate, optional auditor validates but never produces or fixes. Role disjunction enforces Clause II Separation of Production and Judgment at the structural level, not the rhetorical level. Triple-tier validation (producer self-converges, receiver vetoes, orchestrator judges) guarantees three distinct perspectives, no gate skippable."
    extends: "the existing squad archetypes (sequential_pipeline, parallel_convergent, conditional_router, iterative_refinement, hierarchical_delegation) — any archetype can adopt this role template"
    roles:
      - name: orchestrator
        count: 1
        production_allowed: false
        allowed_actions: [routing, triage, convergence, final_validation]
        forbidden_actions: [content_production, self_grading]
      - name: producer
        count_range: [2, 4]  # within size_bounds [3, 5] minus orchestrator
        production_allowed: true
        allowed_actions: [produce_content, self_converge_before_handoff]
        forbidden_actions: [final_validation_of_own_output, cross_validation_of_peer_output]
      - name: auditor
        count: [0, 1]  # optional
        production_allowed: false
        allowed_actions: [validation, failure_classification, escalation]
        forbidden_actions: [content_production, content_fixing]
    role_disjunction:
      rule: "no agent occupies two roles simultaneously within a single squad invocation"
      rationale: "Clause II Separation of Production and Judgment enforced at the role boundary"
    triple_tier_validation:
      tier_1_producer_self_converge: "producer checks completeness before handoff"
      tier_2_receiver_input_veto: "receiver refuses incomplete payload"
      tier_3_orchestrator_final: "orchestrator runs squad-level validation rubric"
      meaning: "3 gates, 3 distinct perspectives, no gate can be skipped"

  # ------------------------------------------------------------------------
  # B4 — Rework routing matrix
  # Source: engine-mind-forge-architecture.md §6 (L2 ADOPT tier)
  # ------------------------------------------------------------------------
  B4_rework_routing:
    rationale: "Mechanical restart routing — every validation failure maps to a specific restart address, not a vague try-again. Cascading rule ensures restart from the earliest failing phase, not just the reported weak layer. Spot-check vs full-rework discrimination allocates effort proportional to the actual failure mode."
    weak_layer_to_phase_matrix:
      - weak_layer: linguistic_surface
        restart_phase: extraction_phase_1_discover
        rationale: "surface vocabulary gaps are source-ingestion failures"
      - weak_layer: cognitive_core
        restart_phase: extraction_phase_2_mine
        rationale: "cognitive pattern gaps are source-mining failures"
      - weak_layer: personality_engine
        restart_phase: extraction_phase_3_pattern
        rationale: "personality gaps are pattern-extraction failures"
      - weak_layer: values_or_obsessions
        restart_phase: extraction_phase_2_mine_deep
        rationale: "value/obsession gaps require deeper source mining"
      - weak_layer: paradoxes
        restart_phase: full_re_extraction
        rationale: "paradox failures mean fundamental misreading of source"
    cascading_rule:
      rule: "if phase N is the restart address, phases N+1, N+2, ... are also implicitly invalid"
      implication: "restart from earliest failing phase, not just the reported weak layer"
    spot_check_vs_full_rework:
      spot_check:
        trigger: "single-category weakness in 0.70-0.84 range"
        effort_budget_hours: [4, 8]
        scope: "targeted re-extraction on the specific deficient category"
      full_rework:
        trigger: "3+ categories below 0.70"
        effort_budget_hours: [44, 88]
        scope: "full pipeline from extraction phase 1"

  # ------------------------------------------------------------------------
  # B5 — Diversity check via 4-zone ontological taxonomy
  # Source: engine-mind-forge-architecture.md §5.9 (L9)
  # Cross-reference: product-dna/minds.yaml mind_forge_schema.A9_library_indexing.ontology_map
  # ------------------------------------------------------------------------
  B5_diversity_check:
    rationale: "Diversity gate using the 4-zone ontological taxonomy from the mind library. Squads must span ≥2 ontological zones to prevent mono-zone squads that look diverse by surface but share foundation. Links squad composition to mind library ontology through a mechanical check."
    source: "4-zone ontological taxonomy defined in product-dna/minds.yaml mind_forge_schema.A9_library_indexing.ontology_map"
    rule: "squad composition MUST span ≥2 ontological zones"
    purpose: "prevent mono-zone squads that appear diverse on the surface but share cognitive foundation"
    composition_algorithm:
      step_1: "extract ontology_map from each candidate mind entry"
      step_2: "compute zone coverage across the proposed squad"
      step_3: "if zone_coverage < 2: reject the composition and request substitution"
      step_4: "if B1 productive_tension_gate also passes: squad is valid"
    edge_cases:
      single_domain_squad:
        allowed: true
        condition: "single-domain squads permitted only when all members span different zones of that domain"
      homogeneous_foundation:
        forbidden: "squads where all members share the Foundation zone are mono-cultural — structural similarity masquerades as coordination"

  # ------------------------------------------------------------------------
  # B6 — Workflow variants (optional axis extension)
  # Source: engine-mind-forge-architecture.md §5.4 (L4 variants) applied
  # at the squad coordination layer
  # ------------------------------------------------------------------------
  B6_workflow_variants:
    rationale: "Optional 2-axis workflow dispatch for squads whose coordination pattern genuinely varies by input class. Axis 1 distinguishes building a new mind from updating an existing one (effort profile differs by an order of magnitude). Axis 2 distinguishes open-source reference material from closed-source reference material (provenance verification effort differs). Each cell declares token budget and primary phase emphasis. Not every squad needs this — opt in only when the coordination pattern is genuinely bimodal."
    applies_when: "squad must serve multiple workflow classes where each class has a different budget envelope or phase emphasis"
    optional: true
    dispatch_axes:
      build_mode:
        values: [new_build, incremental_update]
        meaning: "new_build forges a mind from scratch; incremental_update refines an existing mind with new reference material"
      source_access:
        values: [open_source, closed_source]
        meaning: "open_source = reference material is publicly available and verifiable; closed_source = reference material is private and requires explicit provenance verification"
    cells:
      new_build_open_source:
