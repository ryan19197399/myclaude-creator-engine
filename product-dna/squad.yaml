# ===========================================================================
# TOKEN ECONOMICS
# ===========================================================================

token_economics:
  catalog_cost_tokens: 250
  catalog_cost_reason: "Squads have multiple agents each with name + description in catalog (~50 tokens × N agents). A 5-agent squad costs ~250 tokens always in the catalog."
  catalog_cost_source: loadSkillsDir.ts:100-105
  invocation_cost: "per_specialist_spawn"
  invocation_cost_reason: "Each specialist spawn is a full agent boot. Sequential 3-specialist squad costs 3 full agent contexts. Parallel 5-specialist squad costs 5 concurrent agent contexts."
  ambient_cost: zero
  ambient_cost_reason: "Squads are not auto-loaded; they activate via orchestrator invocation."
  optimization_notes: |
    Keep specialist count to the minimum that satisfies the workflow. Use
    parallel_convergent when specialists are independent to benefit from
    single-turn multi-Task-call [SOURCE: AgentTool/prompt.ts:271]. Prefer
    conditional_router over parallel_convergent when only one specialist
    actually needs to run per invocation — parallel wastes budget.
  budget_example: "5-agent sequential squad × 1 invocation = 5 × ~(8K-15K) tokens per specialist spawn + orchestrator synthesis"

compact_instructions:
  applicable: true
  location: "SQUAD.md → ## Compact Instructions section"
  source_reference: compact/prompt.ts:133-143
  preserves:
  - squad identity and archetype
  - specialist roster
  - active routing decisions
  - handoff state across steps
  - synthesis state

discovery_questions:
  source_of_truth: this file
  minimum_set:
  - "Which squad archetype fits your workflow? sequential_pipeline, parallel_convergent, conditional_router, iterative_refinement, or hierarchical_delegation?"
  - "What workflow does your squad coordinate? (One sentence)"
  - "What are the distinct expertise areas? (List each specialist role)"
  - "What is the routing logic? (When does each specialist fire?)"
  - "What does the orchestrator synthesize and return?"
  - "What happens when a specialist fails mid-sequence?"
  - "Does the squad use shared state? If yes, where is it stored?"
  depth_set:
  - "What distinguishes this squad from simply calling agents sequentially by hand?"
  - "Which specialists could be replaced by existing marketplace agents vs. forged new?"
  - "What is the maximum spawn depth if the archetype is hierarchical?"
  - "What is the quality gate for iterative_refinement?"
  - "Does any specialist need persistent memory across invocations?"
  - "What MCP servers do the specialists collectively need?"
  - "Should the squad install hooks for lifecycle reactions (e.g., auto-run on PR open)?"

state_machine_hooks:
  source_file: quality-gates.yaml
  source_section: states
  scope: universal
  type_specific_branches: []
  regression_rules: "Universal — file edit after validation regresses to content"
  publish_prerequisites_addendum:
  - "test_result == pass (for MCS-2+ squads)"
  - "install_manifest uninstall test passes"
  publish_prerequisites_addendum_reason: "Squads at MCS-2+ require full spawn simulation AND a passing uninstall test to guarantee reversibility"

