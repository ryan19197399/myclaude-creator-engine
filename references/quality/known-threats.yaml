# ─── CRITICAL CVEs (platform-level, affect all CC users) ──────────────────
# /validate checks product's minimum CC version against these.
# /aegis uses these for deeper threat modeling.
critical_cves:
  - id: "CVE-2025-59536"
    severity: "CRITICAL"
    component: "Claude Code settings.json"
    description: "RCE via enableAllProjectMcpServers — auto-starts MCP servers before trust dialog"
    mitigation: "Never set enableAllProjectMcpServers in product settings"
    fixed_in: "Claude Code >= 1.0.15"

  - id: "CVE-2026-21852"
    severity: "CRITICAL"
    component: "Claude Code ANTHROPIC_BASE_URL"
    description: "API key theft via env var injection in repo config"
    mitigation: "Never override ANTHROPIC_BASE_URL in product files"
    fixed_in: "Claude Code >= 2.0.3"

  - id: "CVE-2026-25253"
    severity: "HIGH"
    component: "OpenClaw gateway"
    description: "WebSocket token exfiltration via malicious link (17,500+ exposed instances)"
    mitigation: "Products must not expose WebSocket endpoints without auth"
    fixed_in: "N/A — architectural issue"

  - id: "CVE-2026-0755"
    severity: "CRITICAL"
    component: "gemini-mcp-tool"
    description: "LLM-generated args passed to shell without validation = RCE"
    mitigation: "Never use gemini-mcp-tool; use validated alternatives"
    fixed_in: "UNPATCHED"

  - id: "CVE-2025-15061"
    severity: "CRITICAL"
    component: "figma-developer-mcp < 0.6.3"
    description: "Shell metacharacters in fetchWithRetry execute arbitrary code"
    mitigation: "Pin figma-developer-mcp >= 0.6.3"
    fixed_in: ">= 0.6.3"

# ─── DANGEROUS PATTERNS (grep-executable in product code) ─────────────────
# /validate Stage 2 greps for these in ALL product files.
dangerous_patterns:
  - pattern: "enableAllProjectMcpServers"
    severity: "CRITICAL"
    reason: "CVE-2025-59536 — bypasses MCP trust dialog"
    action: "BLOCKING"

  - pattern: "ANTHROPIC_BASE_URL"
    severity: "CRITICAL"
    reason: "CVE-2026-21852 — enables API key theft"
    action: "BLOCKING"

  - pattern: "eval\\("
    severity: "HIGH"
    reason: "Code injection vector in hook/skill handlers"
    action: "WARNING"

  - pattern: "child_process.*spawn.*shell.*true"
    severity: "HIGH"
    reason: "Shell spawn with shell:true enables injection"
    action: "WARNING"

  - pattern: "curl.*\\|.*sh"
    severity: "CRITICAL"
    reason: "Remote code execution via pipe-to-shell"
    action: "BLOCKING"

  - pattern: "wget.*\\|.*sh"
    severity: "CRITICAL"
    reason: "Remote code execution via pipe-to-shell"
    action: "BLOCKING"

  - pattern: "base64.*-d.*\\|.*sh"
    severity: "CRITICAL"
    reason: "Obfuscated code execution"
    action: "BLOCKING"

  - pattern: "\\$\\(curl"
    severity: "HIGH"
    reason: "Command substitution with remote content"
    action: "WARNING"

  - pattern: "process\\.env\\.(?!NODE_ENV|HOME|PATH|SHELL)"
    severity: "MEDIUM"
    reason: "Accessing non-standard env vars may indicate credential harvesting"
    action: "COACHING"

# ─── MCP SERVERS WITH KNOWN VULNERABILITIES ────────────────────────────────
# If product references these MCP servers, warn about minimum safe version.
vulnerable_mcp_servers:
  - name: "figma-developer-mcp"
    min_safe_version: "0.6.3"
    cve: "CVE-2025-15061"
  - name: "mcp-atlassian"
    min_safe_version: "0.17.0"
    cve: "CVE-2026-27825 + CVE-2026-27826 (MCPwnfluence chain)"
  - name: "gemini-mcp-tool"
    min_safe_version: "NONE — do not use"
    cve: "CVE-2026-0755"
  - name: "quip-mcp-server"
    min_safe_version: "NONE — maintainer unresponsive"
    cve: "CVE-2026-4192"
  - name: "mcp-memory-service"
    min_safe_version: "UNKNOWN"
    cve: "CVE-2026-33010 (CORS wildcard enables cross-origin memory theft)"

