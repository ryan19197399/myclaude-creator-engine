name: Bug Report
description: Something isn't working as expected
title: "[bug] "
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: Describe the issue...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
      description: What should have happened instead.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Run `...`
        2. See `...`
    validations:
      required: true
  - type: input
    id: engine-version
    attributes:
      label: Engine version
      description: "Run `/status` to find this"
      placeholder: "2.2.0"
    validations:
      required: true
  - type: input
    id: claude-code-version
    attributes:
      label: Claude Code version
      placeholder: "e.g. 1.0.0"
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "e.g. macOS 15, Windows 11, Ubuntu 24"
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Logs, screenshots, or anything else that helps.
